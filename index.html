<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>柴犬うらないハウス</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#fffef0;font-family:'Hiragino Maru Gothic ProN','Hiragino Sans','Meiryo',sans-serif;touch-action:none;}
#app{width:100%;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column;}
.screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0;flex-direction:column;opacity:0;transition:opacity 0.35s ease-in-out;}
.screen.active{display:flex;opacity:1;}
.screen.fade-out{opacity:0;}

/* タイトル */
#title-screen{background:linear-gradient(180deg,#fef5e7 0%,#fffef0 50%,#f5f1e8 100%);justify-content:center;align-items:center;gap:24px;overflow:hidden;}
.title-logo{text-align:center;z-index:1;}
.title-dog{font-size:80px;display:block;animation:bounce 1.5s ease-in-out infinite;filter:drop-shadow(0 0 24px rgba(255,183,77,.3));}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.title-text{color:#d4791f;font-size:26px;font-weight:bold;margin-top:8px;letter-spacing:2px;}
.title-sub{color:#FFB74D;font-size:13px;margin-top:4px;}
.title-desc{background:rgba(255,255,255,.7);border:2px solid #FFB74D;border-radius:16px;padding:16px 18px;max-width:320px;text-align:center;z-index:1;box-shadow:0 4px 16px rgba(0,0,0,.08);}
.title-desc p{color:#5D4037;font-size:12px;line-height:1.6;}
.btn-p{background:linear-gradient(135deg,#FFB74D,#d4791f);color:#fff;border:none;border-radius:50px;padding:14px 48px;font-size:16px;font-weight:bold;cursor:pointer;z-index:1;box-shadow:0 4px 16px rgba(212,121,31,.3);transition:transform .1s;font-family:inherit;}
.btn-p:active{transform:scale(.95);}

/* ゲーム画面 */
#game-screen{background:#fffef0;flex:1;position:relative;overflow:hidden;}
#gcanvas{display:block;width:100%;height:100%;touch-action:none;cursor:pointer;position:absolute;top:0;left:0;}

/* HUD */
#hud{position:absolute;top:env(safe-area-inset-top,8px);left:8px;z-index:10;display:flex;flex-direction:column;gap:5px;}
.hud-pill{background:rgba(255,183,77,.2);border:1px solid #FFB74D;border-radius:12px;padding:5px 12px;font-size:11px;color:#d4791f;display:flex;align-items:center;gap:5px;font-weight:bold;}
#menu-btn{position:absolute;top:env(safe-area-inset-top,8px);right:8px;background:linear-gradient(135deg,#FFB74D,#d4791f);color:#fff;border:none;border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;z-index:10;font-weight:bold;}

/* 下部UI */
#bottom-ui{background:linear-gradient(180deg,#fef5e7,#fffef0);padding:8px 12px env(safe-area-inset-bottom,8px);display:flex;flex-direction:column;gap:6px;border-top:2px solid #FFB74D;flex-shrink:0;box-shadow:0 -2px 8px rgba(0,0,0,.05);}
.area-nav{display:flex;justify-content:space-between;align-items:center;padding:0 4px;}
.area-nav button{background:#FFB74D;color:#fff;border:none;border-radius:20px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:bold;}
.area-nav button:active{transform:scale(.95);}
.area-name{color:#d4791f;font-size:13px;font-weight:bold;text-align:center;flex:1;}
.bottom-controls{display:flex;gap:8px;}
.ctrl-btn{flex:1;background:#fff;border:2px solid #FFB74D;color:#d4791f;border-radius:12px;padding:8px 4px;font-size:11px;font-weight:bold;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;}
.ctrl-btn:active{background:#fef5e7;transform:scale(.96);}

/* モーダル */
#modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;}
#modal.show{display:flex;}
#mbox{background:#fffef0;border-radius:20px;padding:24px 20px;max-width:340px;width:92%;text-align:center;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalPop .3s ease-out;border:2px solid #FFB74D;}
@keyframes modalPop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
#mbox h3{font-size:18px;color:#5D4037;margin-bottom:8px;font-weight:bold;}
#mbox p{font-size:13px;color:#666;line-height:1.6;margin-bottom:12px;}
.mbtn{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:10px 28px;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit;margin:4px;transition:all .1s;}
.mbtn:active{transform:scale(.95);}
.mbtn.gr{background:#4CAF50;}
.mbtn.bl{background:#2196F3;}
.mbtn.rd{background:#e53935;}

/* フォーチュンフロー */
#fortune-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:250;align-items:center;justify-content:center;flex-direction:column;padding:16px;}
#fortune-overlay.show{display:flex;}
#fortune-box{background:linear-gradient(180deg,#fffef0,#fef5e7);border-radius:20px;padding:22px 18px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalPop .3s ease-out;border:2px solid #FFB74D;}
.fortune-step{display:none;animation:fadeIn .3s ease-out;}
.fortune-step.active{display:block;}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
.fortune-step h4{font-size:16px;color:#d4791f;margin-bottom:12px;font-weight:bold;}
.fortune-choices{display:grid;grid-template-columns:1fr;gap:8px;}
.fortune-btn{background:#fff;border:2px solid #FFB74D;color:#5D4037;border-radius:12px;padding:12px;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit;transition:all .15s;}
.fortune-btn:active{background:#fef5e7;transform:scale(.96);}
.fortune-btn.sel{background:#FFB74D;color:#fff;}
.progress-bar{width:100%;height:8px;background:#e0d5c0;border-radius:4px;overflow:hidden;margin-bottom:14px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#FFB74D,#d4791f);border-radius:4px;transition:width .3s;}
.step-counter{font-size:11px;color:#999;margin-top:8px;text-align:center;}

/* 結果画面 */
.fortune-result{display:none;text-align:center;animation:fadeIn .4s ease-out;}
.fortune-result.active{display:block;}
.result-title{font-size:20px;color:#d4791f;font-weight:bold;margin:12px 0 8px;}
.result-level{font-size:32px;color:#FFB74D;font-weight:bold;margin:8px 0;}
.result-message{font-size:13px;color:#5D4037;line-height:1.8;margin:12px 0;padding:12px;background:#fff;border-radius:12px;border-left:4px solid #FFB74D;}
.result-detail{font-size:12px;color:#666;margin:8px 0;padding:8px;background:rgba(255,183,77,.1);border-radius:8px;}
.result-detail b{color:#d4791f;}
.result-close-btn{background:linear-gradient(135deg,#FFB74D,#d4791f);color:#fff;border:none;border-radius:50px;padding:12px 40px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;margin-top:16px;}

/* 図鑑 */
#album-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;overflow-y:auto;padding:20px;}
#album-overlay.show{display:flex;flex-direction:column;align-items:center;}
.album-header{color:#d4791f;font-size:20px;font-weight:bold;margin:16px 0 12px;text-align:center;}
.album-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:360px;width:100%;}
.album-card{background:#fffef0;border:2px solid #FFB74D;border-radius:14px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;}
.album-card canvas{width:50px;height:50px;margin:0 auto 6px;display:block;}
.album-card .ac-name{font-size:12px;font-weight:bold;color:#5D4037;}
.album-close{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:10px 36px;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit;margin:16px 0 20px;}

/* 履歴 */
#history-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;overflow-y:auto;padding:20px;}
#history-overlay.show{display:flex;flex-direction:column;align-items:center;}
.history-header{color:#d4791f;font-size:20px;font-weight:bold;margin:16px 0 12px;text-align:center;}
.history-list{max-width:360px;width:100%;display:flex;flex-direction:column;gap:8px;}
.history-item{background:#fffef0;border:2px solid #FFB74D;border-radius:12px;padding:12px;text-align:left;}
.history-item .hi-title{font-size:13px;font-weight:bold;color:#d4791f;}
.history-item .hi-detail{font-size:11px;color:#666;margin-top:3px;}
.history-item .hi-time{font-size:10px;color:#999;margin-top:3px;}
.history-close{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:10px 36px;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit;margin:16px 0 20px;}

/* プロフィール */
#profile-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;overflow-y:auto;padding:20px;}
#profile-overlay.show{display:flex;flex-direction:column;align-items:center;}
.profile-header{color:#d4791f;font-size:20px;font-weight:bold;margin:16px 0 12px;text-align:center;}
.profile-form{max-width:360px;width:100%;background:#fffef0;border:2px solid #FFB74D;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group label{font-size:12px;font-weight:bold;color:#5D4037;}
.form-group input{padding:8px 10px;border:2px solid #FFB74D;border-radius:8px;font-size:12px;font-family:inherit;}
.form-group input:focus{outline:none;background:#fef5e7;}
.profile-save{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:12px;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit;margin-top:8px;}
.profile-close{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:10px 36px;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit;margin:16px 0 20px;}

/* パーティクル */
.particle{position:fixed;pointer-events:none;z-index:150;}
</style>
</head>
<body>
<div id="app">
  <!-- タイトル -->
  <div id="title-screen" class="screen active">
    <div class="title-logo">
      <div class="title-dog">🐕</div>
      <div class="title-text">柴犬うらないハウス</div>
      <div class="title-sub">占いの世界へようこそ</div>
    </div>
    <div class="title-desc">
      <p>6つのエリアを探索して、<br>個性的なキャラクターに<br>占ってもらおう！</p>
    </div>
    <button class="btn-p" onclick="startGame()">はじめる</button>
  </div>

  <!-- ゲーム -->
  <div id="game-screen" class="screen">
    <canvas id="gcanvas"></canvas>
    <div id="hud">
      <div class="hud-pill">エリア: <span id="area-name">占い村</span></div>
    </div>
    <button id="menu-btn" onclick="openMenu()">メニュー</button>
    <div id="bottom-ui">
      <div class="area-nav">
        <button onclick="changeArea(-1)">◀</button>
        <div class="area-name" id="area-display">占い村</div>
        <button onclick="changeArea(1)">▶</button>
      </div>
      <div class="bottom-controls">
        <button class="ctrl-btn" onclick="openProfile()">🧑‍🤝‍🧑 プロフ</button>
        <button class="ctrl-btn" onclick="openAlbum()">📖 図鑑</button>
        <button class="ctrl-btn" onclick="openHistory()">📜 履歴</button>
      </div>
    </div>
  </div>
</div>

<!-- モーダル -->
<div id="modal">
  <div id="mbox"></div>
</div>

<!-- フォーチュンフロー -->
<div id="fortune-overlay">
  <div id="fortune-box">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="step-counter"><span id="step-num">1</span>/5</div>

    <div class="fortune-step active" id="step-1">
      <h4>カテゴリを選んでね</h4>
      <div class="fortune-choices" id="choices-1"></div>
    </div>

    <div class="fortune-step" id="step-2">
      <h4 id="q2-title"></h4>
      <div class="fortune-choices" id="choices-2"></div>
    </div>

    <div class="fortune-step" id="step-3">
      <h4>最近のできごと</h4>
      <div class="fortune-choices" id="choices-3"></div>
    </div>

    <div class="fortune-step" id="step-4">
      <h4>今の気持ちは？</h4>
      <div class="fortune-choices" id="choices-4"></div>
    </div>

    <div class="fortune-step" id="step-5">
      <h4>色を選んでください</h4>
      <div class="fortune-choices" id="choices-5"></div>
    </div>

    <div class="fortune-result" id="result">
      <div style="font-size:40px;margin-bottom:8px;">✨</div>
      <div class="result-title" id="result-title"></div>
      <div class="result-level" id="result-level"></div>
      <div class="result-message" id="result-message"></div>
      <div class="result-detail"><b>🍀 ラッキーアイテム</b><br><span id="result-lucky"></span></div>
      <div class="result-detail"><b>💑 相性</b><br><span id="result-compat"></span></div>
      <div class="result-detail"><b>💡 アドバイス</b><br><span id="result-advice"></span></div>
      <button class="result-close-btn" onclick="closeFortuneOverlay()">閉じる</button>
    </div>
  </div>
</div>

<!-- 図鑑 -->
<div id="album-overlay">
  <div class="album-header">キャラクター図鑑</div>
  <div class="album-grid" id="album-grid"></div>
  <button class="album-close" onclick="closeAlbum()">閉じる</button>
</div>

<!-- 履歴 -->
<div id="history-overlay">
  <div class="history-header">占い履歴</div>
  <div class="history-list" id="history-list"></div>
  <button class="history-close" onclick="closeHistory()">閉じる</button>
</div>

<!-- プロフィール -->
<div id="profile-overlay">
  <div class="profile-header">🧑‍🤝‍🧑 プロフィール</div>
  <div class="profile-form">
    <div class="form-group">
      <label>名前</label>
      <input type="text" id="profile-name" placeholder="名前を入力">
    </div>
    <div class="form-group">
      <label>誕生日 (例: 2000-01-15)</label>
      <input type="date" id="profile-birthday">
    </div>
    <div class="form-group">
      <label>血液型</label>
      <input type="text" id="profile-blood" placeholder="A/B/O/AB">
    </div>
    <button class="profile-save" onclick="saveProfile()">保存</button>
  </div>
  <button class="profile-close" onclick="closeProfile()">閉じる</button>
</div>

<script>
// ==================== グローバル状態 ====================
const G={
  loopRunning:false,
  lastTime:0,
  frame:0,
  areaIdx:0,
  px:0,py:0,dx:0,dy:0,tx:0,ty:0,
  npcs:[],
  particles:[],
  fortuneStep:1,
  fortuneAnswers:{},
  currentCharacter:null,
};

const canvas=document.getElementById('gcanvas');
let ctx=null;
let audioCtx=null;
let bgmPlaying=false;
let bgmInterval=null;

// ==================== エリア定義 ====================
const areas=[
  {id:'omoi',name:'占い村',icon:'🏘️',sky:['#e8f5ff','#f0fbff','#fffef0'],ground:['#90b896','#8fb8a0','#7ca67a']},
  {id:'tarot',name:'タロットの館',icon:'🏛️',sky:['#f0e8ff','#f5ecff','#fffef0'],ground:['#a5a5a5','#b8b8b8','#9a9a9a']},
  {id:'shrine',name:'おみくじ神社',icon:'⛩️',sky:['#ffe8d0','#fff0da','#fffef0'],ground:['#c9a86f','#d4b896','#b89970']},
  {id:'stars',name:'星読みの丘',icon:'⭐',sky:['#2a1a6a','#4a3a8a','#6a5aaa'],ground:['#1a1a3a','#2a2a4a','#1a1a3a']},
  {id:'crystal',name:'水晶の泉',icon:'💎',sky:['#c8e8f8','#d8f0ff','#fffef0'],ground:['#8fb8c8','#a0c8d8','#7aa0b8']},
  {id:'mystery',name:'ふしぎ小路',icon:'🌙',sky:['#d8c8f0','#e8d8ff','#fffef0'],ground:['#a08cb8','#b89cd0','#987ab8']},
];

// ==================== キャラクター ====================
const characters={
  witch:{name:'魔法使いウィッチ',icon:'🧙‍♀️',area:0},
  seer:{name:'予言者セイア',icon:'👵',area:0},
  tarot:{name:'タロット占い師',icon:'🎴',area:1},
  priest:{name:'神官プリースト',icon:'👨‍⚖️',area:2},
  miko:{name:'巫女ミコ',icon:'👰‍♀️',area:2},
  astro:{name:'星読み博士',icon:'🔭',area:3},
  crystal:{name:'水晶姫',icon:'👑',area:4},
  spirit:{name:'妖精スピリット',icon:'🧚‍♀️',area:5},
  kitsune:{name:'狐キツネ',icon:'🦊',area:5},
};

// ==================== ローカルストレージ ====================
function loadProfile(){
  const data=JSON.parse(localStorage.getItem('fortune_profile')||'{}');
  return{name:data.name||'',birthday:data.birthday||'',blood:data.blood||''};
}

function saveProfileData(){
  const name=document.getElementById('profile-name').value;
  const birthday=document.getElementById('profile-birthday').value;
  const blood=document.getElementById('profile-blood').value;
  localStorage.setItem('fortune_profile',JSON.stringify({name,birthday,blood}));
}

function loadHistory(){
  return JSON.parse(localStorage.getItem('fortune_history')||'[]');
}

function addHistory(category,level,message){
  const history=loadHistory();
  history.push({date:new Date().toLocaleString('ja-JP'),category,level,message});
  localStorage.setItem('fortune_history',JSON.stringify(history));
}

function loadAlbum(){
  return JSON.parse(localStorage.getItem('fortune_album')||'{}');
}

function recordCharacter(charKey){
  const album=loadAlbum();
  if(!album[charKey]){album[charKey]={met:new Date().toLocaleString('ja-JP')};}
  localStorage.setItem('fortune_album',JSON.stringify(album));
}

// ==================== UI制御 ====================
function showModal(html){
  document.getElementById('mbox').innerHTML=html;
  document.getElementById('modal').classList.add('show');
}

function closeModal(){
  document.getElementById('modal').classList.remove('show');
}

function openMenu(){
  const a=areas[G.areaIdx];
  showModal(`
    <h3>メニュー</h3>
    <p>現在地: ${a.name}</p>
    <button class="mbtn" onclick="closeModal();startGame()">ゲームに戻る</button>
    <button class="mbtn bl" onclick="closeModal();document.location.reload()">リセット</button>
  `);
}

function openProfile(){
  const profile=loadProfile();
  document.getElementById('profile-name').value=profile.name;
  document.getElementById('profile-birthday').value=profile.birthday;
  document.getElementById('profile-blood').value=profile.blood;
  document.getElementById('profile-overlay').classList.add('show');
}

function closeProfile(){
  document.getElementById('profile-overlay').classList.remove('show');
}

function saveProfile(){
  saveProfileData();
  showModal('<h3>✓ 保存しました</h3>');
  setTimeout(closeModal,1500);
}

function openAlbum(){
  const album=loadAlbum();
  let html='';
  for(const [key,char] of Object.entries(characters)){
    const met=album[key];
    html+=`
      <div class="album-card">
        <canvas width="50" height="50" id="album-${key}"></canvas>
        <div class="ac-name">${char.name}</div>
        <div class="ac-met" style="font-size:10px;color:#999;">${met?'出会った':'?'}</div>
      </div>
    `;
  }
  document.getElementById('album-grid').innerHTML=html;
  document.getElementById('album-overlay').classList.add('show');
  drawAlbumCharacters();
}

function closeAlbum(){
  document.getElementById('album-overlay').classList.remove('show');
}

function openHistory(){
  const history=loadHistory();
  let html='';
  if(history.length===0){
    html='<div style="text-align:center;color:#999;padding:20px;">まだ占い履歴がありません</div>';
  }else{
    for(let i=history.length-1;i>=0;i--){
      const h=history[i];
      html+=`
        <div class="history-item">
          <div class="hi-title">${h.category} - ${h.level}</div>
          <div class="hi-detail">${h.message.substring(0,40)}</div>
          <div class="hi-time">${h.date}</div>
        </div>
      `;
    }
  }
  document.getElementById('history-list').innerHTML=html;
  document.getElementById('history-overlay').classList.add('show');
}

function closeHistory(){
  document.getElementById('history-overlay').classList.remove('show');
}

// ==================== ゲーム初期化 ====================
function startGame(){
  goTo('game');
  initCanvas();
  startLoop();
}

function goTo(n){
  const current=document.querySelector('.screen.active');
  const next=document.getElementById(n+'-screen');
  if(current){current.classList.remove('active');current.classList.add('fade-out');}
  if(next){setTimeout(()=>{next.classList.add('active');next.classList.remove('fade-out');},50);}
}

function initCanvas(){
  ctx=canvas.getContext('2d',{antialias:true,alpha:false});
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);
  canvas.addEventListener('click',onClick);
  canvas.addEventListener('touchstart',onTouch);
  G.npcs=spawnNPCs();
}

function resizeCanvas(){
  const w=window.innerWidth;
  const h=window.innerHeight;
  canvas.width=w;
  canvas.height=h;
}

function onClick(e){
  const r=canvas.getBoundingClientRect();
  const x=(e.clientX-r.left)*(canvas.width/r.width);
  const y=(e.clientY-r.top)*(canvas.height/r.height);
  handleTap(x,y);
}

function onTouch(e){
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const t=e.touches[0];
  const x=(t.clientX-r.left)*(canvas.width/r.width);
  const y=(t.clientY-r.top)*(canvas.height/r.height);
  handleTap(x,y);
}

function handleTap(x,y){
  for(const npc of G.npcs){
    if(Math.hypot(npc.x-x,npc.y-y)<25){
      G.currentCharacter=npc;
      startFortune(npc);
      return;
    }
  }
}

// ==================== エリア遷移 ====================
function changeArea(dir){
  G.areaIdx=(G.areaIdx+dir+areas.length)%areas.length;
  const a=areas[G.areaIdx];
  document.getElementById('area-name').textContent=a.name;
  document.getElementById('area-display').textContent=a.name;
  G.npcs=spawnNPCs();
}

function spawnNPCs(){
  const npcs=[];
  const w=canvas.width||window.innerWidth;
  const h=canvas.height||window.innerHeight;
  const area=areas[G.areaIdx];
  
  const charKeysInArea=Object.entries(characters).filter(([k,c])=>c.area===G.areaIdx).map(([k])=>k);
  
  const count=Math.min(3,charKeysInArea.length);
  for(let i=0;i<count;i++){
    const charKey=charKeysInArea[i];
    const char=characters[charKey];
    npcs.push({
      charKey,
      name:char.name,
      icon:char.icon,
      x:w*0.2+i*w*0.3,
      y:h*0.5,
      vx:(Math.random()-0.5)*2,
      vy:(Math.random()-0.5)*2,
    });
  }
  return npcs;
}

// ==================== フォーチュンシステム ====================
function startFortune(npc){
  G.fortuneStep=1;
  G.fortuneAnswers={};
  recordCharacter(npc.charKey);
  showFortuneStep();
}

function showFortuneStep(){
  document.getElementById('fortune-overlay').classList.add('show');
  document.querySelectorAll('.fortune-step').forEach(e=>e.classList.remove('active'));
  document.getElementById('step-'+G.fortuneStep).classList.add('active');
  document.getElementById('result').classList.remove('active');
  
  const prog=(G.fortuneStep-1)/5*100;
  document.getElementById('progress-fill').style.width=prog+'%';
  document.getElementById('step-num').textContent=G.fortuneStep;
  
  if(G.fortuneStep===1)buildStep1();
  else if(G.fortuneStep===2)buildStep2();
  else if(G.fortuneStep===3)buildStep3();
  else if(G.fortuneStep===4)buildStep4();
  else if(G.fortuneStep===5)buildStep5();
}

function buildStep1(){
  const opts=['恋愛','仕事','金運','健康','総合運'];
  let html='';
  for(const opt of opts){
    html+=`<button class="fortune-btn" onclick="selectChoice('cat','${opt}')">${opt}</button>`;
  }
  document.getElementById('choices-1').innerHTML=html;
}

function buildStep2(){
  const cat=G.fortuneAnswers.cat;
  document.getElementById('q2-title').textContent=`${cat}に関して、\n前向きですか？`;
  const html=`
    <button class="fortune-btn" onclick="selectChoice('mood','はい')">✓ はい</button>
    <button class="fortune-btn" onclick="selectChoice('mood','いいえ')">✗ いいえ</button>
  `;
  document.getElementById('choices-2').innerHTML=html;
}

function buildStep3(){
  const opts=['良いことが起きた','普通の日々','悩んでいる','期待している','決断が必要'];
  let html='';
  for(const opt of opts){
    html+=`<button class="fortune-btn" onclick="selectChoice('event','${opt}')">${opt}</button>`;
  }
  document.getElementById('choices-3').innerHTML=html;
}

function buildStep4(){
  const opts=['わくわく','落ち着き','不安','やる気','疲れた'];
  let html='';
  for(const opt of opts){
    html+=`<button class="fortune-btn" onclick="selectChoice('feel','${opt}')">${opt}</button>`;
  }
  document.getElementById('choices-4').innerHTML=html;
}

function buildStep5(){
  const opts=['赤','青','黄','紫'];
  let html='';
  for(const opt of opts){
    const colors={赤:'#FF6B6B',青:'#4FC3F7',黄:'#FFD700',紫:'#BA68C8'};
    html+=`<button class="fortune-btn" style="background:${colors[opt]};color:#fff;border-color:${colors[opt]};" onclick="selectChoice('color','${opt}')">${opt}</button>`;
  }
  document.getElementById('choices-5').innerHTML=html;
}

function selectChoice(key,val){
  G.fortuneAnswers[key]=val;
  if(G.fortuneStep<5){
    G.fortuneStep++;
    showFortuneStep();
  }else{
    generateFortune();
  }
}

function generateFortune(){
  const cat=G.fortuneAnswers.cat;
  const mood=G.fortuneAnswers.mood;
  const event=G.fortuneAnswers.event;
  const feel=G.fortuneAnswers.feel;
  const color=G.fortuneAnswers.color;
  
  const levels=['大吉','中吉','小吉','吉','末吉','凶'];
  let score=0;
  if(mood==='はい')score+=2;
  if(event==='良いことが起きた')score+=1;
  if(feel==='わくわく')score+=1;
  const levelIdx=Math.max(0,Math.min(5,5-Math.floor(score)));
  const level=levels[levelIdx];
  
  const messages={
    恋愛:{大吉:'素敵な出会いが訪れます💕',中吉:'信頼できる関係が深まります',小吉:'気になる人と繋がるかも',吉:'あせらず進めましょう',末吉:'焦りは禁物です',凶:'いったんリセットの時期'},
    仕事:{大吉:'大きなチャンスが来ます！',中吉:'着実に成果が出ます',小吉:'新しい挑戦を始めましょう',吉:'コツコツ続けることが大事',末吉:'準備の時間が必要',凶:'視点を変えてみましょう'},
    金運:{大吉:'予想外の収入があります！',中吉:'貯蓄が増える時期です',小吉:'小さな幸運が重なります',吉:'無駄遣いに注意です',末吉:'倹約の時期です',凶:'大事な支出が必要かも'},
    健康:{大吉:'心身ともに好調です',中吉:'バランスの良い生活できます',小吉:'少しの改善で元気に',吉:'定期的な運動をしましょう',末吉:'無理は禁物です',凶:'検診を受けましょう'},
    総合運:{大吉:'全てが上手くいく時期！',中吉:'各方面で好調です',小吉:'チャンスを逃さずに',吉:'焦らず確実に進めます',末吉:'次の準備をしましょう',凶:'心を磨く時期です'},
  };
  
  const msg=messages[cat][level];
  
  const luckyItems={赤:{item:'赤いもの',num:7,dir:'南',food:'唐辛子'},青:{item:'青い石',num:3,dir:'東',food:'わかめ'},黄:{item:'黄色の花',num:8,dir:'北',food:'とうもろこし'},紫:{item:'紫のスカーフ',num:9,dir:'西',food:'ナス'}};
  const lucky=luckyItems[color];
  
  const bloods=Object.keys(loadProfile().blood?{A:'A型',B:'B型',O:'O型',AB:'AB型'}:{});
  const zodiacs=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  
  const compat=`${lucky.num}月生まれ、${zodiacs[Math.floor(Math.random()*12)]}年生まれの人と相性◎`;
  
  const advices=['毎日笑顔を心がけましょう','人のアドバイスに耳を傾けて','感謝の気持ちを大切に','新しいことに挑戦してみて','直感を信じて行動する','周囲への気配りを忘れずに'];
  const advice=advices[Math.floor(Math.random()*advices.length)];
  
  showFortuneResult(cat,level,msg,lucky,compat,advice);
  addHistory(cat,level,msg);
}

function showFortuneResult(cat,level,msg,lucky,compat,advice){
  document.querySelectorAll('.fortune-step').forEach(e=>e.classList.remove('active'));
  document.getElementById('result').classList.add('active');
  
  document.getElementById('result-title').textContent=`${cat}の運勢`;
  document.getElementById('result-level').textContent=level;
  document.getElementById('result-message').textContent=msg;
  document.getElementById('result-lucky').textContent=`色:${lucky.item}  番号:${lucky.num}  方向:${lucky.dir}  食べ物:${lucky.food}`;
  document.getElementById('result-compat').textContent=compat;
  document.getElementById('result-advice').textContent=advice;
}

function closeFortuneOverlay(){
  document.getElementById('fortune-overlay').classList.remove('show');
}

// ==================== 描画 ====================
function startLoop(){
  if(G.loopRunning)return;
  G.loopRunning=true;
  G.lastTime=performance.now();
  requestAnimationFrame(gameFrame);
}

function gameFrame(now){
  if(!G.loopRunning)return;
  const dt=(now-G.lastTime)/16.666;
  G.lastTime=now;
  gameLoop();
  requestAnimationFrame(gameFrame);
}

function gameLoop(){
  if(!ctx)return;
  G.frame++;
  updateNPCs();
  drawAll();
}

function updateNPCs(){
  for(const npc of G.npcs){
    npc.x+=npc.vx;
    npc.y+=npc.vy;
    const w=canvas.width||800;
    const h=canvas.height||600;
    if(npc.x<30||npc.x>w-30){npc.vx*=-1;npc.x=Math.max(30,Math.min(w-30,npc.x));}
    if(npc.y<200||npc.y>h-150){npc.vy*=-1;npc.y=Math.max(200,Math.min(h-150,npc.y));}
  }
}

function drawAll(){
  const w=canvas.width;
  const h=canvas.height;
  ctx.clearRect(0,0,w,h);
  
  const area=areas[G.areaIdx];
  
  // 空のグラデーション
  const sky=ctx.createLinearGradient(0,0,0,h*0.5);
  sky.addColorStop(0,area.sky[0]);
  sky.addColorStop(0.5,area.sky[1]);
  sky.addColorStop(1,area.sky[2]);
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,w,h*0.5);
  
  // 地面
  const grd=ctx.createLinearGradient(0,h*0.5,0,h);
  grd.addColorStop(0,area.ground[0]);
  grd.addColorStop(0.6,area.ground[1]);
  grd.addColorStop(1,area.ground[2]);
  ctx.fillStyle=grd;
  ctx.fillRect(0,h*0.5,w,h*0.5);
  
  // 雲
  drawCloud(w*0.15,h*0.1,1);
  drawCloud(w*0.7,h*0.08,0.7);
  
  // エリア特有の描画
  drawAreaFeatures(area.id,w,h);
  
  // NPC
  for(const npc of G.npcs){
    drawNPC(npc,w,h);
  }
  
  // プレイヤー
  drawShibaInu(ctx,w/2,h*0.55,G.frame);
  
  // ナビゲーション矢印
  ctx.globalAlpha=0.4+Math.sin(G.frame/20)*0.2;
  ctx.fillStyle='#FFB74D';
  ctx.font='bold 24px sans-serif';
  ctx.textAlign='center';
  ctx.fillText('◀',20,h/2);
  ctx.fillText('▶',w-20,h/2);
  ctx.globalAlpha=1;
}

function drawCloud(x,y,s){
  ctx.fillStyle='rgba(255,255,255,.7)';
  ctx.beginPath();
  ctx.ellipse(x,y,32*s,16*s,0,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x-18*s,y+4*s,20*s,12*s,0,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x+20*s,y+3*s,18*s,11*s,0,0,Math.PI*2);
  ctx.fill();
}

function drawAreaFeatures(id,w,h){
  if(id==='omoi'){
    // 占い村：テント
    ctx.fillStyle='#FF6B6B';
    ctx.beginPath();
    ctx.moveTo(w*0.2,h*0.35);
    ctx.lineTo(w*0.35,h*0.25);
    ctx.lineTo(w*0.5,h*0.35);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle='#FFB74D';
    ctx.fillRect(w*0.2,h*0.35,w*0.3,h*0.1);
  }else if(id==='tarot'){
    // タロット館：建物
    ctx.fillStyle='#8B7355';
    ctx.fillRect(w*0.15,h*0.3,w*0.7,h*0.2);
    ctx.fillStyle='#D7CCC8';
    for(let i=0;i<3;i++){
      ctx.fillRect(w*0.2+i*w*0.2,h*0.35,w*0.12,h*0.1);
    }
  }else if(id==='shrine'){
    // 神社：鳥居
    ctx.strokeStyle='#D4A574';
    ctx.lineWidth=8;
    ctx.beginPath();
    ctx.moveTo(w*0.25,h*0.4);
    ctx.lineTo(w*0.75,h*0.4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w*0.3,h*0.4);
    ctx.lineTo(w*0.3,h*0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w*0.7,h*0.4);
    ctx.lineTo(w*0.7,h*0.5);
    ctx.stroke();
  }else if(id==='stars'){
    // 星読みの丘：星
    for(let i=0;i<5;i++){
      ctx.fillStyle='#ffd700';
      ctx.beginPath();
      const x=w*0.2+i*w*0.15;
      const y=h*0.2+Math.sin(G.frame/30+i)*5;
      ctx.arc(x,y,3,0,Math.PI*2);
      ctx.fill();
    }
  }else if(id==='crystal'){
    // 水晶：キラキラ
    ctx.fillStyle='#87CEEB';
    for(let i=0;i<3;i++){
      const x=w*0.25+i*w*0.25;
      const y=h*0.35;
      ctx.beginPath();
      ctx.moveTo(x,y-10);
      ctx.lineTo(x+5,y);
      ctx.lineTo(x,y+10);
      ctx.lineTo(x-5,y);
      ctx.closePath();
      ctx.fill();
    }
  }else if(id==='mystery'){
    // ふしぎ小路：月と星
    ctx.fillStyle='rgba(255,255,200,.6)';
    ctx.beginPath();
    ctx.arc(w*0.2,h*0.2,15,0,Math.PI*2);
    ctx.fill();
  }
}

function drawNPC(npc,w,h){
  ctx.fillStyle='#333';
  ctx.beginPath();
  ctx.arc(npc.x,npc.y,8,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.font='16px sans-serif';
  ctx.textAlign='center';
  ctx.fillText(npc.icon,npc.x,npc.y+4);
  
  ctx.fillStyle='#666';
  ctx.font='10px sans-serif';
  ctx.textAlign='center';
  ctx.fillText(npc.name.substring(0,8),npc.x,npc.y+20);
}

function drawShibaInu(ctx,x,y,frame){
  ctx.fillStyle='#D4A574';
  
  // 体
  ctx.beginPath();
  ctx.ellipse(x,y,18,22,0,0,Math.PI*2);
  ctx.fill();
  
  // 頭
  ctx.beginPath();
  ctx.arc(x,y-20,14,0,Math.PI*2);
  ctx.fill();
  
  // 耳
  ctx.fillStyle='#D4A574';
  ctx.beginPath();
  ctx.ellipse(x-8,y-30,5,10,Math.PI/6,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x+8,y-30,5,10,-Math.PI/6,0,Math.PI*2);
  ctx.fill();
  
  // 耳の内側
  ctx.fillStyle='#F5DEB3';
  ctx.beginPath();
  ctx.ellipse(x-8,y-29,2.5,6,Math.PI/6,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x+8,y-29,2.5,6,-Math.PI/6,0,Math.PI*2);
  ctx.fill();
  
  // 目
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.arc(x-5,y-22,2.5,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x+5,y-22,2.5,0,Math.PI*2);
  ctx.fill();
  
  // 目の光
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(x-4,y-23,1,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x+6,y-23,1,0,Math.PI*2);
  ctx.fill();
  
  // 鼻
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.arc(x,y-16,2.5,0,Math.PI*2);
  ctx.fill();
  
  // 口
  ctx.strokeStyle='#000';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(x,y-14);
  ctx.quadraticCurveTo(x-3,y-11,x-4,y-9);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x,y-14);
  ctx.quadraticCurveTo(x+3,y-11,x+4,y-9);
  ctx.stroke();
  
  // 尾
  ctx.strokeStyle='#D4A574';
  ctx.lineWidth=4;
  ctx.beginPath();
  ctx.moveTo(x+16,y+5);
  const tailSwing=Math.sin(frame/10)*8;
  ctx.quadraticCurveTo(x+22+tailSwing,y,x+20+tailSwing,y-15);
  ctx.stroke();
  
  // 足
  ctx.fillStyle='#D4A574';
  const legSway=Math.sin(frame/15)*2;
  ctx.fillRect(x-10,y+20+legSway,5,12);
  ctx.fillRect(x-2,y+20-legSway,5,12);
  ctx.fillRect(x+3,y+20+legSway,5,12);
  ctx.fillRect(x+11,y+20-legSway,5,12);
  
  // 足の肉球
  ctx.fillStyle='#FFB6C1';
  ctx.beginPath();
  ctx.arc(x-7.5,y+32,2,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x+0.5,y+32,2,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x+5.5,y+32,2,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x+13.5,y+32,2,0,Math.PI*2);
  ctx.fill();
}

function drawAlbumCharacters(){
  for(const [key,char] of Object.entries(characters)){
    const canvas=document.getElementById('album-'+key);
    if(!canvas)continue;
    const c=canvas.getContext('2d');
    c.clearRect(0,0,50,50);
    drawShibaInu(c,25,25,0);
  }
}
