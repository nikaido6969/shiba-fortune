<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>柴犬うらないハウス</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'Hiragino Maru Gothic ProN','Hiragino Sans','Meiryo',sans-serif;touch-action:none;}
#app{width:100%;height:100%;position:relative;overflow:hidden;}
.screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0;flex-direction:column;opacity:0;transition:opacity 0.35s ease-in-out;}
.screen.active{display:flex;opacity:1;}
.screen.fade-out{opacity:0;}
.tap-ripple{position:absolute;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,rgba(255,183,77,.6) 0%,transparent 70%);pointer-events:none;transform:scale(0);animation:rippleAnim .5s ease-out forwards;z-index:999;}
@keyframes rippleAnim{0%{transform:scale(0);opacity:1}100%{transform:scale(2.5);opacity:0}}

/* タイトル */
#title-screen{background:linear-gradient(180deg,#1a1230 0%,#2d2255 35%,#3d2a6a 65%,#1a1230 100%);justify-content:center;align-items:center;gap:32px;overflow:hidden;}
.title-stars{position:absolute;width:100%;height:100%;pointer-events:none;overflow:hidden;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:.2;transform:scale(1)}to{opacity:1;transform:scale(1.3)}}
.title-logo{text-align:center;z-index:1;}
.title-dog-emoji{font-size:90px;display:block;animation:bounce 1.5s ease-in-out infinite;filter:drop-shadow(0 0 24px rgba(255,183,77,.6));}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.title-text{color:#FFB74D;font-size:28px;font-weight:bold;margin-top:10px;text-shadow:0 0 20px rgba(255,183,77,.5);letter-spacing:3px;}
.title-sub{color:#FFCC80;font-size:14px;margin-top:6px;}
.title-desc{background:rgba(0,0,0,.45);border:1px solid rgba(255,183,77,.3);border-radius:14px;padding:14px 20px;max-width:320px;text-align:center;z-index:1;}
.title-desc p{color:#fff;font-size:13px;line-height:1.7;}
.btn-p{background:linear-gradient(135deg,#FFB74D,#FF8F00);color:#fff;border:none;border-radius:50px;padding:16px 52px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1;box-shadow:0 4px 24px rgba(255,143,0,.5);transition:transform .1s;font-family:inherit;}
.btn-p:active{transform:scale(.95);}

/* プロフィール */
#profile-screen{background:linear-gradient(180deg,#FEFBF3 0%,#FFF8E8 40%,#F5EFE0 100%);overflow-y:auto;}
.p-header{background:linear-gradient(135deg,#FFB74D,#FF8F00);padding:18px 16px 14px;text-align:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.p-header h2{font-size:20px;color:#fff;}
.p-header p{font-size:12px;color:rgba(255,255,255,.9);margin-top:3px;}
.p-form{padding:20px 16px;display:flex;flex-direction:column;gap:18px;max-width:400px;margin:0 auto;width:100%;}
.p-group{display:flex;flex-direction:column;gap:6px;}
.p-group label{font-size:14px;font-weight:bold;color:#5D4037;}
.p-group input{padding:12px 14px;border:2px solid #e0d5c0;border-radius:12px;font-size:16px;font-family:inherit;background:#fff;color:#333;outline:none;transition:border-color .2s;}
.p-group input:focus{border-color:#FFB74D;}
.blood-btns{display:flex;gap:8px;flex-wrap:wrap;}
.blood-btn{flex:1;min-width:60px;padding:12px 8px;border:2px solid #e0d5c0;border-radius:12px;background:#fff;font-size:15px;font-weight:bold;color:#555;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s;}
.blood-btn.sel{border-color:#FFB74D;background:linear-gradient(135deg,#FFF8E1,#FFECB3);color:#E65100;box-shadow:0 2px 8px rgba(255,152,0,.2);}
.blood-btn:active{transform:scale(.95);}
.p-acts{padding:16px;display:flex;flex-direction:column;gap:8px;max-width:400px;margin:0 auto;width:100%;}

/* ゲーム画面 */
#game-screen{background:#111;}
#gcanvas{display:block;width:100%;flex:1;touch-action:none;cursor:pointer;}
#hud{position:absolute;top:env(safe-area-inset-top,8px);left:8px;z-index:10;display:flex;flex-direction:column;gap:5px;}
.hud-pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:12px;padding:4px 10px;font-size:10px;color:#fff;display:flex;align-items:center;gap:5px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 2px 8px rgba(0,0,0,.15);transition:all .2s;}
.hud-pill b{color:#FFB74D;}

/* 下部UI */
#bottom-ui{background:linear-gradient(180deg,rgba(26,26,48,.95),rgba(18,18,42,.98));padding:10px 12px env(safe-area-inset-bottom,10px);display:flex;flex-direction:column;gap:7px;border-top:1px solid rgba(255,183,77,.2);flex-shrink:0;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.area-row{display:flex;justify-content:space-between;align-items:center;}
.area-nm{color:#FFB74D;font-size:12px;font-weight:bold;}
.area-prof{color:#FFCC80;font-size:10px;}
.s-bars{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;}
.s-item .s-lr{display:flex;justify-content:space-between;margin-bottom:2px;}
.s-item .s-l{color:#fff;font-size:10px;font-weight:bold;}
.s-item .s-v{color:#888;font-size:9px;}
.s-bg{height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.3);}
.s-fill{height:100%;border-radius:3px;transition:width .4s;}
.f-power{background:linear-gradient(90deg,#CE93D8,#AB47BC);}
.f-luck{background:linear-gradient(90deg,#FFD700,#FFF176);}
#ctrl{display:flex;gap:6px;padding:4px 0 2px;}
.cb{flex:1;background:rgba(255,255,255,.1);color:#e0e0e0;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px 4px;font-size:11px;font-weight:bold;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s ease;backdrop-filter:blur(4px);}
.cb:active{background:rgba(255,183,77,.3);transform:scale(.96);}

/* モーダル */
#modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;}
#modal.show{display:flex;}
#mbox{background:#fff;border-radius:24px;padding:28px 22px;max-width:340px;width:92%;text-align:center;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalPop .3s ease-out;}
@keyframes modalPop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
#mbox h3{font-size:18px;color:#333;margin-bottom:6px;}
#mbox p{font-size:12px;color:#666;line-height:1.6;margin-bottom:14px;}
.mbtn{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:12px 30px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;margin:4px;}
.mbtn:active{transform:scale(.95);}

/* 占い結果 */
#fortune-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:16px;}
#fortune-overlay.show{display:flex;}
#fortune-box{background:linear-gradient(135deg,#FFFDF5,#FFF8E1);border-radius:24px;padding:24px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalPop .3s ease-out;border:2px solid #FFB74D;}
#fortune-box h2{color:#E65100;font-size:20px;margin-bottom:4px;text-align:center;}
#fortune-box .ft-type{color:#999;font-size:11px;text-align:center;margin-bottom:12px;}
#fortune-box .ft-result{background:#fff;border:2px solid #FFB74D;border-radius:14px;padding:16px;margin:12px 0;text-align:center;}
#fortune-box .ft-level{color:#FF8F00;font-size:22px;font-weight:bold;margin-bottom:8px;}
#fortune-box .ft-text{color:#333;font-size:13px;line-height:1.8;white-space:pre-wrap;}
#fortune-box .ft-detail{background:#FFF8E1;border-left:3px solid #FFB74D;padding:10px;border-radius:0 8px 8px 0;margin-top:10px;font-size:12px;color:#5D4037;line-height:1.6;}
.fortune-close{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:12px 40px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;margin-top:16px;width:100%;}
.fortune-close:active{transform:scale(.95);}

/* 図鑑 */
#album-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;padding:20px;}
#album-overlay.show{display:flex;flex-direction:column;align-items:center;}
.album-title{color:#FFB74D;font-size:20px;font-weight:bold;margin:16px 0 12px;text-align:center;}
.album-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:360px;width:100%;}
.album-card{background:rgba(255,255,255,.95);border-radius:16px;padding:14px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.1);}
.album-card .ac-name{font-size:12px;font-weight:bold;color:#333;}
.album-card .ac-count{font-size:10px;color:#888;margin-top:2px;}
.album-close{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:12px 40px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;margin:16px 0 20px;}

/* 履歴 */
#history-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;padding:20px;}
#history-overlay.show{display:flex;flex-direction:column;align-items:center;}
.hist-list{max-width:360px;width:100%;display:flex;flex-direction:column;gap:8px;}
.hist-item{background:rgba(255,255,255,.95);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;}
.hist-icon{font-size:24px;}
.hist-info{flex:1;font-size:12px;color:#555;}
.hist-info b{color:#E65100;}

/* チュートリアル */
#tutorial-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:20px;}
#tutorial-overlay.show{display:flex;}
.tut-card{background:#fff;border-radius:20px;padding:24px;max-width:320px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3);animation:modalPop .4s ease-out;}
.tut-card h3{font-size:18px;color:#333;margin-bottom:10px;}
.tut-card p{font-size:13px;color:#666;line-height:1.7;margin-bottom:16px;}
.tut-step{display:flex;gap:6px;justify-content:center;margin-bottom:12px;}
.tut-dot{width:8px;height:8px;border-radius:50%;background:#ddd;transition:all .3s;}
.tut-dot.active{background:#FFB74D;width:20px;border-radius:4px;}

/* デイリー占いバナー */
.daily-banner{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(255,183,77,.95);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:bold;z-index:15;box-shadow:0 4px 12px rgba(255,143,0,.3);animation:slideDown .5s ease-out;pointer-events:none;}
@keyframes slideDown{0%{transform:translateX(-50%) translateY(-30px);opacity:0}100%{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
</head>
<body>
<div id="app">

<!-- タイトル -->
<div id="title-screen" class="screen active">
<div class="title-stars" id="stars-ct"></div>
<div class="title-logo">
<span class="title-dog-emoji">🔮</span>
<div class="title-text">柴犬うらないハウス</div>
<div class="title-sub">占い村を冒険しよう</div>
</div>
<div class="title-desc"><p>6つの占いエリアを巡って<br>柴犬占い師たちから<br>運命を占ってもらおう！</p></div>
<button class="btn-p" onclick="goTo('profile')">はじめる</button>
</div>

<!-- プロフィール -->
<div id="profile-screen" class="screen">
<div class="p-header"><h2>プロフィール設定</h2><p>あなたの情報を教えてね</p></div>
<div class="p-form">
<div class="p-group">
<label>お名前</label>
<input type="text" id="inp-name" placeholder="例：さつき" maxlength="10">
</div>
<div class="p-group">
<label>生年月日</label>
<input type="date" id="inp-birthday">
</div>
<div class="p-group">
<label>血液型</label>

<button class="blood-btn" onclick="selBlood('B')">B型</button>
<button class="blood-btn" onclick="selBlood('O')">O型</button>
<button class="blood-btn" onclick="selBlood('AB')">AB型</button>
</div>
</div>
</div>
<div class="p-acts">
<button class="btn-p" style="width:100%;padding:15px;" onclick="saveProfile()">占いの旅へ出発！</button>
<button class="cb" style="border:none;color:#999;font-size:12px;" onclick="goTo('title')">戻る</button>
</div>
</div>

<!-- ゲーム画面 -->
<div id="game-screen" class="screen">
<canvas id="gcanvas"></canvas>
<div id="hud">
<div class="hud-pill">📍 <b id="h-area">占い村</b></div>
<div class="hud-pill">🔮 <b id="h-count">0</b>回占い</div>
</div>
<div id="bottom-ui">
<div class="area-row">
<span class="area-nm" id="area-nm2">占い村</span>
<span class="area-prof" id="area-prof"></span>
</div>
<div class="s-bars">
<div class="s-item"><div class="s-lr"><span class="s-l">🔮占い力</span><span class="s-v" id="sv-power">0</span></div><div class="s-bg"><div class="s-fill f-power" id="sb-power" style="width:0%"></div></div></div>
<div class="s-item"><div class="s-lr"><span class="s-l">✨運気</span><span class="s-v" id="sv-luck">50</span></div><div class="s-bg"><div class="s-fill f-luck" id="sb-luck" style="width:50%"></div></div></div>
</div>
<div id="ctrl">
<button class="cb" onclick="openAlbum()">📖図鑑</button>
<button class="cb" onclick="openHistory()">🔮履歴</button>
<button class="cb" onclick="showProfileEdit()">👤変更</button>
<button class="cb" onclick="goTo('title')">🏠</button>
</div>
</div>
</div>
</div>

<!-- モーダル -->
<div id="modal"><div id="mbox"><h3 id="mt2"></h3><p id="mm2"></p><div id="m-btns"><button class="mbtn" id="m-fortune-btn">占ってもらう</button><button class="mbtn" style="background:#999;" onclick="closeM()">閉じる</button></div></div></div>

<!-- 占い結果 -->
<div id="fortune-overlay">
<div id="fortune-box">
<h2 id="f-name">占い</h2>
<div class="ft-type" id="f-type-label"></div>
<div class="ft-result">
<div class="ft-level" id="f-level">大吉</div>
<div class="ft-text" id="f-text">運が良い日です</div>
</div>
<div class="ft-detail" id="f-detail" style="display:none;"></div>
<button class="fortune-close" id="f-close">閉じる</button>
</div>
</div>

<!-- 図鑑 -->
<div id="album-overlay">
<div class="album-title">📖 占い図鑑</div>
<div class="album-grid" id="album-grid"></div>
<button class="album-close" onclick="closeAlbum()">とじる</button>
</div>

<!-- 履歴 -->
<div id="history-overlay">
<div class="album-title">🔮 占い履歴</div>
<div class="hist-list" id="hist-list"></div>
<button class="album-close" onclick="closeHistory()">とじる</button>
</div>

<!-- チュートリアル -->
<div id="tutorial-overlay">
<div class="tut-card" id="tut-card">
<div class="tut-step" id="tut-dots"></div>
<h3 id="tut-title"></h3>
<p id="tut-text"></p>
<button class="mbtn" onclick="nextTutorial()">つぎへ</button>
</div>
</div>

  d.textContent='ERR:'+msg+' L:'+line;document.body.appendChild(d);d.onclick=function(){d.remove();};
};

// ===================== 定数 =====================
function W(){return window.innerWidth;} function H(){return window.innerHeight;}
let canvas,ctx,cW,cH;

// エリア定義
const areas=[
  {id:'village',name:'占い村',sky:['#87CEEB','#B3E5FC','#E0F7FA'],ground:['#81C784','#66BB6A','#388E3C']},

// ===================== 画面遷移 =====================
function goTo(n){
  const cur=document.querySelector('.screen.active');
  const next=document.getElementById(n+'-screen');
  if(!next)return;
  if(cur&&cur!==next){
    cur.classList.add('fade-out');
    setTimeout(()=>{
      document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active','fade-out'));
      next.classList.add('active');
      G.screen=n;
      if(n==='game'){
        resizeCanvas();
        G.px=cW/2;G.py=canvas.height*0.55;
        G.dx=G.px-30;G.dy=G.py+15;
        G.tx=null;G.ty=null;
        spawnNPCs();startLoop();
        if(G.bgmOn!==false)playBGM();
        if(!G.tutDone)showTutorial();
        updateUI();
        if(G.profile)document.getElementById('area-prof').textContent=G.profile.name+'さん';
      }else{stopLoop();stopBGM();}
    },350);
  }else{
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    next.classList.add('active');
    G.screen=n;
    if(n==='game'){
      resizeCanvas();
      G.px=cW/2;G.py=canvas.height*0.55;
      G.dx=G.px-30;G.dy=G.py+15;
      spawnNPCs();startLoop();
      if(!G.tutDone)showTutorial();
      updateUI();
      if(G.profile)document.getElementById('area-prof').textContent=G.profile.name+'さん';
    }else{stopLoop();stopBGM();}
  }
}

// ===================== BGM =====================
let audioCtx,bgmGain,bgmPlaying=false,bgmInterval;
function initBGM(){
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
}
function playBGM(){
  if(!audioCtx||bgmPlaying)return;bgmPlaying=true;
  if(audioCtx.state==='suspended')audioCtx.resume();
  const notes=[392,440,494,523,587,523,494,440,392,349,330,349,392,440,494,392];
  let ni=0;
  function playNote(){
    if(!bgmPlaying)return;
    const o=audioCtx.createOscillator();
    o.type='sine';o.frequency.value=notes[ni%notes.length];
    const g=audioCtx.createGain();g.gain.value=0.04;
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+0.42);
    ni++;
  }
  playNote();bgmInterval=setInterval(playNote,450);
}
function stopBGM(){bgmPlaying=false;if(bgmInterval)clearInterval(bgmInterval);}
function playSE(type){
  if(!audioCtx)return;
  if(audioCtx.state==='suspended')audioCtx.resume();
  try{
    const now=audioCtx.currentTime;
    if(type==='tap'){
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine';o.frequency.setValueAtTime(1200,now);o.frequency.exponentialRampToValueAtTime(800,now+0.04);
      g.gain.setValueAtTime(0.03,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.06);
      o.connect(g);g.connect(audioCtx.destination);o.start(now);o.stop(now+0.06);
    }else if(type==='fortune'){
      [523,659,784,1047].forEach((f,i)=>{
        const o=audioCtx.createOscillator(),g=audioCtx.createGain();
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0.04,now+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,now+i*0.1+0.3);
        o.connect(g);g.connect(audioCtx.destination);o.start(now+i*0.1);o.stop(now+i*0.1+0.3);
      });
    }else if(type==='area'){
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='triangle';o.frequency.value=660;
      g.gain.setValueAtTime(0.05,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
      o.connect(g);g.connect(audioCtx.destination);o.start(now);o.stop(now+0.15);
    }
  }catch(e){}
}

function doFortune(npc){
  const type=npc.type;
  let title='',level='',text='',detail='';

  if(type==='tarot'){
    const cards=Object.keys(FD.tarot);
    const card=cards[Math.floor(Math.random()*cards.length)];
    const up=Math.random()>0.4;
    const readings=up?FD.tarot[card].up:FD.tarot[card].rv;
    title='タロット占い';
    level=card+(up?' 正位置':' 逆位置');
    text=readings[Math.floor(Math.random()*readings.length)];
    detail=up?'良い兆候が見えます':'注意して進みましょう';
  }else if(type==='omikuji'){
    const levels=['大吉','中吉','小吉','吉','末吉','凶','大凶'];
    const weights=[10,20,25,20,15,8,2];
    let total=weights.reduce((a,b)=>a+b,0),r=Math.random()*total;
    let lv='吉';
    for(let i=0;i<weights.length;i++){r-=weights[i];if(r<=0){lv=levels[i];break;}}
    title='おみくじ';
    level=lv;
    const readings=FD.omikuji[lv];
    text=readings[Math.floor(Math.random()*readings.length)];
    const cats=['恋愛','仕事','健康','金運'];
    detail=cats[Math.floor(Math.random()*cats.length)]+'運も良好です';
  }else if(type==='zodiac'){
    const sign=G.profile?G.profile.zodiac:'牡羊座';
    const data=FD.zodiac[sign];
    if(data){
      const cats=Object.keys(data);
      const cat=cats[Math.floor(Math.random()*cats.length)];
      title='星座占い - '+sign;
      level=cat;
      text=data[cat];
    }else{title='星座占い';level='不明';text='星座が確認できません';}
  }else if(type==='numerology'){
    const num=Math.ceil(Math.random()*9);
    title='数秘術';
    level='運命数 '+num;
    text=FD.numerology[num];
  }else if(type==='blood'){
    const bt=G.profile?G.profile.blood:'A';
    const data=FD.blood[bt];
    if(data){
      const cats=Object.keys(data);
      const cat=cats[Math.floor(Math.random()*cats.length)];
      title='血液型占い - '+bt+'型';
      level=cat;
      text=data[cat];
    }else{title='血液型占い';level='不明';text='血液型が確認できません';}
  }else if(type==='moon'){
    const phases=Object.keys(FD.moon);
    const phase=phases[Math.floor(Math.random()*phases.length)];
    title='月占い';
    level=phase;
    text=FD.moon[phase];
  }else if(type==='crystal'){
    title='クリスタルボール';
    level='水晶の導き';
    text=FD.crystal[Math.floor(Math.random()*FD.crystal.length)];
  }else if(type==='palm'){
    title='手相占い';
    level='手のひらの秘密';
    text=FD.palm[Math.floor(Math.random()*FD.palm.length)];
  }else if(type==='dream'){
    title='夢占い';
    level='夢のメッセージ';
    text=FD.dream[Math.floor(Math.random()*FD.dream.length)];
  }else if(type==='funny'){
    title='面白占い';
    level='わっはっは！';
    text=FD.funny[Math.floor(Math.random()*FD.funny.length)];
  }

  // 結果表示
  document.getElementById('f-name').textContent=npc.name+'の'+title;
  document.getElementById('f-type-label').textContent=title;
  document.getElementById('f-level').textContent=level;
  document.getElementById('f-text').textContent=text;
  if(detail){
    document.getElementById('f-detail').textContent=detail;
    document.getElementById('f-detail').style.display='block';
  }else{
    document.getElementById('f-detail').style.display='none';
  }
  document.getElementById('fortune-overlay').classList.add('show');
  document.getElementById('f-close').onclick=()=>{
    document.getElementById('fortune-overlay').classList.remove('show');
  };

  // 統計更新
  G.fortuneCount++;
  G.fortunePower=Math.min(100,G.fortunePower+5);
  G.luck=Math.min(100,G.luck+3);
  G.fortuneHistory.unshift({date:new Date().toLocaleDateString('ja-JP'),npc:npc.name,type:title,level:level,text:text});
  const key=type+'_'+level;
  G.collection[key]=(G.collection[key]||0)+1;
  saveData();
  updateUI();
  playSE('fortune');

  // バブル
  addBubble(npc.x,npc.y-40,'占い完了！✨',50);
}

// ===================== ゲームループ =====================
function startLoop(){if(G.loopRunning)return;G.loopRunning=true;G.lastTime=performance.now();requestAnimationFrame(gameFrame);}
function stopLoop(){G.loopRunning=false;}
function gameFrame(now){
  if(!G.loopRunning)return;
  const dt=now-G.lastTime;
  if(dt>=16){G.lastTime=now;gameLoop();}
  requestAnimationFrame(gameFrame);
}

function gameLoop(){
  G.frame++;G.gtime++;

  // プレイヤー移動
  if(G.tx!==null){
    const dx=G.tx-G.px,dy=G.ty-G.py,d=Math.hypot(dx,dy);
    if(d>3){const ease=Math.min(0.12,4.0/d);G.px+=dx*ease;G.py+=dy*ease;}
    else{G.tx=null;G.ty=null;}
  }

  // 犬追従
  const tdx=G.px-30,tdy=G.py+15;
  const ddx=tdx-G.dx,ddy=tdy-G.dy,dd=Math.hypot(ddx,ddy);
  if(dd>5){const lerp=0.06+Math.min(1,2.2/dd*3)*0.08;G.dx+=ddx*lerp;G.dy+=ddy*lerp;}

  // NPC移動
  for(const n of G.npcs){
    n.fr++;
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<30||n.x>cW-30)n.vx*=-1;
    if(n.y<canvas.height*0.25||n.y>canvas.height*0.8)n.vy*=-1;
    if(Math.random()>0.98){n.vx=(Math.random()-.5)*0.6;n.vy=(Math.random()-.5)*0.3;}
  }

  // 境界
  G.px=Math.max(25,Math.min(cW-25,G.px));
  G.py=Math.max(canvas.height*0.25,Math.min(canvas.height*0.85,G.py));

  // 運気ゆらぎ
  if(G.gtime%300===0)G.luck=Math.max(20,Math.min(100,G.luck+(Math.random()-.5)*10));

  // バブル更新
  G.bubbles=G.bubbles.filter(b=>{b.life--;b.y-=0.5;return b.life>0;});

  drawAll();
}

// ===================== 描画 =====================
function drawAll(){
  if(!ctx)return;
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  const a=areas[G.areaIdx];

  // 空
  const sky=ctx.createLinearGradient(0,0,0,h*0.45);
  sky.addColorStop(0,a.sky[0]);sky.addColorStop(0.5,a.sky[1]);sky.addColorStop(1,a.sky[2]);
  ctx.fillStyle=sky;ctx.fillRect(0,0,w,h*0.45);

  // 太陽/月
  if(G.areaIdx===3||G.areaIdx===4){
    ctx.fillStyle='#FFFFCC';ctx.shadowColor='#FFFFCC';ctx.shadowBlur=20;
    ctx.beginPath();ctx.arc(w*0.85,h*0.08,15,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // 星
    ctx.fillStyle='#FFD700';
    for(let i=0;i<12;i++){
      const sx=(G.frame*0.3+i*97)%w;
      const sy=h*0.05+Math.sin(G.frame*0.02+i*1.3)*h*0.15;
      ctx.beginPath();ctx.arc(sx,sy,1.5,0,Math.PI*2);ctx.fill();
    }
  }else{
    ctx.fillStyle='#FFF9C4';ctx.shadowColor='#FFEE58';ctx.shadowBlur=25;
    ctx.beginPath();ctx.arc(w*0.85,h*0.08,20,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }

  // 雲
  drawCloud(w*0.2+Math.sin(G.frame*0.005)*20,h*0.06,1);
  drawCloud(w*0.6,h*0.1+Math.cos(G.frame*0.006)*10,.7);
  drawCloud(w*0.9,h*0.05,.5);

  // 地面
  const grd=ctx.createLinearGradient(0,h*0.45,0,h);
  grd.addColorStop(0,a.ground[0]);grd.addColorStop(.4,a.ground[1]);grd.addColorStop(1,a.ground[2]);
  ctx.fillStyle=grd;ctx.fillRect(0,h*0.45,w,h*0.55);

  // エリア固有描画
  drawAreaFeatures(a.id,w,h);

  // 矢印ヒント
  ctx.globalAlpha=0.3+Math.sin(G.frame/15)*0.15;
  ctx.fillStyle='#FFB74D';ctx.font='bold 20px sans-serif';ctx.textAlign='center';
  if(G.areaIdx>0)ctx.fillText('◀',18,h/2);
  if(G.areaIdx<areas.length-1)ctx.fillText('▶',w-18,h/2);
  ctx.globalAlpha=1;

  // NPC描画
  for(const n of G.npcs){
    if(n.kind==='cat')drawCat(n.x,n.y,n.fr);
    else if(n.kind==='plankton')drawPlankton(n.x,n.y,n.colorMain,n.fr);
    else if(n.kind==='serow')drawSerow(n.x,n.y,n.fr);
    else drawDog(n.x,n.y,n.colorMain,n.colorBelly,n.fr);
    // 名前ラベル
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
    ctx.fillText(n.name,n.x,n.y+25);
  }

  // プレイヤー
  drawOwner(G.px,G.py);

  // プレイヤーの犬
  drawDog(G.dx,G.dy,'#C9A772','#FFF8E1',G.frame);

  // バブル
  for(const b of G.bubbles){
    ctx.globalAlpha=Math.min(1,b.life/20);
    const tw=ctx.measureText(b.text).width;
    ctx.fillStyle='rgba(0,0,0,.6)';
    roundRect(ctx,b.x-tw/2-8,b.y-10,tw+16,22,8);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText(b.text,b.x,b.y+4);ctx.globalAlpha=1;
  }

  // ミニマップ
  drawMinimap(w,h);

  // パーティクル
  ctx.fillStyle='rgba(255,183,77,.5)';
  for(let i=0;i<5;i++){
    const px=(G.frame*1.5+i*130)%w;
    const py=h*0.15+Math.sin(G.frame*0.03+i*2)*h*0.1;
    ctx.beginPath();ctx.arc(px,py,1.5+Math.sin(G.frame*0.1+i)*0.5,0,Math.PI*2);ctx.fill();
  }
}

function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

// ===== 描画関数 =====
function drawDog(x,y,cm,cb,fr){
  ctx.save();
  // 影
  ctx.fillStyle='rgba(0,0,0,.1)';ctx.beginPath();ctx.ellipse(x,y+16,16,5,0,0,Math.PI*2);ctx.fill();
  // 胴体
  ctx.fillStyle=cm;ctx.beginPath();ctx.ellipse(x,y,24,18,0,0,Math.PI*2);ctx.fill();
  // お腹
  ctx.fillStyle=cb;ctx.beginPath();ctx.ellipse(x,y+6,14,12,0,0,Math.PI*2);ctx.fill();
  // 頭
  ctx.fillStyle=cm;ctx.beginPath();ctx.arc(x+22,y-12,13,0,Math.PI*2);ctx.fill();
  // 耳
  ctx.beginPath();ctx.moveTo(x+16,y-26);ctx.lineTo(x+12,y-36);ctx.lineTo(x+24,y-28);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x+28,y-26);ctx.lineTo(x+32,y-36);ctx.lineTo(x+36,y-28);ctx.closePath();ctx.fill();
  // 目
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(x+18,y-15,4,5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+28,y-15,4,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#333';ctx.beginPath();ctx.arc(x+18,y-14,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+28,y-14,2,0,Math.PI*2);ctx.fill();
  // 鼻
  ctx.fillStyle='#333';ctx.beginPath();ctx.arc(x+23,y-8,2.5,0,Math.PI*2);ctx.fill();
  // しっぽ
  const tw=Math.sin(fr*0.08)*12;
  ctx.strokeStyle=cm;ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x-24,y+6);ctx.quadraticCurveTo(x-38,y-4+tw,x-42,y-14+tw);ctx.stroke();
  ctx.restore();
}

function drawCat(x,y,fr){
  ctx.save();
  ctx.fillStyle='#FF9800';ctx.beginPath();ctx.ellipse(x,y+5,12,16,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x,y-8,10,0,Math.PI*2);ctx.fill();
  // 尖った耳
  ctx.beginPath();ctx.moveTo(x-8,y-16);ctx.lineTo(x-5,y-26);ctx.lineTo(x-2,y-16);ctx.fill();
  ctx.beginPath();ctx.moveTo(x+2,y-16);ctx.lineTo(x+5,y-26);ctx.lineTo(x+8,y-16);ctx.fill();
  // 目
  ctx.fillStyle='#FFEB3B';ctx.beginPath();ctx.ellipse(x-4,y-10,2,3,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+4,y-10,2,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#333';ctx.beginPath();ctx.arc(x-4,y-10,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+4,y-10,1,0,Math.PI*2);ctx.fill();
  // 鼻
  ctx.fillStyle='#FF69B4';ctx.beginPath();ctx.arc(x,y-5,1.5,0,Math.PI*2);ctx.fill();
  // しっぽ
  ctx.strokeStyle='#FF9800';ctx.lineWidth=3;ctx.beginPath();
  ctx.moveTo(x+10,y+5);ctx.quadraticCurveTo(x+18,Math.sin(fr*0.12)*8+y,x+20,y-10);ctx.stroke();
  ctx.restore();
}

function drawPlankton(x,y,col,fr){
  ctx.save();
  const bob=Math.sin(fr*0.06)*3;
  ctx.globalAlpha=0.7+0.3*Math.sin(fr*0.05);
  ctx.fillStyle=col;
  for(let i=0;i<4;i++){
    const a=(Math.PI*2/4)*i+fr*0.02;
    const px=x+Math.cos(a)*5;const py=y+bob+Math.sin(a)*5;
    ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fill();
  }
  ctx.beginPath();ctx.arc(x,y+bob,4,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawSerow(x,y,fr){
  ctx.save();
  // 胴体
  ctx.fillStyle='#795548';ctx.beginPath();ctx.ellipse(x,y,20,14,0,0,Math.PI*2);ctx.fill();
  // 頭
  ctx.beginPath();ctx.arc(x+20,y-4,11,0,Math.PI*2);ctx.fill();
  // 角
  ctx.strokeStyle='#555';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x+17,y-13);ctx.lineTo(x+15,y-22);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+23,y-13);ctx.lineTo(x+25,y-22);ctx.stroke();
  // 目
  ctx.fillStyle='#333';ctx.beginPath();ctx.arc(x+24,y-5,2,0,Math.PI*2);ctx.fill();
  // 脚
  ctx.strokeStyle='#795548';ctx.lineWidth=3;
  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(x-10+i*7,y+12);ctx.lineTo(x-10+i*7,y+22);ctx.stroke();}
  ctx.restore();
}

function drawOwner(x,y){
  ctx.save();
  // 頭
  ctx.fillStyle='#FFDBAC';ctx.beginPath();ctx.arc(x,y-16,8,0,Math.PI*2);ctx.fill();
  // 髪
  ctx.fillStyle='#5D4037';ctx.beginPath();ctx.arc(x,y-20,8,Math.PI,0);ctx.fill();
  // 体
  ctx.fillStyle='#FF7043';ctx.fillRect(x-7,y-6,14,16);
  // 腕
  ctx.fillStyle='#FFDBAC';ctx.fillRect(x-12,y-4,5,4);ctx.fillRect(x+7,y-4,5,4);
  // 脚
  ctx.fillStyle='#455A64';ctx.fillRect(x-5,y+10,4,8);ctx.fillRect(x+1,y+10,4,8);
  ctx.restore();
}

function drawCloud(x,y,s){
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);
  ctx.fillStyle='rgba(255,255,255,.7)';
  ctx.beginPath();ctx.arc(-12,0,10,0,Math.PI*2);ctx.arc(0,-4,14,0,Math.PI*2);ctx.arc(12,0,10,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawMinimap(w,h){
  const mx=w-65,my=10,mw=55,mh=45;
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(mx,my,mw,mh);
  ctx.strokeStyle='#FFB74D';ctx.lineWidth=1;ctx.strokeRect(mx,my,mw,mh);
  for(let i=0;i<6;i++){
    const row=Math.floor(i/3),col=i%3;
    const px=mx+5+col*17,py=my+5+row*18;
    ctx.fillStyle=i===G.areaIdx?'#FFB74D':'#555';
    ctx.beginPath();ctx.arc(px+6,py+6,5,0,Math.PI*2);ctx.fill();
  }
}

function drawAreaFeatures(id,w,h){
  if(id==='village'){
    // 家
    ctx.fillStyle='#CD853F';ctx.fillRect(w*0.12,h*0.33,65,55);
    ctx.fillStyle='#FF6347';ctx.beginPath();ctx.moveTo(w*0.12,h*0.33);ctx.lineTo(w*0.12+32,h*0.22);ctx.lineTo(w*0.12+65,h*0.33);ctx.closePath();ctx.fill();
    // 窓
    ctx.fillStyle='#87CEEB';ctx.fillRect(w*0.12+15,h*0.33+12,12,12);ctx.fillRect(w*0.12+38,h*0.33+12,12,12);
    // ドア
    ctx.fillStyle='#8B4513';ctx.fillRect(w*0.12+24,h*0.33+30,18,25);
    // 井戸
    ctx.fillStyle='#808080';ctx.fillRect(w*0.7,h*0.45,30,25);
    ctx.fillStyle='#666';ctx.fillRect(w*0.7-2,h*0.43,34,6);
    // 花
    const colors=['#FF69B4','#FFD700','#FF6347','#9370DB','#00CED1'];
    for(let i=0;i<8;i++){
      ctx.fillStyle=colors[i%colors.length];
      ctx.beginPath();ctx.arc(w*0.3+i*25,h*0.48+Math.sin(i)*8,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#228B22';ctx.fillRect(w*0.3+i*25-1,h*0.48+Math.sin(i)*8+3,2,8);
    }
  }else if(id==='tarot'){
    // ゴシック建物
    ctx.fillStyle='#4A148C';ctx.fillRect(w*0.1,h*0.25,90,80);
    ctx.fillStyle='#7B1FA2';ctx.beginPath();ctx.moveTo(w*0.1,h*0.25);ctx.lineTo(w*0.1+45,h*0.1);ctx.lineTo(w*0.1+90,h*0.25);ctx.closePath();ctx.fill();
    // 窓（ステンドグラス風）
    ctx.fillStyle='#CE93D8';ctx.beginPath();ctx.arc(w*0.1+45,h*0.32,12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#E1BEE7';ctx.beginPath();ctx.arc(w*0.1+45,h*0.32,6,0,Math.PI*2);ctx.fill();
    // クリスタルボール
    const glow=0.5+0.3*Math.sin(G.frame*0.05);
    ctx.fillStyle='rgba(186,85,211,'+glow+')';ctx.beginPath();ctx.arc(w*0.65,h*0.4,18,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#9C27B0';ctx.lineWidth=2;ctx.stroke();
    // 魔法記号
    ctx.fillStyle='rgba(206,147,216,.6)';ctx.font='18px sans-serif';
    ctx.fillText('✦',w*0.8,h*0.2);ctx.fillText('✧',w*0.5,h*0.15);ctx.fillText('✦',w*0.85,h*0.35);
  }else if(id==='shrine'){
    // 鳥居
    ctx.strokeStyle='#D32F2F';ctx.lineWidth=6;
    ctx.beginPath();ctx.moveTo(w*0.2,h*0.5);ctx.lineTo(w*0.2,h*0.3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w*0.45,h*0.5);ctx.lineTo(w*0.45,h*0.3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w*0.17,h*0.3);ctx.lineTo(w*0.48,h*0.3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w*0.19,h*0.34);ctx.lineTo(w*0.46,h*0.34);ctx.stroke();
    // 神社本殿
    ctx.fillStyle='#8B4513';ctx.fillRect(w*0.55,h*0.35,70,55);
    ctx.fillStyle='#D32F2F';ctx.beginPath();ctx.moveTo(w*0.53,h*0.35);ctx.lineTo(w*0.55+35,h*0.2);ctx.lineTo(w*0.55+72,h*0.35);ctx.closePath();ctx.fill();
    // 石段
    ctx.fillStyle='#999';
    for(let i=0;i<3;i++)ctx.fillRect(w*0.3-i*5,h*0.5+i*8,w*0.1+i*10,5);
  }else if(id==='zodiac'){
    // 天文台ドーム
    ctx.fillStyle='#37474F';ctx.beginPath();ctx.arc(w*0.7,h*0.35,35,Math.PI,0);ctx.fill();
    ctx.fillRect(w*0.7-35,h*0.35,70,40);
    // 望遠鏡
    ctx.strokeStyle='#607D8B';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(w*0.3,h*0.45);ctx.lineTo(w*0.2,h*0.3);ctx.stroke();
    ctx.fillStyle='#78909C';ctx.beginPath();ctx.arc(w*0.2,h*0.3,8,0,Math.PI*2);ctx.fill();
    // 星座ライン
    ctx.strokeStyle='rgba(255,215,0,.4)';ctx.lineWidth=1;
    const stars=[[w*0.4,h*0.1],[w*0.5,h*0.15],[w*0.55,h*0.08],[w*0.45,h*0.2],[w*0.35,h*0.18]];
    ctx.beginPath();stars.forEach((s,i)=>{if(i===0)ctx.moveTo(s[0],s[1]);else ctx.lineTo(s[0],s[1]);});ctx.stroke();
    ctx.fillStyle='#FFD700';stars.forEach(s=>{ctx.beginPath();ctx.arc(s[0],s[1],3,0,Math.PI*2);ctx.fill();});
  }else if(id==='spring'){
    // 泉
    const shimmer=0.4+0.2*Math.sin(G.frame*0.03);
    ctx.fillStyle='rgba(0,188,212,'+shimmer+')';ctx.beginPath();ctx.ellipse(w*0.4,h*0.45,50,30,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(77,208,225,.6)';ctx.beginPath();ctx.ellipse(w*0.4,h*0.45,30,18,0,0,Math.PI*2);ctx.fill();
    // クリスタル
    ctx.fillStyle='#9C27B0';
    ctx.beginPath();ctx.moveTo(w*0.7,h*0.35);ctx.lineTo(w*0.73,h*0.25);ctx.lineTo(w*0.76,h*0.35);ctx.closePath();ctx.fill();
    ctx.fillStyle='#AB47BC';
    ctx.beginPath();ctx.moveTo(w*0.75,h*0.38);ctx.lineTo(w*0.77,h*0.3);ctx.lineTo(w*0.8,h*0.38);ctx.closePath();ctx.fill();
    // 月光効果
    ctx.fillStyle='rgba(255,255,200,.15)';ctx.beginPath();ctx.arc(w*0.4,h*0.2,60,0,Math.PI*2);ctx.fill();
  }else if(id==='alley'){
    // カラフルショップ
    ctx.fillStyle='#FFCCFF';ctx.fillRect(w*0.08,h*0.35,50,45);
    ctx.fillStyle='#FF69B4';ctx.beginPath();ctx.moveTo(w*0.08,h*0.35);ctx.lineTo(w*0.08+25,h*0.26);ctx.lineTo(w*0.08+50,h*0.35);ctx.closePath();ctx.fill();
    ctx.fillStyle='#CCFFCC';ctx.fillRect(w*0.35,h*0.33,50,47);
    ctx.fillStyle='#66BB6A';ctx.beginPath();ctx.moveTo(w*0.35,h*0.33);ctx.lineTo(w*0.35+25,h*0.24);ctx.lineTo(w*0.35+50,h*0.33);ctx.closePath();ctx.fill();
    ctx.fillStyle='#CCCCFF';ctx.fillRect(w*0.62,h*0.35,50,45);
    ctx.fillStyle='#7986CB';ctx.beginPath();ctx.moveTo(w*0.62,h*0.35);ctx.lineTo(w*0.62+25,h*0.26);ctx.lineTo(w*0.62+50,h*0.35);ctx.closePath();ctx.fill();
    // ランタン
    const lanternColors=['#FF6B6B','#FFD700','#FF69B4','#87CEEB'];
    for(let i=0;i<4;i++){
      ctx.fillStyle=lanternColors[i];
      const lx=w*0.15+i*w*0.22;
      const ly=h*0.22+Math.sin(G.frame*0.04+i)*3;
      ctx.beginPath();ctx.arc(lx,ly,6,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#999';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(lx,ly-6);ctx.lineTo(lx,ly-15);ctx.stroke();
    }
    // のぼり
    ctx.fillStyle='rgba(255,183,77,.7)';ctx.fillRect(w*0.88,h*0.15,12,50);
    ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
    ctx.save();ctx.translate(w*0.88+6,h*0.2);
    '占い'.split('').forEach((c,i)=>{ctx.fillText(c,0,i*12);});
    ctx.restore();
  }
}
</script>
</body>
