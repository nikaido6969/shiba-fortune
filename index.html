<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>柴犬うらないハウス</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #fffef0; font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif; touch-action: none; }
        
        #app { width: 100%; height: 100%; position: relative; overflow: hidden; }
        
        /* Screen System */
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; opacity: 0; transition: opacity 0.35s ease-in-out; }
        .screen.active { display: flex; opacity: 1; pointer-events: auto; }
        .screen.fade-out { opacity: 0; }
        
        /* Title Screen */
        #title-screen {
            background: linear-gradient(180deg, #1a1230 0%, #2d2255 35%, #3d2a6a 65%, #1a1230 100%);
            justify-content: center;
            align-items: center;
            gap: 32px;
            overflow: hidden;
        }
        
        .title-stars { position: absolute; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle 2s infinite alternate; }
        @keyframes twinkle { from { opacity: 0.2; transform: scale(1); } to { opacity: 1; transform: scale(1.3); } }
        
        .title-logo { text-align: center; z-index: 1; }
        .title-dog-emoji { font-size: 90px; display: block; animation: bounce 1.5s ease-in-out infinite; filter: drop-shadow(0 0 24px rgba(255,183,77,.6)); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
        .title-text { color: #FFB74D; font-size: 28px; font-weight: bold; margin-top: 10px; text-shadow: 0 0 20px rgba(255,183,77,.5); letter-spacing: 3px; }
        .title-sub { color: #FFCC80; font-size: 14px; margin-top: 6px; }
        
        .title-desc {
            background: rgba(0,0,0,.45);
            border: 1px solid rgba(255,183,77,.3);
            border-radius: 14px;
            padding: 14px 20px;
            max-width: 320px;
            text-align: center;
            z-index: 1;
        }
        .title-desc p { color: #fff; font-size: 13px; line-height: 1.7; }
        
        .btn-p {
            background: linear-gradient(135deg, #FFB74D, #FF8F00);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 16px 52px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1;
            box-shadow: 0 4px 24px rgba(255,143,0,.5);
            transition: transform .1s;
            font-family: inherit;
        }
        .btn-p:active { transform: scale(.95); }
        
        /* Profile Screen */
        #profile-screen {
            background: linear-gradient(180deg, #FEFBF3 0%, #FFF8E8 40%, #F5EFE0 100%);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .profile-card {
            background: #fff;
            border-radius: 24px;
            padding: 28px 22px;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,.1);
        }
        
        .profile-card h2 {
            color: #d4791f;
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .input-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .input-group label {
            color: #333;
            font-size: 13px;
            font-weight: bold;
        }
        
        .input-group input {
            padding: 12px;
            border: 2px solid #FFB74D;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .btn-wide {
            background: #FFB74D;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            margin-top: 10px;
        }
        .btn-wide:active { transform: scale(.98); }
        
        /* Game Screen */
        #game-screen {
            background: #111;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        
        #gcanvas {
            display: block;
            width: 100%;
            flex: 1;
            touch-action: none;
            cursor: pointer;
        }
        
        #bottom-ui {
            background: linear-gradient(180deg, rgba(26,26,48,.95), rgba(18,18,42,.98));
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 7px;
            border-top: 1px solid rgba(255,183,77,.2);
            flex-shrink: 0;
            backdrop-filter: blur(12px);
        }
        
        .area-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .area-nm {
            color: #FFB74D;
            font-size: 12px;
            font-weight: bold;
        }
        
        .area-nav {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }
        
        .nav-btn {
            background: rgba(255,255,255,.1);
            color: #FFB74D;
            border: none;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        .nav-btn:active { background: rgba(255,183,77,.3); }
        
        #ctrl {
            display: flex;
            gap: 6px;
            padding: 4px 0 2px;
        }
        
        .cb {
            flex: 1;
            background: rgba(255,255,255,.1);
            color: #e0e0e0;
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 12px;
            padding: 10px 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            text-align: center;
            transition: all .15s ease;
            backdrop-filter: blur(4px);
        }
        .cb:active { background: rgba(255,183,77,.3); transform: scale(.96); }
        
        /* Modal */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,.85);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        
        #modal.show { display: flex; }
        
        #mbox {
            background: #fff;
            border-radius: 24px;
            padding: 28px 22px;
            max-width: 340px;
            width: 92%;
            text-align: center;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            animation: modalPop .3s ease-out;
        }
        
        @keyframes modalPop { 0% { transform: scale(.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        #mbox .me { font-size: 50px; margin-bottom: 8px; }
        #mbox h3 { font-size: 18px; color: #333; margin-bottom: 6px; }
        #mbox p { font-size: 12px; color: #666; line-height: 1.6; margin-bottom: 14px; }
        
        .mbtn {
            background: #FFB74D;
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            margin: 4px;
        }
        
        .mbtn.gr { background: #4CAF50; }
        .mbtn.bl { background: #2196F3; }
        .mbtn.rd { background: #e53935; }
        
        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #FFF8E1;
            border: 2px solid #FFB74D;
            border-radius: 8px;
            color: #d4791f;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        .option-btn:active { transform: scale(.98); }
        
        .fortune-result {
            background: #FFF8E1;
            border: 2px solid #FFB74D;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            text-align: left;
            color: #333;
            line-height: 1.7;
            font-size: 13px;
        }
        
        .fortune-result strong {
            color: #d4791f;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div id="app">

<!-- Title Screen -->
<div id="title-screen" class="screen active">
    <div class="title-stars" id="stars-ct"></div>
    <div class="title-logo">
        <span class="title-dog-emoji">🐕</span>
        <div class="title-text">柴犬うらないハウス</div>
        <div class="title-sub">占いの不思議な世界へ</div>
    </div>
    <button class="btn-p" onclick="game.showProfileSetup()">ゲーム開始</button>
    <div class="title-desc">
        <p>占い館を訪ねて、<br>12の動物たちに占ってもらおう！<br>4つのエリアを探索し、<br>運命の出会いを待っている...</p>
    </div>
</div>

<!-- Profile Setup Screen -->
<div id="profile-screen" class="screen">
    <div class="profile-card">
        <h2>🌟 プロフィール設定</h2>
        <div class="input-group">
            <label>あなたのお名前</label>
            <input type="text" id="playerNameInput" placeholder="例：太郎" maxlength="10">
        </div>
        <div class="input-group">
            <label>占う内容を選んでね</label>
            <select id="fortuneTypeInput" style="padding: 12px; border: 2px solid #FFB74D; border-radius: 8px; font-family: inherit; font-size: 14px;">
                <option value="love">恋愛運</option>
                <option value="fortune">財運</option>
                <option value="health">健康運</option>
                <option value="career">仕事運</option>
                <option value="general">総合運</option>
            </select>
        </div>
        <button class="btn-wide" onclick="game.startGame()">占いを開始</button>
        <button class="btn-wide" style="background: #999; margin-top: 6px;" onclick="game.goToTitle()">戻る</button>
    </div>
</div>

<!-- Game Screen -->
<div id="game-screen" class="screen">
    <canvas id="gcanvas"></canvas>
    <div id="bottom-ui">
        <div class="area-row">
            <div class="area-nm" id="area-name">エリア 1: 和の占い通り</div>
            <div class="area-nav">
                <button class="nav-btn" onclick="game.prevArea()">◀</button>
                <button class="nav-btn" onclick="game.nextArea()">▶</button>
            </div>
        </div>
        <div id="ctrl">
            <button class="cb" onclick="game.showHistory()">履歴</button>
            <button class="cb" onclick="game.showAlbum()">図鑑</button>
            <button class="cb" onclick="game.goToTitle()">終了</button>
        </div>
    </div>
</div>

</div>

<!-- Modal -->
<div id="modal">
    <div id="mbox"></div>
</div>

<script>
// ============================================================
// PART 3: Canvas2D Drawing Functions
// ============================================================

function drawShiba(ctx, x, y, oY, color) {
  const BG = color || '#D4905A';
  const WH = '#FFF8E1';
  const OL = '#222';
  const LW = 3;
  
  ctx.fillStyle = 'rgba(0,0,0,.08)';
  ctx.beginPath();
  ctx.ellipse(x, y + 16, 14, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = BG;
  ctx.strokeStyle = OL;
  ctx.lineWidth = LW;
  ctx.beginPath();
  ctx.ellipse(x - 12, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 12, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x, y + 2 + oY, 16, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, y + 4 + oY, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = BG;
  ctx.beginPath();
  ctx.ellipse(x - 9, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 9, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(x + 16, y - 2 + oY, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(x, y - 10 + oY, 11, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x - 8, y - 18 + oY, 4, 6, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 8, y - 18 + oY, 4, 6, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, y - 8 + oY, 7, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(x - 4, y - 12 + oY, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 4, y - 12 + oY, 1.5, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.beginPath();
  ctx.arc(x, y - 7 + oY, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawCat(ctx, x, y, oY, color) {
  const BG = color || '#F4A460';
  const WH = '#FFE4C4';
  const OL = '#222';
  const LW = 3;
  
  ctx.fillStyle = 'rgba(0,0,0,.08)';
  ctx.beginPath();
  ctx.ellipse(x, y + 16, 13, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = BG;
  ctx.strokeStyle = OL;
  ctx.lineWidth = LW;
  ctx.beginPath();
  ctx.ellipse(x - 11, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 11, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x, y + 2 + oY, 15, 11, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, y + 4 + oY, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = BG;
  ctx.beginPath();
  ctx.ellipse(x - 8, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 8, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.strokeStyle = OL;
  ctx.lineWidth = LW;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.quadraticCurveTo(x + 18, y + oY, x + 20, y - 8 + oY);
  ctx.stroke();
  
  ctx.fillStyle = BG;
  ctx.beginPath();
  ctx.arc(x, y - 10 + oY, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(x - 7, y - 18 + oY);
  ctx.lineTo(x - 9, y - 24 + oY);
  ctx.lineTo(x - 4, y - 16 + oY);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 7, y - 18 + oY);
  ctx.lineTo(x + 9, y - 24 + oY);
  ctx.lineTo(x + 4, y - 16 + oY);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath();
  ctx.moveTo(x - 6.5, y - 19 + oY);
  ctx.lineTo(x - 8, y - 23 + oY);
  ctx.lineTo(x - 5, y - 17 + oY);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 6.5, y - 19 + oY);
  ctx.lineTo(x + 8, y - 23 + oY);
  ctx.lineTo(x + 5, y - 17 + oY);
  ctx.closePath();
  ctx.fill();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, y - 8 + oY, 6, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(x - 4, y - 11 + oY, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 4, y - 11 + oY, 1.2, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.strokeStyle = OL;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - 6, y - 7 + oY);
  ctx.lineTo(x - 12, y - 8 + oY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 6, y - 7 + oY);
  ctx.lineTo(x + 12, y - 8 + oY);
  ctx.stroke();
  
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath();
  ctx.arc(x, y - 6 + oY, 1.2, 0, Math.PI * 2);
  ctx.fill();
}

function drawRabbit(ctx, x, y, oY, color) {
  const BG = color || '#C5A572';
  const WH = '#FFF';
  const OL = '#222';
  const LW = 3;
  
  ctx.fillStyle = 'rgba(0,0,0,.08)';
  ctx.beginPath();
  ctx.ellipse(x, y + 16, 12, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = BG;
  ctx.strokeStyle = OL;
  ctx.lineWidth = LW;
  ctx.beginPath();
  ctx.ellipse(x - 10, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 10, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x, y + 2 + oY, 14, 11, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, y + 4 + oY, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = BG;
  ctx.beginPath();
  ctx.ellipse(x - 7, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 7, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(x + 14, y + 2 + oY, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(x, y - 10 + oY, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x - 5, y - 22 + oY, 3, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 5, y - 22 + oY, 3, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath();
  ctx.ellipse(x - 5, y - 20 + oY, 1.5, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + 5, y - 20 + oY, 1.5, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, y - 8 + oY, 6, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(x - 3, y - 10 + oY, 1.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 3, y - 10 + oY, 1.3, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.beginPath();
  ctx.arc(x, y - 6 + oY, 1.3, 0, Math.PI * 2);
  ctx.fill();
}

function drawFox(ctx, x, y, oY, color) {
  const BG = color || '#FF6B35';
  const WH = '#FFE5CC';
  const OL = '#222';
  const LW = 3;
  
  ctx.fillStyle = 'rgba(0,0,0,.08)';
  ctx.beginPath();
  ctx.ellipse(x, y + 16, 14, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = BG;
  ctx.strokeStyle = OL;
  ctx.lineWidth = LW;
  ctx.beginPath();
  ctx.ellipse(x - 12, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 12, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x, y + 2 + oY, 16, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, y + 4 + oY, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = BG;
  ctx.beginPath();
  ctx.ellipse(x - 9, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 9, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.strokeStyle = OL;
  ctx.lineWidth = LW;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.quadraticCurveTo(x + 20, y + 4 + oY, x + 22, y - 6 + oY);
  ctx.stroke();
  
  ctx.fillStyle = BG;
  ctx.beginPath();
  ctx.arc(x, y - 11 + oY, 11, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(x - 8, y - 19 + oY);
  ctx.lineTo(x - 10, y - 26 + oY);
  ctx.lineTo(x - 5, y - 17 + oY);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(x - 10, y + 14 + oY, 3, 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 10, y + 14 + oY, 3, 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(x, y + 2 + oY, 17, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#C9A881';
  ctx.beginPath();
  ctx.ellipse(x - 8, y + 13 + oY, 3, 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 8, y + 13 + oY, 3, 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = BG;
  ctx.beginPath();
  ctx.arc(x, y - 11 + oY, 10, 0, Math.PI * 2);

  ctx.arc(x - 6, y - 18 + oY, 2.5, 0, Math.PI * 2);

  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x + 6, y - 18 + oY, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#FFE5E5';
  ctx.beginPath();
  ctx.ellipse(x, y - 7 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(x - 3, y - 12 + oY, 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 3, y - 12 + oY, 1, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.beginPath();
  ctx.arc(x, y - 6 + oY, 0.8, 0, Math.PI * 2);
  ctx.fill();
}

function drawPlayerShiba(ctx, x, y, frame) {
  const BG = '#D4905A';
  const WH = '#FFF8E1';
  const OL = '#222';
  const LW = 3;
  
  const bounce = Math.sin((frame % 20) / 20 * Math.PI) * 2;
  const legSwing = Math.sin((frame % 20) / 20 * Math.PI) * 3;
  const tailWag = Math.sin((frame % 20) / 20 * Math.PI * 2) * 2;
  const earBounce = Math.sin((frame % 15) / 15 * Math.PI) * 1.5;
  
  const oY = y + bounce;
  
  ctx.fillStyle = 'rgba(0,0,0,.08)';
  ctx.beginPath();
  ctx.ellipse(x, y + 16, 14, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = BG;
  ctx.strokeStyle = OL;
  ctx.lineWidth = LW;
  ctx.beginPath();
  ctx.ellipse(x - 12, oY + 14 + legSwing * 0.3, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 12, oY + 14 - legSwing * 0.3, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x, oY + 2, 16, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, oY + 4, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = BG;
  ctx.beginPath();
  ctx.ellipse(x - 9, oY + 12 - legSwing * 0.3, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 9, oY + 12 + legSwing * 0.3, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(x + 16 + tailWag, oY - 2, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(x, oY - 10, 11, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x - 8, oY - 18 + earBounce, 4, 6, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 8, oY - 18 + earBounce, 4, 6, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, oY - 8, 7, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(x - 4, oY - 12, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 4, oY - 12, 1.5, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.beginPath();
  ctx.arc(x, oY - 7, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawBuilding(ctx, x, y, type, areaId) {
  const OL = '#222';
  const LW = 3;
  
  ctx.fillStyle = 'rgba(0,0,0,.12)';
  ctx.beginPath();
  ctx.ellipse(x, y + 28, 22, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  
  if (type === 'shrine' || areaId === 1) {
    ctx.fillStyle = '#C0C0C0';
    ctx.strokeStyle = OL;
    ctx.lineWidth = LW;
    
    ctx.fillStyle = '#DC143C';
    ctx.fillRect(x - 20, y - 8, 40, 6);
    ctx.stroke();
    
    ctx.fillStyle = '#8B8B83';
    ctx.fillRect(x - 18, y + 2, 5, 20);
    ctx.stroke();
    ctx.fillRect(x + 13, y + 2, 5, 20);
    ctx.stroke();
    
    ctx.fillStyle = '#DC143C';
    ctx.beginPath();
    ctx.moveTo(x - 18, y - 2);
    ctx.lineTo(x, y - 15);
    ctx.lineTo(x + 18, y - 2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(x - 14, y + 2, 28, 16);
    ctx.stroke();
    
    ctx.fillStyle = '#654321';
    ctx.fillRect(x - 6, y + 8, 12, 10);
    ctx.stroke();
    
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(x + 4, y + 13, 1.5, 0, Math.PI * 2);
    ctx.fill();
    
  } else if (type === 'tower' || areaId === 2) {
    ctx.fillStyle = '#A9A9A9';
    ctx.strokeStyle = OL;
    ctx.lineWidth = LW;
    
    ctx.fillRect(x - 12, y - 8, 24, 28);
    ctx.stroke();
    
    ctx.fillStyle = '#8B6914';
    ctx.beginPath();
    ctx.moveTo(x - 14, y - 8);
    ctx.lineTo(x, y - 22);
    ctx.lineTo(x + 14, y - 8);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    
    ctx.fillStyle = '#87CEEB';
    ctx.lineWidth = 1;
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 2; col++) {
        const wx = x - 6 + col * 10;
        const wy = y - 2 + row * 8;
        ctx.fillRect(wx, wy, 4, 4);
        ctx.strokeStyle = OL;
        ctx.lineWidth = 1;
        ctx.strokeRect(wx, wy, 4, 4);
      }
    }
    
    ctx.fillStyle = '#654321';
    ctx.fillRect(x - 4, y + 14, 8, 10);
    ctx.strokeStyle = OL;
    ctx.lineWidth = LW;
    ctx.strokeRect(x - 4, y + 14, 8, 10);
    
  } else if (type === 'cottage' || areaId === 3) {
    ctx.fillStyle = '#D4A574';
    ctx.strokeStyle = OL;
    ctx.lineWidth = LW;
    
    ctx.beginPath();
    ctx.ellipse(x, y + 4, 18, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.ellipse(x, y - 8, 20, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    
    ctx.fillStyle = '#654321';
    ctx.beginPath();
    ctx.ellipse(x - 4, y + 8, 4, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(x - 2, y + 8, 1, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#87CEEB';
    ctx.beginPath();
    ctx.arc(x + 6, y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = OL;
    ctx.lineWidth = LW;
    ctx.stroke();
    
    ctx.fillStyle = '#654321';
    ctx.fillRect(x + 14, y - 12, 3, 10);
    ctx.stroke();
    
  } else if (type === 'observatory' || areaId === 4) {
    ctx.fillStyle = '#FFF';
    ctx.strokeStyle = OL;
    ctx.lineWidth = LW;
    
    ctx.fillRect(x - 14, y + 2, 28, 14);
    ctx.stroke();
    
    ctx.fillStyle = '#DDD';
    ctx.beginPath();
    ctx.ellipse(x, y - 6, 16, 12, 0, 0, Math.PI);
    ctx.fill();
    ctx.stroke();
    
    ctx.fillStyle = '#AAA';
    ctx.beginPath();
    ctx.ellipse(x, y - 8, 12, 6, 0, 0, Math.PI);
    ctx.fill();
    ctx.stroke();
    
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.ellipse(x, y - 10, 2, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#87CEEB';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const wx = x - 10 + i * 10;
      ctx.fillRect(wx, y + 4, 4, 4);
      ctx.strokeStyle = OL;
      ctx.lineWidth = 1;
      ctx.strokeRect(wx, y + 4, 4, 4);
    }
    
    ctx.fillStyle = '#654321';
    ctx.fillRect(x - 4, y + 10, 8, 8);
    ctx.strokeStyle = OL;
    ctx.lineWidth = LW;
    ctx.strokeRect(x - 4, y + 10, 8, 8);
  }
}

function drawBackground(ctx, w, h, areaId, frame) {
  
  if (areaId === 1) {
    const skyGradient = ctx.createLinearGradient(0, 0, 0, h);
    skyGradient.addColorStop(0, '#87CEEB');
    skyGradient.addColorStop(1, '#E0F6FF');
    ctx.fillStyle = skyGradient;
    ctx.fillRect(0, 0, w, h);
    
    const cloudOffset = (frame % 200) / 200 * w;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    
    ctx.beginPath();
    ctx.ellipse(cloudOffset + 50, 40, 35, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cloudOffset + 30, 50, 25, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cloudOffset + 70, 50, 25, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.beginPath();
    ctx.ellipse(cloudOffset + 200, 80, 40, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cloudOffset + 175, 95, 28, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cloudOffset + 225, 95, 28, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = 'rgba(255, 192, 203, 0.6)';
    for (let i = 0; i < 8; i++) {
      const px = (frame * 0.5 + i * 40) % w;
      const py = (50 + i * 20 + Math.sin(frame * 0.05 + i) * 10) % h;
      ctx.beginPath();
      ctx.ellipse(px, py, 3, 2, Math.PI / 4, 0, Math.PI * 2);
      ctx.fill();
    }
    
  } else if (areaId === 2) {
    const sunsetGradient = ctx.createLinearGradient(0, 0, 0, h);
    sunsetGradient.addColorStop(0, '#FFB347');
    sunsetGradient.addColorStop(0.5, '#FF8C69');
    sunsetGradient.addColorStop(1, '#FF6347');
    ctx.fillStyle = sunsetGradient;
    ctx.fillRect(0, 0, w, h);
    
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(w - 80, h - 100, 40, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(w - 80 + Math.cos(angle) * 45, h - 100 + Math.sin(angle) * 45);
      ctx.lineTo(w - 80 + Math.cos(angle) * 65, h - 100 + Math.sin(angle) * 65);
      ctx.stroke();
    }
    
    ctx.fillStyle = '#8B7355';
    ctx.fillRect(0, h - 60, w, 60);
    
    ctx.strokeStyle = '#6BA84D';
    ctx.lineWidth = 1;
    for (let i = 0; i < w; i += 8) {
      ctx.beginPath();
      ctx.moveTo(i, h - 60);
      ctx.lineTo(i + 3, h - 70);
      ctx.stroke();
    }
    
  } else if (areaId === 3) {
    ctx.fillStyle = '#2D5016';
    ctx.fillRect(0, 0, w, h * 0.6);
    
    ctx.fillStyle = '#1B4D0E';
    ctx.fillRect(0, h * 0.6, w, h * 0.4);
    
    ctx.fillStyle = '#0D3D00';
    for (let i = 0; i < 5; i++) {
      const tx = i * (w / 4.5) + 20;
      ctx.fillRect(tx, h * 0.5, 8, 30);
      ctx.beginPath();
      ctx.moveTo(tx + 4, h * 0.3);
      ctx.lineTo(tx - 15, h * 0.5);
      ctx.lineTo(tx + 23, h * 0.5);
      ctx.closePath();
      ctx.fill();
    }
    
    ctx.fillStyle = 'rgba(255, 255, 0, 0.8)';
    for (let i = 0; i < 6; i++) {
      const fx = 60 + i * 120 + Math.sin(frame * 0.1 + i) * 20;
      const fy = 100 + i * 40 + Math.cos(frame * 0.08 + i) * 15;
      const alpha = 0.3 + Math.sin(frame * 0.15 + i) * 0.5;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(fx, fy, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    
  } else if (areaId === 4) {
    const nightGradient = ctx.createLinearGradient(0, 0, 0, h);
    nightGradient.addColorStop(0, '#001a4d');
    nightGradient.addColorStop(1, '#0d0033');
    ctx.fillStyle = nightGradient;
    ctx.fillRect(0, 0, w, h);
    
    ctx.fillStyle = '#FFF8DC';
    ctx.beginPath();
    ctx.arc(w - 80, 60, 30, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#E8E8D0';
    ctx.beginPath();
    ctx.arc(w - 75, 45, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(w - 90, 65, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(w - 65, 70, 2.5, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#FFF';
    for (let i = 0; i < 30; i++) {
      const sx = (i * 73) % w;
      const sy = (i * 47) % (h * 0.6);
      const brightness = 0.3 + Math.sin(frame * 0.05 + i) * 0.7;
      ctx.globalAlpha = brightness;
      ctx.beginPath();
      ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, h - 40, w, 40);
  }
}

  { name: 'シバイヌ', emoji: '🐕', draw: drawShiba, color: '#D4905A' },

  { name: 'ヒツジ', emoji: '🐑', draw: drawSheep, color: '#FFF' },
];

const AREAS = [
  { id: 1, name: '和の占い通り', emoji: '⛩️' },
  { id: 2, name: '西洋占い広場', emoji: '🏛️' },
  { id: 3, name: 'ふしぎ占い森', emoji: '🌲' },
  { id: 4, name: '星空占いの丘', emoji: '⭐' },
];

class Game {
  constructor() {
    this.canvas = document.getElementById('gcanvas');
    this.ctx = this.canvas.getContext('2d');
    this.playerName = '';
    this.fortuneType = 'general';
    this.currentArea = 1;
    this.frame = 0;
    this.history = [];
    this.album = [];
    this.playerX = 0;
    this.playerY = 0;
    this.buildings = [];
    this.npcs = [];
    
    this.resizeCanvas();
    window.addEventListener('resize', () => this.resizeCanvas());
  }
  
  resizeCanvas() {
    this.canvas.width = this.canvas.clientWidth * window.devicePixelRatio;
    this.canvas.height = this.canvas.clientHeight * window.devicePixelRatio;
    this.ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  
  showProfileSetup() {
    this.switchScreen('profile-screen');
  }
  
  startGame() {
    const nameInput = document.getElementById('playerNameInput');
    const typeInput = document.getElementById('fortuneTypeInput');
    this.playerName = nameInput.value || 'さん';
    this.fortuneType = typeInput.value;
    this.loadArea(1);
    this.switchScreen('game-screen');
  }
  
  loadArea(areaNum) {
    this.currentArea = areaNum;
    this.buildings = this.generateBuildings(areaNum);
    this.npcs = this.generateNPCs(areaNum);
    this.playerX = this.canvas.clientWidth / 2;
    this.playerY = this.canvas.clientHeight * 0.5;
    document.getElementById('area-name').textContent = AREAS[areaNum - 1].name;
  }
  
  generateBuildings(areaId) {
    const w = this.canvas.clientWidth;
    const h = this.canvas.clientHeight;
    const groundY = h * 0.62;
    const row1Y = h * 0.15;
    const row2Y = h * 0.40;
    
    return [
      { x: w * 0.17, y: row1Y, type: areaId === 1 ? 'shrine' : areaId === 2 ? 'tower' : areaId === 3 ? 'cottage' : 'observatory', npcIdx: 0 },
      { x: w * 0.50, y: row1Y, type: areaId === 1 ? 'shrine' : areaId === 2 ? 'tower' : areaId === 3 ? 'cottage' : 'observatory', npcIdx: 1 },
      { x: w * 0.83, y: row1Y, type: areaId === 1 ? 'shrine' : areaId === 2 ? 'tower' : areaId === 3 ? 'cottage' : 'observatory', npcIdx: 2 },
      { x: w * 0.17, y: row2Y, type: areaId === 1 ? 'shrine' : areaId === 2 ? 'tower' : areaId === 3 ? 'cottage' : 'observatory', npcIdx: 3 },
      { x: w * 0.50, y: row2Y, type: areaId === 1 ? 'shrine' : areaId === 2 ? 'tower' : areaId === 3 ? 'cottage' : 'observatory', npcIdx: 4 },
      { x: w * 0.83, y: row2Y, type: areaId === 1 ? 'shrine' : areaId === 2 ? 'tower' : areaId === 3 ? 'cottage' : 'observatory', npcIdx: 5 },
    ];
  }
  
  generateNPCs(areaId) {
    return ANIMALS.slice(0, 12).map((animal, idx) => {
      const building = this.buildings[idx % 6];
      return {
        animal: animal,
        x: building.x + 30,
        y: building.y + 20,
        buildingIdx: idx % 6,
      };
    });
  }
  
  switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  }
  
  gameLoop() {
    const w = this.canvas.clientWidth;
    const h = this.canvas.clientHeight;
    
    drawBackground(this.ctx, w, h, this.currentArea, this.frame);
    
    for (let b of this.buildings) {
      drawBuilding(this.ctx, b.x, b.y, b.type, this.currentArea);
    }
    
    for (let npc of this.npcs) {
      this.ctx.save();
      this.ctx.translate(npc.x, npc.y);
      const legSwing = Math.sin((this.frame % 20) / 20 * Math.PI) * 1;
      npc.animal.draw(this.ctx, 0, 0, legSwing, npc.animal.color);
      this.ctx.restore();
    }
    
    drawPlayerShiba(this.ctx, this.playerX, h * 0.72, this.frame);
    
    this.frame++;
    requestAnimationFrame(() => this.gameLoop());
  }
  
  handleCanvasClick(e) {
    const rect = this.canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    for (let npc of this.npcs) {
      if (Math.hypot(npc.x - x, npc.y - y) < 30) {
        this.showNPCModal(npc);
        return;
      }
    }
    
    for (let b of this.buildings) {
      if (Math.hypot(b.x - x, b.y - y) < 40) {
        this.showBuildingModal(b);
        return;
      }
    }
  }
  
  showBuildingModal(building) {
    const modal = document.getElementById('modal');
    const mbox = document.getElementById('mbox');
    mbox.innerHTML = `
      <div class="me">✨</div>
      <h3>${AREAS[this.currentArea - 1].name}</h3>
      <p>占いの館へようこそ</p>
      <button class="mbtn" onclick="game.showFortune()">占ってもらう</button>
      <button class="mbtn" style="background: #999;" onclick="game.closeModal()">もどる</button>
    `;
    modal.classList.add('show');
  }
  
  showNPCModal(npc) {
    const modal = document.getElementById('modal');
    const mbox = document.getElementById('mbox');
    mbox.innerHTML = `
      <div class="me">${npc.animal.emoji}</div>
      <h3>${npc.animal.name}</h3>
      <p>こんにちは！</p>
      <button class="option-btn" onclick="game.showNPCConversation('${npc.animal.name}', 0)">豆知識</button>
      <button class="option-btn" onclick="game.showNPCConversation('${npc.animal.name}', 1)">アドバイス</button>
      <button class="option-btn" onclick="game.showNPCConversation('${npc.animal.name}', 2)">自己紹介</button>
      <button class="option-btn" style="background: #999; color: #fff; border-color: #999;" onclick="game.closeModal()">さよなら</button>
    `;
    modal.classList.add('show');
  }
  
  showNPCConversation(name, type) {
    const modal = document.getElementById('modal');
    const mbox = document.getElementById('mbox');
    let content = '';
    
    if (type === 0) {
      content = `<strong>占いの豆知識</strong><br><br>${name}から占いについての興味深い話を聞きました。`;
    } else if (type === 1) {
      content = `<strong>今日のアドバイス</strong><br><br>あなたの直感を信じ、今この瞬間を大切にしてください。${name}より`;
    } else if (type === 2) {
      content = `<strong>自己紹介</strong><br><br>私は${name}。占いを通じて多くの人を導いてきました。`;
    }
    
    mbox.innerHTML = `
      <div class="fortune-result">${content}</div>
      <button class="mbtn" onclick="game.closeModal()">もどる</button>
    `;
  }
  
  showFortune() {
    const fortunes = [
      '大吉：素晴らしい運に恵まれます',
      '中吉：良い流れが来ています',
      '小吉：少しずつ運が向いています',
      '吉：努力が実ります',
      '凶：今は準備の時。焦らず待ちましょう',
    ];
    
    const result = fortunes[Math.floor(Math.random() * fortunes.length)];
    const today = new Date().toLocaleString('ja-JP');
    
    this.history.push({ date: today, result: result });
    localStorage.setItem('fortuneHistory', JSON.stringify(this.history));
    
    const modal = document.getElementById('modal');
    const mbox = document.getElementById('mbox');
    mbox.innerHTML = `
      <div class="me">🔮</div>
      <h3>占い結果</h3>
      <div class="fortune-result">
        <strong>${this.playerName}さんの${this.fortuneType === 'love' ? '恋愛' : this.fortuneType === 'fortune' ? '金' : this.fortuneType === 'health' ? '健康' : this.fortuneType === 'career' ? '仕事' : '総合'}運</strong><br><br>
        ${result}<br><br>
        <small>${today}</small>
      </div>
      <button class="mbtn" onclick="game.closeModal()">わかりました</button>
    `;
    modal.classList.add('show');
  }
  
  showHistory() {
    const modal = document.getElementById('modal');
    const mbox = document.getElementById('mbox');
    
    if (this.history.length === 0) {
      mbox.innerHTML = '<p>まだ占い結果がありません</p><button class="mbtn" onclick="game.closeModal()">もどる</button>';
    } else {
      let html = '<h3>占い履歴</h3>';
      this.history.forEach((item, idx) => {
        html += `<div class="fortune-result"><strong>占い ${idx + 1}</strong><br>${item.date}<br>${item.result}</div>`;
      });
      html += '<button class="mbtn" onclick="game.closeModal()">もどる</button>';
      mbox.innerHTML = html;
    }
    modal.classList.add('show');
  }
  
  showAlbum() {
    const modal = document.getElementById('modal');
    const mbox = document.getElementById('mbox');
    mbox.innerHTML = `
      <h3>📚 図鑑</h3>
      <p>12の動物たちに会いました：</p>
      ${ANIMALS.map((a, i) => `<div style="margin: 8px 0;">${a.emoji} ${a.name}</div>`).join('')}
      <button class="mbtn" onclick="game.closeModal()">もどる</button>
    `;
    modal.classList.add('show');
  }
  
  closeModal() {
    document.getElementById('modal').classList.remove('show');
  }
  
  prevArea() {
    this.currentArea = this.currentArea === 1 ? 4 : this.currentArea - 1;
    this.loadArea(this.currentArea);
  }
  
  nextArea() {
    this.currentArea = this.currentArea === 4 ? 1 : this.currentArea + 1;
    this.loadArea(this.currentArea);
  }
  
  goToTitle() {
    this.switchScreen('title-screen');
    this.frame = 0;
  }
}

const game = new Game();

// Event listeners
document.addEventListener('DOMContentLoaded', () => {
  game.canvas.addEventListener('click', (e) => game.handleCanvasClick(e));
  game.gameLoop();
  
  // Generate stars
  const starsContainer = document.getElementById('stars-ct');
  if (starsContainer) {
    for (let i = 0; i < 50; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.width = Math.random() * 2 + 'px';
      star.style.height = star.style.width;
      star.style.animationDelay = Math.random() * 2 + 's';
      starsContainer.appendChild(star);
    }
  }
});
</script>
</body>
</html>
