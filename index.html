<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>柴犬占い師の館</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'Hiragino Maru Gothic ProN','Hiragino Sans','Meiryo',sans-serif;touch-action:none;}
#app{width:100%;height:100%;position:relative;overflow:hidden;}
.screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0;flex-direction:column;opacity:0;transition:opacity 0.35s ease-in-out;}
.screen.active{display:flex;opacity:1;}
.screen.fade-out{opacity:0;}
#title-screen{background:linear-gradient(180deg,#1a1230 0%,#2d2255 35%,#3d2a6a 65%,#1a1230 100%);justify-content:center;align-items:center;gap:32px;overflow:hidden;}
.title-stars{position:absolute;width:100%;height:100%;pointer-events:none;overflow:hidden;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:.2}to{opacity:1}}
.title-logo{text-align:center;z-index:1;}
.title-text{color:#FFB74D;font-size:28px;font-weight:bold;margin-top:10px;text-shadow:0 0 20px rgba(255,183,77,.5);letter-spacing:3px;}
.title-sub{color:#FFCC80;font-size:14px;margin-top:6px;}
.title-desc{background:rgba(0,0,0,.45);border:1px solid rgba(255,183,77,.3);border-radius:14px;padding:14px 20px;max-width:320px;text-align:center;z-index:1;}
.title-desc p{color:#fff;font-size:13px;line-height:1.7;}
.btn-p{background:linear-gradient(135deg,#FFB74D,#FF8F00);color:#fff;border:none;border-radius:50px;padding:16px 52px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1;box-shadow:0 4px 24px rgba(255,143,0,.5);transition:transform .1s;font-family:inherit;}
.btn-p:active{transform:scale(.95);}
#game-screen{background:#111;}
#gcanvas{display:block;width:100%;flex:1;touch-action:none;cursor:pointer;}
#hud{position:absolute;top:env(safe-area-inset-top,8px);left:8px;z-index:10;display:flex;flex-direction:column;gap:5px;}
.hud-pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:12px;padding:4px 10px;font-size:10px;color:#fff;display:flex;align-items:center;gap:5px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 2px 8px rgba(0,0,0,.15);}
.hud-pill b{color:#FFB74D;}
#bottom-ui{background:linear-gradient(180deg,rgba(26,26,48,.95),rgba(18,18,42,.98));padding:10px 12px env(safe-area-inset-bottom,10px);display:flex;flex-direction:column;gap:7px;border-top:1px solid rgba(255,183,77,.2);flex-shrink:0;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.area-row{display:flex;justify-content:space-between;align-items:center;}
.area-nm{color:#FFB74D;font-size:12px;font-weight:bold;}
#modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;}
#modal.show{display:flex;}
#mbox{background:#fff;border-radius:24px;padding:28px 22px;max-width:340px;width:92%;text-align:center;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalPop .3s ease-out;}
@keyframes modalPop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
#mbox h3{font-size:18px;color:#333;margin-bottom:6px;}
#mbox p{font-size:12px;color:#666;line-height:1.6;margin-bottom:14px;}
.mbtn{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:12px 30px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;margin:4px;}
#fortune-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:16px;}
#fortune-overlay.show{display:flex;}
#fortune-box{background:linear-gradient(135deg,#FFFDF5,#FFF8E1);border-radius:24px;padding:24px;max-width:360px;width:100%;max-height:75vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalPop .3s ease-out;}
#fortune-box h2{color:#E65100;font-size:18px;margin-bottom:4px;text-align:center;}
#fortune-box .fortune-type{color:#999;font-size:11px;text-align:center;margin-bottom:12px;}
#fortune-box .fortune-result{background:#fff;border:2px solid #FFB74D;border-radius:14px;padding:16px;margin:12px 0;text-align:center;}
#fortune-box .fortune-level{color:#FF8F00;font-size:20px;font-weight:bold;margin-bottom:8px;}
#fortune-box .fortune-text{color:#333;font-size:13px;line-height:1.8;white-space:pre-wrap;}
.fortune-close{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:12px 40px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;margin-top:16px;width:100%;}
</style>
</head>
<body>
<div id="app">
<div id="title-screen" class="screen active">
<div class="title-stars"></div>
<div class="title-logo">
<canvas id="title-canvas" width="200" height="120" style="display:block;margin:0 auto;"></canvas>
<div class="title-text">柴犬占い師の館</div>
<div class="title-sub">運命を占いましょう</div>
</div>
<div class="title-desc">
<p>6つの占いの館を巡って、柴犬占い師たちから運命を占ってもらおう！</p>
</div>
<button class="btn-p" id="start-btn">占いをはじめる</button>
</div>

<div id="game-screen" class="screen">
<canvas id="gcanvas" width="400" height="600"></canvas>
<div id="hud">
<div class="hud-pill"><b>現在地:</b> <span id="area-name">村</span></div>
<div class="hud-pill"><b>占い数:</b> <span id="fortune-count">0</span></div>
</div>
<div id="bottom-ui">
<div class="area-row">
<div class="area-nm" id="area-title">占い村</div>
</div>
</div>
</div>

<div id="modal">
<div id="mbox">
<h3 id="modal-title">占い師</h3>
<p id="modal-message">こんにちは</p>
<button class="mbtn" id="modal-btn">占ってもらう</button>
<button class="mbtn" style="background:#999;" id="modal-close">閉じる</button>
</div>
</div>

<div id="fortune-overlay">
<div id="fortune-box">
<h2 id="fortune-name">占い</h2>
<div class="fortune-type" id="fortune-type-label"></div>
<div class="fortune-result">
<div class="fortune-level" id="fortune-level">大吉</div>
<div class="fortune-text" id="fortune-text">運が良い日です</div>
</div>
<button class="fortune-close" id="fortune-btn-close">閉じる</button>
</div>
</div>
</body>

function drawDog(x, y, colorMain, colorBelly, frame, isNPC) {
  ctx.fillStyle = 'rgba(0,0,0,.1)';
  ctx.beginPath();
  ctx.ellipse(x, y + 16, 16, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = colorMain;
  ctx.beginPath();
  ctx.ellipse(x, y, 24, 18, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = colorBelly;
  ctx.beginPath();
  ctx.ellipse(x, y + 6, 14, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = colorMain;
  ctx.beginPath();
  ctx.arc(x + 22, y - 12, 13, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(x + 16, y - 26);
  ctx.lineTo(x + 12, y - 36);
  ctx.lineTo(x + 24, y - 28);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(x + 28, y - 26);
  ctx.lineTo(x + 32, y - 36);
  ctx.lineTo(x + 36, y - 28);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(x + 18, y - 15, 4, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + 28, y - 15, 4, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(x + 18, y - 14, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 28, y - 14, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(x + 23, y - 8, 2, 0, Math.PI * 2);
  ctx.fill();

  const tailWag = Math.sin((frame + Math.random() * 30) * 0.08) * 12;
  ctx.strokeStyle = colorMain;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - 24, y + 6);
  ctx.quadraticCurveTo(x - 38, y - 4 + tailWag, x - 42, y - 14 + tailWag);
  ctx.stroke();
}

function drawAreaFeature(id, w, h) {
  if (id === 'village') {
    ctx.fillStyle = '#CD853F';
    ctx.fillRect(w * 0.15, h * 0.35, 60, 50);
    ctx.fillStyle = '#FF4500';
    ctx.beginPath();
    ctx.moveTo(w * 0.15, h * 0.35);
    ctx.lineTo(w * 0.15 + 30, h * 0.25);
    ctx.lineTo(w * 0.15 + 60, h * 0.35);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = 'rgba(66,165,245,.5)';
    ctx.beginPath();
    ctx.arc(w * 0.8, h * 0.45, 20, 0, Math.PI * 2);
    ctx.fill();
  } else if (id === 'tarot') {
    ctx.fillStyle = '#6A0DAD';
    ctx.fillRect(w * 0.15, h * 0.3, 80, 70);
    ctx.fillStyle = '#9C27B0';
    ctx.beginPath();
    ctx.moveTo(w * 0.15, h * 0.3);
    ctx.lineTo(w * 0.15 + 40, h * 0.15);
    ctx.lineTo(w * 0.15 + 80, h * 0.3);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = '#FFB74D';
    ctx.beginPath();
    ctx.arc(w * 0.55, h * 0.4, 15, 0, Math.PI * 2);
    ctx.fill();
  } else if (id === 'shrine') {
    ctx.strokeStyle = '#D32F2F';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(w * 0.3, h * 0.5);
    ctx.lineTo(w * 0.7, h * 0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w * 0.4, h * 0.5);
    ctx.lineTo(w * 0.4, h * 0.35);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w * 0.6, h * 0.5);
    ctx.lineTo(w * 0.6, h * 0.35);
    ctx.stroke();
    
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(w * 0.35, h * 0.55, 50, 40);
  } else if (id === 'zodiac') {
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(w * 0.5, h * 0.35, 8, 0, Math.PI * 2);
    ctx.stroke();
    
    ctx.fillStyle = '#FFD700';
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2;
      const px = w * 0.7 + Math.cos(angle) * 40;
      const py = h * 0.3 + Math.sin(angle) * 40;
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (id === 'spring') {
    ctx.fillStyle = 'rgba(30,136,229,.6)';
    ctx.beginPath();
    ctx.ellipse(w * 0.5, h * 0.45, 40, 25, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = 'rgba(66,165,245,.8)';
    ctx.beginPath();
    ctx.ellipse(w * 0.5, h * 0.45, 25, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#00BCD4';
    ctx.beginPath();
    ctx.moveTo(w * 0.3, h * 0.5);
    ctx.lineTo(w * 0.25, h * 0.65);
    ctx.lineTo(w * 0.35, h * 0.65);
    ctx.closePath();
    ctx.fill();
  } else if (id === 'alley') {
    ctx.fillStyle = '#FF6F00';
    ctx.fillRect(w * 0.15, h * 0.4, 40, 40);
    ctx.fillStyle = '#2196F3';
    ctx.fillRect(w * 0.25, h * 0.35, 40, 45);
    ctx.fillStyle = '#4CAF50';
    ctx.fillRect(w * 0.35, h * 0.42, 40, 38);
  }
}

function drawMinimap(w, h) {
  const mmX = w - 60, mmY = 10, mmW = 50, mmH = 50;
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.fillRect(mmX, mmY, mmW, mmH);
  ctx.strokeStyle = '#FFB74D';
  ctx.lineWidth = 2;
  ctx.strokeRect(mmX, mmY, mmW, mmH);

  for (let i = 0; i < 6; i++) {
    const row = Math.floor(i / 3);
    const col = i % 3;
    const px = mmX + 5 + col * 15;
    const py = mmY + 5 + row * 20;
    
    ctx.fillStyle = i === G.areaIdx ? '#FFB74D' : '#666';
    ctx.beginPath();
    ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParticles(w, h) {
  ctx.fillStyle = 'rgba(255,183,77,.6)';
  for (let i = 0; i < 3; i++) {
    const x = (G.frame * 2 + i * 100) % w;
    const y = h * 0.2 + Math.sin(G.frame * 0.05 + i) * 30;
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBubbles() {
  G.bubbles.forEach(b => {
    ctx.globalAlpha = Math.min(1, b.life / 20);
    ctx.fillStyle = 'rgba(0,0,0,.7)';
    ctx.beginPath();
    ctx.roundRect(b.x - 40, b.y - 15, 80, 24, 8);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(b.text, b.x, b.y + 4);
  });
  G.bubbles = G.bubbles.filter(b => {
    b.life--;
    b.y -= 1;
    return b.life > 0;
  });
}

function showFortune(type, npcName) {
  const overlay = document.getElementById('fortune-overlay');
  const nameEl = document.getElementById('fortune-name');
  const typeEl = document.getElementById('fortune-type-label');
  const levelEl = document.getElementById('fortune-level');
  const textEl = document.getElementById('fortune-text');

  nameEl.textContent = npcName;
  
  let result = '';
  if (type === 'tarot') {
    const cards = Object.keys(fortuneData.tarot);
    const card = cards[Math.floor(Math.random() * cards.length)];
    const isUpright = Math.random() > 0.5;
    typeEl.textContent = card + (isUpright ? ' 正位置' : ' 逆位置');
    const readings = isUpright ? fortuneData.tarot[card].upright : fortuneData.tarot[card].reverse;
    result = readings[Math.floor(Math.random() * readings.length)];
    levelEl.textContent = isUpright ? '良い兆候' : '注意が必要';
  } else if (type === 'omikuji') {
    const levels = ['大吉', '中吉', '小吉', '末吉', '凶', '大凶'];
    const level = levels[Math.floor(Math.random() * levels.length)];
    typeEl.textContent = 'おみくじ';
    const readings = fortuneData.omikuji[level];
    result = readings[Math.floor(Math.random() * readings.length)];
    levelEl.textContent = level;
  } else if (type === 'zodiac') {
    const signs = Object.keys(fortuneData.zodiac);
    const sign = signs[Math.floor(Math.random() * signs.length)];
    typeEl.textContent = '星座: ' + sign;
    const categories = ['全体運', '恋愛運', '仕事運'];
    const cat = categories[Math.floor(Math.random() * categories.length)];
    result = fortuneData.zodiac[sign][cat];
    levelEl.textContent = cat;
  } else if (type === 'numerology') {
    const num = Math.ceil(Math.random() * 9);
    typeEl.textContent = '数秘 ' + num;
    result = fortuneData.numerology[num];
    levelEl.textContent = '数秘術 ' + num;
  } else if (type === 'blood') {
    const types = ['O型', 'A型', 'B型', 'AB型'];
    const btype = types[Math.floor(Math.random() * types.length)];
    typeEl.textContent = '血液型: ' + btype;
    const readings = fortuneData.blood[btype];
    result = readings[Math.floor(Math.random() * readings.length)];
    levelEl.textContent = btype;
  } else if (type === 'moon') {
    const phases = ['新月', '上弦', '満月', '下弦', '月食', '日食'];
    const phase = phases[Math.floor(Math.random() * phases.length)];
    typeEl.textContent = '月相: ' + phase;
    result = fortuneData.moon[phase];
    levelEl.textContent = phase;
  } else if (type === 'funny') {
    typeEl.textContent = '面白占い';
    result = fortuneData.funny[Math.floor(Math.random() * fortuneData.funny.length)];
    levelEl.textContent = 'わっはっは！';
  }

  textEl.textContent = result;
  overlay.classList.add('show');
  
  document.getElementById('fortune-btn-close').onclick = () => {
    overlay.classList.remove('show');
  };
}

function spawnNPCs() {
  G.npcs = [];
  for (const npc of npcData) {
    if (npc.area === G.areaIdx) {
      G.npcs.push({
        ...npc,
        x: Math.random() * (cW - 80) + 40,
        y: Math.random() * (cH * 0.6 - 150) + cH * 0.25,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.3,
        frame: 0
      });
    }
  }
}

function moveNPCs() {
  for (const n of G.npcs) {
    n.x += n.vx;
    n.y += n.vy;
    
    if (n.x < 30 || n.x > cW - 30) n.vx *= -1;
    if (n.y < cH * 0.25 || n.y > cH * 0.85) n.vy *= -1;
    
    if (Math.random() > 0.98) {
      n.vx = (Math.random() - 0.5) * 0.6;
      n.vy = (Math.random() - 0.5) * 0.4;
    }
    n.frame++;
  }
}

function drawAll() {
  if (!ctx) return;
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const a = areas[G.areaIdx];

  const sky = ctx.createLinearGradient(0, 0, 0, h * 0.45);
  sky.addColorStop(0, a.sky[0]);
  sky.addColorStop(0.5, a.sky[1]);
  sky.addColorStop(1, a.sky[2]);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, h * 0.45);

  const grd = ctx.createLinearGradient(0, h * 0.45, 0, h);
  grd.addColorStop(0, a.ground[0]);
  grd.addColorStop(0.4, a.ground[1]);
  grd.addColorStop(1, a.ground[2]);
  ctx.fillStyle = grd;
  ctx.fillRect(0, h * 0.45, w, h * 0.55);

  drawAreaFeature(a.id, w, h);
  drawParticles(w, h);

  for (const n of G.npcs) {
    drawDog(n.x, n.y, n.colorMain, n.colorBelly, n.frame, true);
  }

  drawDog(G.dx, G.dy, G.myDogColor, G.myDogBelly, G.frame, false);
  drawBubbles();

  ctx.globalAlpha = 0.3 + Math.sin(G.frame / 15) * 0.15;
  ctx.fillStyle = '#FFB74D';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('◀', 18, h / 2);
  ctx.fillText('▶', w - 18, h / 2);
  ctx.fillText('▲', w / 2, 24);
  ctx.fillText('▼', w / 2, h - 12);
  ctx.globalAlpha = 1;

  drawMinimap(w, h);
}

function gameLoop() {
  G.frame++;
  G.gtime++;

  if (G.tx !== null) {
    const dx = G.tx - G.px;
    const dy = G.ty - G.py;
    const d = Math.hypot(dx, dy);
    if (d > 3) {
      const ease = Math.min(0.12, 4.0 / d);
      G.px += dx * ease;
      G.py += dy * ease;
    } else {
      G.tx = null;
      G.ty = null;
    }
  }

  const targetX = G.px + 25;
  const targetY = G.py + 15;
  const dx2 = targetX - G.dx;
  const dy2 = targetY - G.dy;
  const d2 = Math.hypot(dx2, dy2);
  if (d2 > 5) {
    const lerp = 0.08;
    G.dx += dx2 * lerp;
    G.dy += dy2 * lerp;
  }

  moveNPCs();

  const m = 25;
  G.px = Math.max(m, Math.min(cW - m, G.px));
  G.py = Math.max(cH * 0.25, Math.min(cH * 0.85, G.py));

  drawAll();
}

function startLoop() {
  if (G.loopRunning) return;
  G.loopRunning = true;
  G.lastTime = performance.now();
  requestAnimationFrame(gameFrame);
}

function gameFrame(now) {
  if (!G.loopRunning) return;
  const dt = now - G.lastTime;
  if (dt >= 16) {
    G.lastTime = now;
    gameLoop();
  }
  requestAnimationFrame(gameFrame);
}

function changeArea(idx) {
  if (idx < 0 || idx >= areas.length) return;
  G.areaIdx = idx;
  G.px = cW / 2;
  G.py = cH * 0.7;
  G.dx = cW / 2;
  G.dy = cH * 0.7;
  spawnNPCs();
  
  document.getElementById('area-name').textContent = areas[idx].name;
  document.getElementById('area-title').textContent = areas[idx].name;
}

document.getElementById('start-btn').onclick = () => {
  document.getElementById('title-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  
  titleCtx.clearRect(0, 0, titleCanvas.width, titleCanvas.height);
  drawDog(100, 60, '#C9A772', '#E8D5C4', 0, false);
  
  changeArea(0);
  startLoop();
};

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  
  G.tx = x;
  G.ty = y;
});

canvas.addEventListener('touchstart', (e) => {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
  const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
  
  for (const n of G.npcs) {
    if (Math.hypot(x - n.x, y - n.y) < 30) {
      talkNPC(n);
      e.preventDefault();
      return;
    }
  }
  
  G.tx = x;
  G.ty = y;
  
  if (x < 30) changeArea(G.areaIdx - 3);
  else if (x > cW - 30) changeArea(G.areaIdx + 3);
  else if (y < 30) changeArea(G.areaIdx - 1);
  else if (y > cH - 30) changeArea(G.areaIdx + 1);
});

function talkNPC(npc) {
  const modal = document.getElementById('modal');
  const title = document.getElementById('modal-title');
  const msg = document.getElementById('modal-message');
  const btn = document.getElementById('modal-btn');
  
  title.textContent = npc.name;
  msg.textContent = npc.greeting;
  
  btn.onclick = () => {
    modal.classList.remove('show');
    showFortune(npc.type, npc.name);
    G.fortuneCount++;
    document.getElementById('fortune-count').textContent = G.fortuneCount;
  };
  
  document.getElementById('modal-close').onclick = () => {
    modal.classList.remove('show');
  };
  
  modal.classList.add('show');
}

window.addEventListener('resize', () => {
  cW = canvas.width;
  cH = canvas.height;
});

window.addEventListener('load', () => {
  drawDog(100, 60, '#C9A772', '#E8D5C4', 0, false);
});
