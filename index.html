<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柴犬うらないハウス</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fffef0;
            color: #333;
            overflow: hidden;
            height: 100vh;
        }

        /* Screen System */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            background: #fffef0;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Title Screen */
        .title-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .title-screen h1 {
            font-size: 3em;
            color: #d4791f;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(212, 121, 31, 0.1);
        }

        .title-screen p {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 40px;
        }

        .btn-start {
            background: #FFB74D;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 183, 77, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-start:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(255, 183, 77, 0.3);
        }

        /* Game Screen */
        .game-screen {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .game-header {
            padding: 15px;
            background: rgba(255, 255, 240, 0.95);
            border-bottom: 2px solid #FFB74D;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-header h2 {
            color: #d4791f;
            font-size: 1.5em;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            background: #FFB74D;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9em;
            transition: transform 0.2s;
        }

        .header-btn:active {
            transform: scale(0.95);
        }

        .game-canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 1.8em;
            color: #d4791f;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 15px;
            text-align: center;
        }

        .modal-text {
            color: #555;
            line-height: 1.8;
            margin-bottom: 20px;
            font-size: 0.95em;
        }

        .fortune-result {
            background: #fef5e7;
            padding: 20px;
            border-left: 4px solid #FFB74D;
            margin: 15px 0;
            border-radius: 8px;
        }

        .fortune-label {
            color: #d4791f;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .fortune-value {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .lucky-items {
            margin: 15px 0;
        }

        .lucky-item {
            background: white;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #FFB74D;
        }

        .lucky-item-label {
            color: #d4791f;
            font-weight: bold;
            display: inline-block;
            min-width: 80px;
        }

        .rating-stars {
            margin: 10px 0;
        }

        .rating-label {
            color: #d4791f;
            font-weight: bold;
            display: inline-block;
            min-width: 80px;
        }

        .stars {
            display: inline-block;
            color: #FFB74D;
            font-size: 1.2em;
            letter-spacing: 2px;
        }

        .conversation-npc {
            text-align: center;
            margin-bottom: 20px;
        }

        .npc-avatar {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background: #fef5e7;
            border: 3px solid #FFB74D;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .npc-avatar canvas {
            width: 100%;
            height: 100%;
        }

        .npc-info {
            margin-bottom: 20px;
        }

        .npc-name {
            font-size: 1.3em;
            color: #d4791f;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .npc-personality {
            font-size: 0.9em;
            color: #666;
            font-style: italic;
        }

        .conversation-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .option-btn {
            background: #FFB74D;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95em;
            transition: transform 0.2s, background 0.2s;
        }

        .option-btn:active {
            transform: scale(0.98);
            background: #d4791f;
        }

        .btn-close {
            background: #999;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn-close:active {
            transform: scale(0.98);
        }

        /* Bottom UI */
        .bottom-ui {
            padding: 15px;
            background: rgba(255, 255, 240, 0.95);
            border-top: 2px solid #FFB74D;
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }

        .input-group {
            margin: 15px 0;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #d4791f;
            font-weight: bold;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #FFB74D;
            border-radius: 8px;
            font-size: 1em;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #d4791f;
        }

        /* Area Screen */
        .area-screen {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .area-info {
            padding: 15px;
            background: rgba(255, 255, 240, 0.95);
            border-bottom: 2px solid #FFB74D;
            font-size: 1.1em;
            color: #d4791f;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .title-screen h1 {
                font-size: 2em;
            }

            .modal-content {
                max-width: 95%;
                padding: 20px;
            }

            .modal-title {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <!-- Title Screen -->
    <div id="titleScreen" class="screen active">
        <div class="title-screen">
            <h1>🐕 柴犬うらないハウス 🔮</h1>
            <p>かわいい柴犬と一緒に、24個の占い館を訪ねる冒険</p>
            <button class="btn-start" onclick="game.startGame()">ゲームをはじめる</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="screen">
        <div class="game-header">
            <h2 id="areaName">エリア 1: 和の占い通り</h2>
            <div class="header-buttons">
                <button class="header-btn" onclick="game.showAlbum()">アルバム</button>
                <button class="header-btn" onclick="game.showMenu()">メニュー</button>
            </div>
        </div>
        <div class="game-canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>
        <div class="bottom-ui">
            <span id="bottomText">占い館をタップして占ってもらおう</span>
        </div>
    </div>

    <!-- Modals -->
    <div id="buildingModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">占いの館</div>
            <div id="modalBody"></div>
            <button class="btn-close" onclick="game.closeModal()">閉じる</button>
        </div>
    </div>

    <div id="npcModal" class="modal-overlay">
        <div class="modal-content">
            <div class="conversation-npc">
                <div class="npc-avatar">
                    <canvas id="npcCanvas" width="100" height="100"></canvas>
                </div>
                <div class="npc-info">
                    <div class="npc-name" id="npcName">キャラ名</div>
                    <div class="npc-personality" id="npcPersonality">性格説明</div>
                </div>
            </div>
            <div id="conversationContent"></div>
            <button class="btn-close" onclick="game.closeModal()">閉じる</button>
        </div>
    </div>

    <div id="fortuneModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title" id="fortuneTitle">占い結果</div>
            <div id="fortuneContent"></div>
            <button class="btn-close" onclick="game.saveToAlbum()">アルバムに保存</button>
            <button class="btn-close" onclick="game.closeModal()">閉じる</button>
        </div>
    </div>

    <div id="albumModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">占い履歴</div>
            <div id="albumContent"></div>
            <button class="btn-close" onclick="game.closeModal()">閉じる</button>
        </div>
    </div>

    <div id="menuModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">メニュー</div>
            <div id="menuContent"></div>
            <button class="btn-close" onclick="game.closeModal()">閉じる</button>
        </div>
    </div>

    <script>
        const AREAS = [
            {

                    { id: "w2", name: "四柱推命の館", fortuneType: "shichushuminei", npcId: "n1" },
                    { id: "w3", name: "九星気学堂", fortuneType: "kyuseikigaku", npcId: "n1" },
                    { id: "w4", name: "花占い処", fortuneType: "hanauranai", npcId: "n3" },
                    { id: "w5", name: "夢占い庵", fortuneType: "yumeuranai", npcId: "n1" },
                    { id: "w6", name: "風水の間", fortuneType: "fengshui", npcId: "n4" }
                ]
            },
            {
                id: 2,
                name: "西洋占い広場",
                color: "#FFB347",

                    { id: "w8", name: "数秘術の塔", fortuneType: "numerology", npcId: "n7" },
                    { id: "w9", name: "ルーン占い小屋", fortuneType: "rune", npcId: "n6" },
                    { id: "w10", name: "西洋占星術の館", fortuneType: "astrology", npcId: "n5" },
                    { id: "w11", name: "オラクルカード館", fortuneType: "oracle", npcId: "n8" },
                    { id: "w12", name: "ペンデュラム室", fortuneType: "pendulum", npcId: "n5" }
                ]
            },
            {
                id: 3,
                name: "ふしぎ占い森",
                color: "#90EE90",
                buildings: [
                    { id: "w13", name: "水晶占いの泉", fortuneType: "crystal", npcId: "n9" },
                    { id: "w14", name: "動物占いの森", fortuneType: "animalspirit", npcId: "n10" },
                    { id: "w15", name: "色占いの虹", fortuneType: "coloruranai", npcId: "n11" },
                    { id: "w16", name: "前世占い洞窟", fortuneType: "pastlife", npcId: "n12" },
                    { id: "w17", name: "相性占いの花畑", fortuneType: "compatibility", npcId: "n9" },
                    { id: "w18", name: "妖精占いの木", fortuneType: "fairyuranai", npcId: "n12" }
                ]
            },
            {
                id: 4,
                name: "星空占いの丘",
                color: "#1a1a3f",
                buildings: [
                    { id: "w19", name: "星座占い天文台", fortuneType: "zodiac", npcId: "n13" },
                    { id: "w20", name: "月占いの館", fortuneType: "moonuranai", npcId: "n14" },
                    { id: "w21", name: "惑星占いの塔", fortuneType: "planeluranai", npcId: "n15" },
                    { id: "w22", name: "誕生日占いの庭", fortuneType: "birthday", npcId: "n13" },
                    { id: "w23", name: "曜日占い時計台", fortuneType: "dayofweek", npcId: "n13" },
                    { id: "w24", name: "守護天使占いの教会", fortuneType: "guardian", npcId: "n16" }
                ]
            }
        ];

        const NPCs = {
            n1: { name: "柴太郎", animal: "shiba", color: "#DAA520", personality: "和占いマスター。穏やかで知識豊富", area: 1, knowledge: ["おみくじの由来と歴史", "四柱推命で人生を読む", "九星気学の奥深さ"] },
            n2: { name: "ミケ", animal: "calico", color: "#FF8C00", personality: "おみくじ巫女。気まぐれだが的中率高い", area: 1, knowledge: ["おみくじの引き方のコツ", "運をゲットする秘訣", "吉凶判定の不思議"] },
            n3: { name: "ウサ姫", animal: "rabbit", color: "#FFB6C1", personality: "花占い師。可愛くて優しい", area: 1, knowledge: ["花言葉と運命の関係", "花占いの歴史", "花との相性診断"] },
            n4: { name: "コンタ", animal: "fox", color: "#FF6347", personality: "風水師。ちょっと意地悪だが実力派", area: 1, knowledge: ["風水の五行説", "運気の流れをつかむ", "家の配置と運命"] },
            n5: { name: "フクじい", animal: "owl", color: "#8B4513", personality: "タロット大師匠。長老で威厳がある", area: 2, knowledge: ["大アルカナの秘密", "タロットの歴史", "カードが示すメッセージ"] },
            n6: { name: "ケロ助", animal: "frog", color: "#32CD32", personality: "ルーン占い師。のんびりだが鋭い", area: 2, knowledge: ["ルーン文字の起源", "古代の叡智", "ルーンが語る真実"] },
            n7: { name: "パンちゃん", animal: "panda", color: "#000000", personality: "数秘術師。おっとりした天才", area: 2, knowledge: ["数字の神秘性", "人生路数の計算法", "運命数が示すもの"] },
            n8: { name: "ハム太", animal: "hamster", color: "#FFA500", personality: "オラクルカード使い。元気いっぱい", area: 2, knowledge: ["カードからのメッセージ", "直感の大切さ", "ハイヤーセルフとの繋がり"] },
            n9: { name: "ペンぺん", animal: "penguin", color: "#000080", personality: "水晶占い師。クールだが面倒見が良い", area: 3, knowledge: ["水晶の浄化方法", "鉱物のエネルギー", "スピリチュアルな流れ"] },
            n10: { name: "タヌ吉", animal: "tanuki", color: "#8B7355", personality: "動物占い師。お調子者だが当たる", area: 3, knowledge: ["動物の象徴性", "あなたの守護動物", "動物が示す才能"] },
            n11: { name: "リスリン", animal: "squirrel", color: "#CC5500", personality: "色占い師。せっかちだが的確", area: 3, knowledge: ["色の波動", "チャクラと色の関係", "運気を変える色選び"] },
            n12: { name: "モフモフ", animal: "sheep", color: "#FFFACD", personality: "前世占い師。ふわふわして不思議ちゃん", area: 3, knowledge: ["前世の記憶", "魂の成長", "人生の目的を知る"] },
            n13: { name: "ホシ丸", animal: "whiteshiba", color: "#F5DEB3", personality: "星座占い師。ロマンチスト", area: 4, knowledge: ["星座の神話", "惑星の影響", "天体が示す運命"] },
            n14: { name: "ルナ", animal: "blackcat", color: "#2F4F4F", personality: "月占い師。ミステリアスで美しい", area: 4, knowledge: ["月の満ち欠けと心身", "月相とのリズム", "夜間の浄化儀式"] },
            n15: { name: "ソラ", animal: "bluerabbit", color: "#4169E1", personality: "惑星占い師。知的で冷静", area: 4, knowledge: ["惑星の公転周期", "天体観測の歴史", "宇宙からのメッセージ"] },
            n16: { name: "ヒカル", animal: "goldenfox", color: "#FFD700", personality: "守護天使占い師。神秘的で温かい", area: 4, knowledge: ["天使のサポート", "高い次元からのガイダンス", "スピリチュアルな道"] }
        };

        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.currentArea = 1;
                this.playerPos = { x: 0, y: 0 };
                this.playerState = { walking: false, direction: 1 };
                this.selectedBuilding = null;
                this.buildingPositions = {};
                this.npcPositions = {};
                this.currentNPC = null;
                this.currentFortune = null;
                this.album = JSON.parse(localStorage.getItem('fortuneAlbum') || '[]');
                this.playerName = localStorage.getItem('playerName') || '';
                this.playerBirthday = localStorage.getItem('playerBirthday') || '';
                
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
                this.canvas.addEventListener('click', (e) => this.handleCanvasClick(e));
                this.canvas.addEventListener('touchend', (e) => this.handleCanvasClick(e));
                
                this.gameLoop();
            }

            resizeCanvas() {
                const container = this.canvas.parentElement;
                this.canvas.width = container.clientWidth;
                this.canvas.height = container.clientHeight;
                this.calculatePositions();
            }

            calculatePositions() {
                const w = this.canvas.width;
                const h = this.canvas.height;
                const area = AREAS[this.currentArea - 1];

                this.buildingPositions = {};
                this.npcPositions = {};

                const positions = [
                    { x: w * 0.2, y: h * 0.2 },
                    { x: w * 0.5, y: h * 0.2 },
                    { x: w * 0.8, y: h * 0.2 },
                    { x: w * 0.2, y: h * 0.5 },
                    { x: w * 0.5, y: h * 0.5 },
                    { x: w * 0.8, y: h * 0.5 }
                ];

                area.buildings.forEach((building, idx) => {
                    this.buildingPositions[building.id] = positions[idx];
                    this.npcPositions[building.id] = {
                        x: positions[idx].x + 40,
                        y: positions[idx].y + 60
                    };
                });

                this.playerPos = { x: w * 0.5, y: h * 0.8 };
            }

            startGame() {
                document.getElementById('titleScreen').classList.remove('active');
                document.getElementById('gameScreen').classList.add('active');
                
                if (!this.playerName) {
                    this.showProfileSetup();
                } else {
                    this.loadArea(1);
                }
            }

            showProfileSetup() {
                const modalBody = document.getElementById('modalBody');
                modalBody.innerHTML = `
                    <div class="input-group">
                        <label>あなたの名前：</label>
                        <input type="text" id="inputName" placeholder="例：田中太郎" maxlength="20">
                    </div>
                    <div class="input-group">
                        <label>生年月日：</label>
                        <input type="date" id="inputBirthday">
                    </div>
                    <button class="btn-close" style="background: #FFB74D;" onclick="game.saveProfile()">保存する</button>
                `;
                document.getElementById('buildingModal').classList.add('active');
            }

            saveProfile() {
                const name = document.getElementById('inputName').value || '旅人';
                const birthday = document.getElementById('inputBirthday').value || '';
                
                this.playerName = name;
                this.playerBirthday = birthday;
                localStorage.setItem('playerName', name);
                localStorage.setItem('playerBirthday', birthday);
                
                this.closeModal();
                this.loadArea(1);
            }

            loadArea(areaNum) {
                this.currentArea = areaNum;
                const area = AREAS[areaNum - 1];
                document.getElementById('areaName').textContent = `エリア ${areaNum}: ${area.name}`;
                this.calculatePositions();
            }

            gameLoop() {
                this.drawScene();
                requestAnimationFrame(() => this.gameLoop());
            }

            drawScene() {
                const w = this.canvas.width;
                const h = this.canvas.height;
                const area = AREAS[this.currentArea - 1];

                // Background
                const gradient = this.ctx.createLinearGradient(0, 0, 0, h);
                if (this.currentArea === 4) {
                    gradient.addColorStop(0, '#0a0e27');
                    gradient.addColorStop(1, '#1a2a5f');
                } else if (this.currentArea === 3) {
                    gradient.addColorStop(0, '#90EE90');
                    gradient.addColorStop(1, '#7CB342');
                } else if (this.currentArea === 2) {
                    gradient.addColorStop(0, '#FFD699');
                    gradient.addColorStop(1, '#FFA500');
                } else {
                    gradient.addColorStop(0, '#87CEEB');
                    gradient.addColorStop(1, '#E0F6FF');
                }
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, w, h);

                // Draw clouds/stars based on area
                if (this.currentArea === 4) {
                    this.drawStars();
                } else if (this.currentArea === 3) {
                    this.drawTrees();
                } else {
                    this.drawClouds();
                }

                // Draw ground
                this.ctx.fillStyle = '#90EE90';
                this.ctx.fillRect(0, h * 0.65, w, h * 0.35);

                // Draw buildings
                area.buildings.forEach(building => {
                    const pos = this.buildingPositions[building.id];
                    if (pos) {
                        this.drawBuilding(building, pos);
                    }
                });

                // Draw NPCs
                area.buildings.forEach(building => {
                    const npcPos = this.npcPositions[building.id];
                    if (npcPos) {
                        this.drawNPC(NPCs[building.npcId], npcPos);
                    }
                });

                // Draw player
                this.drawPlayer();
            }

            drawBuilding(building, pos) {
                const fortuneTypes = ['omikuji', 'shichushuminei', 'kyuseikigaku', 'hanauranai', 'yumeurai', 'fengshui',
                    'tarot', 'numerology', 'rune', 'astrology', 'oracle', 'pendulum',
                    'crystal', 'animalspirit', 'coloruranai', 'pastlife', 'compatibility', 'fairyuranai',
                    'zodiac', 'moonuranai', 'planeluranai', 'birthday', 'dayofweek', 'guardian'];
                
                const typeIndex = fortuneTypes.indexOf(building.fortuneType);
                const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F',
                    '#BB8FCE', '#85C1E2', '#F8B88B', '#A9DFBF', '#F5B7B1', '#D5F4E6',
                    '#FADBD8', '#D7BDE2', '#ABEBC6', '#F9E79F', '#AED6F1', '#F5B7B1',
                    '#FCF3CF', '#D2B4DE', '#A3E4D7', '#F2D7AC', '#D5A6BD', '#FADBD8'];

                this.ctx.fillStyle = colors[typeIndex] || '#FFB74D';
                this.ctx.fillRect(pos.x - 30, pos.y - 40, 60, 80);

                // Roof
                this.ctx.fillStyle = '#8B4513';
                this.ctx.beginPath();
                this.ctx.moveTo(pos.x - 35, pos.y - 40);
                this.ctx.lineTo(pos.x, pos.y - 60);
                this.ctx.lineTo(pos.x + 35, pos.y - 40);
                this.ctx.fill();

                // Door
                this.ctx.fillStyle = '#5D4037';
                this.ctx.fillRect(pos.x - 12, pos.y - 10, 24, 40);

                // Window
                this.ctx.fillStyle = '#FFD700';
                this.ctx.fillRect(pos.x - 20, pos.y - 35, 15, 15);
            }

            drawClouds() {
                for (let i = 0; i < 3; i++) {
                    const x = (i * this.canvas.width / 3) + (Date.now() % 10000) / 50;
                    const y = this.canvas.height * 0.15;
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 20, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.beginPath();
                    this.ctx.arc(x + 20, y, 25, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.beginPath();
                    this.ctx.arc(x + 40, y, 20, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            }

            drawTrees() {
                for (let i = 0; i < 4; i++) {
                    const x = (i * this.canvas.width / 4) + this.canvas.width / 8;
                    const y = this.canvas.height * 0.3;
                    
                    // Trunk
                    this.ctx.fillStyle = '#8B4513';
                    this.ctx.fillRect(x - 5, y + 30, 10, 30);
                    
                    // Leaves
                    this.ctx.fillStyle = '#228B22';
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 25, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            }

            drawStars() {
                this.ctx.fillStyle = '#FFFF99';
                for (let i = 0; i < 50; i++) {
                    const x = (i * 73) % this.canvas.width;
                    const y = (i * 97) % (this.canvas.height * 0.6);
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            }

            handleCanvasClick(e) {
                const rect = this.canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;

                // Check building clicks
                for (const [buildingId, pos] of Object.entries(this.buildingPositions)) {
                    if (Math.hypot(x - pos.x, y - pos.y) < 40) {
                        const area = AREAS[this.currentArea - 1];
                        const building = area.buildings.find(b => b.id === buildingId);
                        if (building) {
                            this.showBuildingModal(building);
                            return;
                        }
                    }
                }

                // Check NPC clicks
                for (const [buildingId, pos] of Object.entries(this.npcPositions)) {
                    if (Math.hypot(x - pos.x, y - pos.y) < 25) {
                        const area = AREAS[this.currentArea - 1];
                        const building = area.buildings.find(b => b.id === buildingId);
                        if (building) {
                            this.showNPCModal(NPCs[building.npcId]);
                            return;
                        }
                    }
                }
            }

            showBuildingModal(building) {
                document.getElementById('modalTitle').textContent = building.name;
                const modalBody = document.getElementById('modalBody');

                if (building.fortuneType === 'tarot') {
                    this.generateTarotFortune(modalBody);
                } else if (building.fortuneType === 'numerology') {
                    this.generateNumerologyFortune(modalBody);
                } else if (building.fortuneType === 'kyuseikigaku') {
                    this.generateKyuseiFortune(modalBody);
                } else if (building.fortuneType === 'zodiac') {
                    this.generateZodiacFortune(modalBody);
                } else if (building.fortuneType === 'omikuji') {
                    this.generateOmikujiFortune(modalBody);
                } else if (building.fortuneType === 'moonuranai') {
                    this.generateMoonFortune(modalBody);
                } else if (building.fortuneType === 'animalspirit') {
                    this.generateAnimalSpiritFortune(modalBody);
                } else {
                    this.generateGenericFortune(building.name, modalBody);
                }

                document.getElementById('buildingModal').classList.add('active');
            }

            generateTarotFortune(container) {
                const majorArcana = [
                    { name: "愚者", meaning: "新しい始まり、無邪気" },
                    { name: "魔術師", meaning: "力、意志、才能の活用" },
                    { name: "女祭司", meaning: "直感、謎、無意識" },
                    { name: "女帝", meaning: "豊かさ、創造性、美" },
                    { name: "皇帝", meaning: "権力、支配、強さ" },
                    { name: "教皇", meaning: "精神性、知識、信仰" },
                    { name: "恋人", meaning: "愛、関係、選択" },
                    { name: "戦車", meaning: "勝利、制御、決断" },
                    { name: "力", meaning: "勇気、力、自信" },
                    { name: "隠者", meaning: "瞑想、探求、内省" },
                    { name: "運命の輪", meaning: "運、変化、サイクル" },
                    { name: "正義", meaning: "公平、判断、真実" },
                    { name: "吊人", meaning: "犠牲、見方の転換" },
                    { name: "死神", meaning: "変容、終わり、新しい始まり" },
                    { name: "節制", meaning: "バランス、忍耐、調和" },
                    { name: "悪魔", meaning: "束縛、欲望、制限" },
                    { name: "塔", meaning: "破壊、変動、啓示" },
                    { name: "星", meaning: "希望、明確、インスピレーション" },
                    { name: "月", meaning: "不安、幻想、直感" },
                    { name: "太陽", meaning: "幸福、成功、活力" },
                    { name: "審判", meaning: "目覚め、呼び出し、新しい局面" },
                    { name: "世界", meaning: "完成、達成、統合" }
                ];

                const positions = ['過去', '現在', '未来'];
                let html = '<div class="modal-text">3枚のタロットカードが示すあなたの運命：<br><br>';

                for (let i = 0; i < 3; i++) {
                    const card = majorArcana[Math.floor(Math.random() * majorArcana.length)];
                    const isReversed = Math.random() < 0.3;
                    html += `<div class="fortune-result">
                        <div class="fortune-label">${positions[i]}: ${card.name}${isReversed ? ' (逆位置)' : ''}</div>
                        <div class="fortune-value">${isReversed ? '反転：' : ''}${card.meaning}</div>

                    this.drawRabbitLarge(ctx, npc.color);

                    this.drawOwlLarge(ctx, npc.color);

                    this.drawFrogLarge(ctx, npc.color);
                } else if (npc.animal === 'panda') {
                    this.drawPandaLarge(ctx);

                    this.drawHamsterLarge(ctx, npc.color);

                    this.drawTanukiLarge(ctx, npc.color);

                ctx.beginPath();
                ctx.arc(5, -18, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            drawPandaLarge(ctx) {
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(0, 0, 16, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(-12, -15, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(12, -15, 5, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(-6, -4, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(6, -4, 5, 0, Math.PI * 2);
                ctx.fill();
            }

            drawHamsterLarge(ctx, color) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.ellipse(0, 0, 12, 11, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(-10, -15, 8, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(-13, -18, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(-7, -18, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(-13, -16, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            drawPenguinLarge(ctx) {
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.ellipse(0, 0, 11, 17, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(0, -18, 8, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.ellipse(0, 0, 6, 12, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-3, -20, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(3, -20, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            drawTanukiLarge(ctx, color) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.ellipse(0, 0, 17, 14, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(-12, -18, 10, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(-18, -22, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(-6, -22, 5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(-15, -20, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillRect(-17, -18, 6, 12);
            }

            drawSquirrelLarge(ctx, color) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.ellipse(0, 0, 12, 14, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(-9, -16, 9, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(-13, -21, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(-5, -21, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(-11, -17, 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = color;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(18, -8, 9, 0, Math.PI, false);
                ctx.stroke();
            }

            drawSheepLarge(ctx, color) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.ellipse(0, 0, 17, 14, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(-12, -20, 8, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(-16, -24, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(-8, -24, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(-14, -21, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            showNPCKnowledge(idx, npcName) {
                const npc = Object.values(NPCs).find(n => n.name === npcName);
                const conversationContent = document.getElementById('conversationContent');

                let content = '';
                if (idx === 0) {
                    content = `<div class="fortune-result"><strong>占いの豆知識</strong><br><br>${npc.knowledge[0] || '占いについての興味深い話を聞くことができました。'}</div>`;
                } else if (idx === 1) {
                    content = `<div class="fortune-result"><strong>今日のアドバイス</strong><br><br>${npc.knowledge[1] || 'あなたの直感を信じ、今この瞬間を大切にしてください。'}</div>`;
                } else if (idx === 2) {
                    content = `<div class="fortune-result"><strong>自己紹介</strong><br><br>私は${npc.name}。${npc.personality}。 いつでも占ってあげます。</div>`;
                } else {
                    document.getElementById('npcModal').classList.remove('active');
                    return;
                }

                content += `
                    <div class="conversation-options" style="margin-top: 20px;">
                        <button class="option-btn" onclick="game.showNPCKnowledge(0, '${npc.name}')">占いの豆知識</button>
                        <button class="option-btn" onclick="game.showNPCKnowledge(1, '${npc.name}')">今日のアドバイス</button>
                        <button class="option-btn" onclick="game.showNPCKnowledge(2, '${npc.name}')">自己紹介</button>
                        <button class="option-btn" onclick="game.showNPCKnowledge(3, '${npc.name}')">さよなら</button>
                    </div>
                `;

                conversationContent.innerHTML = content;
            }

            saveCurrentFortune() {
                const fortune = {
                    id: Date.now(),
                    date: new Date().toLocaleString('ja-JP'),
                    content: document.getElementById('fortuneContent').innerHTML
                };
                this.album.push(fortune);
                localStorage.setItem('fortuneAlbum', JSON.stringify(this.album));
                this.closeModal();
            }

            showAlbum() {
                const albumContent = document.getElementById('albumContent');
                if (this.album.length === 0) {
                    albumContent.innerHTML = '<div class="modal-text">まだ占い結果がありません。占い館を訪ねて占ってもらいましょう。</div>';
                } else {
                    let html = '<div class="modal-text">';
                    this.album.forEach((item, idx) => {
                        html += `<div class="fortune-result"><strong>占い ${idx + 1}</strong><br>${item.date}<br><small>${item.content.substring(0, 50)}...</small></div>`;
                    });
                    html += '</div>';
                    albumContent.innerHTML = html;
                }
                document.getElementById('albumModal').classList.add('active');
            }

            showMenu() {
                const menuContent = document.getElementById('menuContent');
                menuContent.innerHTML = `
                    <div class="modal-text">
                        <div class="input-group">
                            <label>プレイヤー名：${this.playerName}</label>
                            <button class="btn-close" style="background: #FFB74D;" onclick="game.editProfile()">プロフィール編集</button>
                        </div>
                        <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">
                        <div class="input-group">
                            <button class="btn-close" style="background: #FFB74D;" onclick="game.goToArea(1)">エリア 1: 和の占い通り</button>
                        </div>
                        <div class="input-group">
                            <button class="btn-close" style="background: #FFB74D;" onclick="game.goToArea(2)">エリア 2: 西洋占い広場</button>
                        </div>
                        <div class="input-group">
                            <button class="btn-close" style="background: #FFB74D;" onclick="game.goToArea(3)">エリア 3: ふしぎ占い森</button>
                        </div>
                        <div class="input-group">
                            <button class="btn-close" style="background: #FFB74D;" onclick="game.goToArea(4)">エリア 4: 星空占いの丘</button>
                        </div>
                    </div>
                `;
                document.getElementById('menuModal').classList.add('active');
            }

            editProfile() {
                this.closeModal();
                this.showProfileSetup();
            }

            goToArea(areaNum) {
                this.closeModal();
                this.loadArea(areaNum);
            }

            closeModal() {
                document.getElementById('buildingModal').classList.remove('active');
                document.getElementById('npcModal').classList.remove('active');
                document.getElementById('fortuneModal').classList.remove('active');
                document.getElementById('albumModal').classList.remove('active');
                document.getElementById('menuModal').classList.remove('active');
            }
        }

        const game = new Game();
    </script>
</body>
</html>
