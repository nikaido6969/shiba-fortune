<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>柴犬うらないハウス</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#fef5e7;font-family:'Hiragino Maru Gothic ProN','Hiragino Sans','Meiryo',sans-serif;touch-action:none;}
#app{width:100%;height:100%;position:relative;overflow:hidden;}
.screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0;flex-direction:column;opacity:0;transition:opacity 0.35s ease-in-out;}
.screen.active{display:flex;opacity:1;}
.screen.fade-out{opacity:0;}

/* タップ波紋 */
.tap-ripple{position:absolute;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,rgba(255,183,77,.6) 0%,transparent 70%);pointer-events:none;transform:scale(0);animation:rippleAnim .5s ease-out forwards;z-index:999;}
@keyframes rippleAnim{0%{transform:scale(0);opacity:1}100%{transform:scale(2.5);opacity:0}}

/* タイトル */
#title-screen{background:linear-gradient(180deg,#fffef0 0%,#fef5e7 35%,#fdf1da 65%,#fffef0 100%);justify-content:center;align-items:center;gap:32px;overflow:hidden;}
.title-stars{position:absolute;width:100%;height:100%;pointer-events:none;overflow:hidden;}
.star{position:absolute;background:#FFB74D;border-radius:50%;animation:twinkle 2s infinite alternate;}
@keyframes twinkle{from{opacity:.2;transform:scale(1)}to{opacity:1;transform:scale(1.3)}}
.title-logo{text-align:center;z-index:1;}
.title-dog-emoji{font-size:90px;display:block;animation:bounce 1.5s ease-in-out infinite;filter:drop-shadow(0 0 24px rgba(255,183,77,.6));}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.title-text{color:#d4791f;font-size:28px;font-weight:bold;margin-top:10px;text-shadow:0 0 20px rgba(212,121,31,.3);letter-spacing:3px;}
.title-sub{color:#FFB74D;font-size:14px;margin-top:6px;}
.title-desc{background:rgba(212,121,31,.15);border:1px solid rgba(255,183,77,.4);border-radius:14px;padding:14px 20px;max-width:320px;text-align:center;z-index:1;}
.title-desc p{color:#5D4037;font-size:13px;line-height:1.7;}
.btn-p{background:linear-gradient(135deg,#FFB74D,#FF8F00);color:#fff;border:none;border-radius:50px;padding:16px 52px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1;box-shadow:0 4px 24px rgba(255,143,0,.5);transition:transform .1s;font-family:inherit;}
.btn-p:active{transform:scale(.95);}

/* プロフィール画面 */
#profile-screen{background:linear-gradient(180deg,#FEFBF3 0%,#FFF8E8 40%,#F5EFE0 100%);overflow-y:auto;}
.p-header{background:#FFB74D;padding:18px 16px 14px;text-align:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.p-header h2{font-size:20px;color:#fff;}
.p-header p{font-size:12px;color:rgba(255,255,255,.9);margin-top:3px;}
.p-form{padding:16px;display:flex;flex-direction:column;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group label{font-size:13px;font-weight:bold;color:#5D4037;}
.form-group input{padding:10px 12px;border:1px solid #E0D5C8;border-radius:8px;font-size:14px;font-family:inherit;}
.form-group select{padding:10px 12px;border:1px solid #E0D5C8;border-radius:8px;font-size:14px;font-family:inherit;}
.p-acts{padding:12px;display:flex;flex-direction:column;gap:8px;}
.btn-s{background:#fff;color:#555;border:2px solid #DDD;border-radius:50px;padding:13px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;width:100%;text-align:center;}
.btn-d{background:#BDBDBD;color:#fff;border:none;border-radius:50px;padding:15px;font-size:15px;font-weight:bold;cursor:not-allowed;font-family:inherit;width:100%;text-align:center;}

/* ゲーム画面 */
#game-screen{background:#fffef0;}
#gcanvas{display:block;width:100%;flex:1;touch-action:none;cursor:pointer;}
#hud{position:absolute;top:env(safe-area-inset-top,8px);left:8px;z-index:10;display:flex;flex-direction:column;gap:5px;}
.hud-pill{background:rgba(255,183,77,.18);border:1px solid rgba(255,183,77,.3);border-radius:12px;padding:4px 10px;font-size:10px;color:#d4791f;display:flex;align-items:center;gap:5px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .2s;}
.hud-pill b{color:#d4791f;}
#bgm-btn2{position:absolute;top:8px;right:8px;background:rgba(212,121,31,.6);border:1px solid rgba(255,183,77,.5);color:#FFB74D;border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:inherit;z-index:10;}
#bgm-btn2.on{background:linear-gradient(135deg,#FFB74D,#FF8F00);color:#fff;border-color:transparent;}

/* 下部UI */
#bottom-ui{background:linear-gradient(180deg,rgba(255,245,231,.95),rgba(253,241,218,.98));padding:10px 12px env(safe-area-inset-bottom,10px);display:flex;flex-direction:column;gap:7px;border-top:1px solid rgba(255,183,77,.2);flex-shrink:0;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.area-row{display:flex;justify-content:space-between;align-items:center;}
.area-nm{color:#d4791f;font-size:12px;font-weight:bold;}
#ctrl{display:flex;gap:6px;padding:4px 0 2px;}
.cb{flex:1;background:rgba(255,183,77,.15);color:#d4791f;border:1px solid rgba(255,183,77,.25);border-radius:12px;padding:10px 4px;font-size:11px;font-weight:bold;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s ease;backdrop-filter:blur(4px);}
.cb:active{background:rgba(255,183,77,.3);transform:scale(.96);}
.cb.dng{background:#c62828;color:#fff;}

/* ビル情報モーダル */
#building-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;}
#building-modal.show{display:flex;}
#building-box{background:#fff;border-radius:24px;padding:28px 22px;max-width:340px;width:92%;text-align:center;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalPop .3s ease-out;}
@keyframes modalPop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
#building-box .be{font-size:50px;margin-bottom:8px;}
#building-box h3{font-size:18px;color:#333;margin-bottom:6px;}
#building-box p{font-size:12px;color:#666;line-height:1.6;margin-bottom:14px;}
.mbtn{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:12px 30px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;margin:4px;}
.mbtn.gr{background:#4CAF50;}.mbtn.bl{background:#2196F3;}.mbtn.rd{background:#e53935;}

/* 占いフロー オーバーレイ */
#fortune-flow-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:250;align-items:center;justify-content:center;flex-direction:column;padding:16px;}
#fortune-flow-overlay.show{display:flex;}
.ff-box{background:#fff;border-radius:24px;padding:24px 20px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalPop .3s ease-out;}
.ff-step{font-size:11px;color:#999;margin-bottom:8px;}
.ff-question{font-size:16px;font-weight:bold;color:#333;margin:14px 0 18px;line-height:1.5;}
.ff-options{display:flex;flex-direction:column;gap:10px;}
.ff-option{background:#FAFAFA;border:2px solid #e0e0e0;border-radius:14px;padding:14px 12px;font-size:14px;font-weight:bold;color:#333;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.ff-option:active{transform:scale(.96);border-color:#FFB74D;background:#FFF8E1;}

/* 占い結果 オーバーレイ */
#fortune-result-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:250;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
#fortune-result-overlay.show{display:flex;}
.fr-box{background:#fff;border-radius:24px;padding:28px 20px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalPop .3s ease-out;}
.fr-title{font-size:20px;font-weight:bold;color:#d4791f;margin-bottom:12px;}
.fr-emoji{font-size:60px;margin:16px 0;}
.fr-body{font-size:13px;color:#555;line-height:1.7;margin-bottom:20px;}
.fr-close{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:12px 30px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;}

/* NPC会話 オーバーレイ */
#npc-talk-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:250;align-items:center;justify-content:center;flex-direction:column;padding:16px;}
#npc-talk-overlay.show{display:flex;}
.npc-talk-box{background:#fff;border-radius:24px;padding:24px 20px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalPop .3s ease-out;}
.npc-avatar{font-size:50px;margin-bottom:12px;}
.npc-name{font-size:16px;font-weight:bold;color:#333;margin-bottom:4px;}
.npc-personality{font-size:11px;color:#999;margin-bottom:12px;}
.npc-dialog{font-size:13px;color:#555;line-height:1.7;margin-bottom:16px;padding:12px;background:#f5f5f5;border-radius:12px;}
.npc-options{display:flex;flex-direction:column;gap:8px;}
.npc-option{background:#FFF8E1;border:2px solid #FFB74D;border-radius:12px;padding:12px;font-size:12px;font-weight:bold;color:#d4791f;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.npc-option:active{transform:scale(.96);background:#FFE0B2;}

/* 図鑑 */
#album-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;padding:20px;}
#album-overlay.show{display:flex;flex-direction:column;align-items:center;}
.album-title{color:#d4791f;font-size:20px;font-weight:bold;margin:16px 0 12px;text-align:center;}
.album-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:360px;width:100%;}
.album-card{background:rgba(255,255,255,.95);border-radius:16px;padding:14px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:0 2px 10px rgba(0,0,0,.1);}
.album-card.locked{background:rgba(100,100,100,.3);opacity:.6;}
.album-card .ac-emoji{font-size:40px;margin:0 auto 6px;display:block;}
.album-card .ac-name{font-size:12px;font-weight:bold;color:#333;}
.album-card.locked .ac-name{color:#999;}
.album-card .ac-met{font-size:10px;color:#888;margin-top:2px;}
.album-close{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:12px 40px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;margin:16px 0 20px;}

/* 占い履歴 */
#history-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;padding:20px;}
#history-overlay.show{display:flex;flex-direction:column;align-items:center;}
.history-title{color:#d4791f;font-size:20px;font-weight:bold;margin:16px 0 12px;text-align:center;}
.history-list{display:flex;flex-direction:column;gap:10px;max-width:360px;width:100%;}
.history-item{background:rgba(255,255,255,.95);border-radius:16px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.1);}
.history-item .hi-date{font-size:10px;color:#999;margin-bottom:6px;}
.history-item .hi-fortune{font-size:14px;font-weight:bold;color:#d4791f;margin-bottom:4px;}
.history-item .hi-description{font-size:12px;color:#666;line-height:1.5;}
.history-close{background:#FFB74D;color:#fff;border:none;border-radius:50px;padding:12px 40px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;margin:16px 0 20px;}
</style>
</head>
<body>
<div id="app">

<!-- タイトル -->

</div>

</div>

function generateFortune(fortuneType) {
  const data = FORTUNE_DATA[fortuneType];
  if (!data) return { msg:'エラー', advice:'占いが見つかりません', level:'不明', items:[] };

  const patterns = data.patterns;
  const selectedPattern = patterns[Math.floor(Math.random() * patterns.length)];
  const level = data.getLevel ? data.getLevel() : data.levels[Math.floor(Math.random() * data.levels.length)];
  const items = data.items.sort(() => Math.random() - 0.5).slice(0, 3);

  const msg = selectedPattern.replace('${name}', G.playerName || 'あなた');

  return { msg: msg, advice: data.advice[Math.floor(Math.random() * data.advice.length)], level: level, items: items };
}

// ============================================
// MULTI-STEP FORTUNE DISPLAY
// ============================================

let fortuneState = { currentPage: 0, pages: [], result: null };

function showMultiStepFortune(result) {
  fortuneState.result = result;
  fortuneState.pages = buildFortunePages(result);
  fortuneState.currentPage = 0;
  const container = document.getElementById('pagesContainer');
  if (!container) return;
  container.innerHTML = '';
  renderFortunePage();
  updatePageDots();
}

function buildFortunePages(result) {
  const fortuneType = result.type || 'omikuji';
  const fortuneName = FORTUNE_NAMES[fortuneType] || fortuneType;
  const pages = [];

  pages.push({
    type: 'message',
    html: `<div style="text-align:center;padding:30px 20px;"><h2 style="margin:20px 0;font-size:24px;color:#8B4513;">${fortuneName}</h2><p style="margin:30px 0;font-size:18px;line-height:1.8;color:#333;">${result.msg}</p></div>`
  });

  pages.push({
    type: 'advice',
    html: `<div style="text-align:center;padding:30px 20px;"><h3 style="margin:20px 0;font-size:20px;color:#8B4513;">アドバイス</h3><p style="margin:30px 0;font-size:16px;line-height:1.8;color:#333;">${result.advice}</p></div>`
  });

  const meterFill = Math.min(Math.max((Math.random() * 80 + 20), 20), 100);
  pages.push({
    type: 'level',
    html: `<div style="text-align:center;padding:30px 20px;"><h3 style="margin:20px 0;font-size:20px;color:#8B4513;">運勢レベル</h3><p style="margin:30px 0;font-size:28px;color:#DAA520;font-weight:bold;">${result.level}</p><div style="background:#e0e0e0;border-radius:10px;height:20px;margin:30px 0;overflow:hidden;"><div style="background:linear-gradient(90deg,#DAA520,#FFD700);height:100%;width:${meterFill}%;transition:width 0.5s ease;"></div></div><p style="font-size:14px;color:#666;">${Math.round(meterFill)}%</p></div>`
  });

  const itemsHtml = result.items.map(item => `<span style="display:inline-block;background:#FFA500;color:white;padding:10px 20px;border-radius:20px;margin:8px;font-size:14px;font-weight:bold;">${item}</span>`).join('');
  pages.push({
    type: 'items',
    html: `<div style="text-align:center;padding:30px 20px;"><h3 style="margin:20px 0;font-size:20px;color:#8B4513;">幸運のアイテム</h3><div style="margin:30px 0;padding:20px;">${itemsHtml}</div></div>`
  });

  return pages;
}

function renderFortunePage() {
  const container = document.getElementById('pagesContainer');
  if (!container) return;
  const page = fortuneState.pages[fortuneState.currentPage];
  container.innerHTML = page.html;
  updatePageDots();
  updateNavigationButtons();
}

function updatePageDots() {
  const dotsContainer = document.getElementById('fortuneDots');
  if (!dotsContainer) return;
  dotsContainer.innerHTML = '';
  for (let i = 0; i < fortuneState.pages.length; i++) {
    const dot = document.createElement('div');
    dot.style.width = '10px';
    dot.style.height = '10px';
    dot.style.borderRadius = '50%';
    dot.style.backgroundColor = i === fortuneState.currentPage ? '#DAA520' : '#ccc';
    dot.style.display = 'inline-block';
    dot.style.margin = '0 5px';
    dotsContainer.appendChild(dot);
  }
}

function updateNavigationButtons() {
  const prevBtn = document.getElementById('fortunePrevBtn');
  const nextBtn = document.getElementById('fortuneNextBtn');
  if (prevBtn) {
    prevBtn.disabled = fortuneState.currentPage === 0;
    prevBtn.style.opacity = fortuneState.currentPage === 0 ? '0.5' : '1';
  }
  if (nextBtn) {
    nextBtn.disabled = fortuneState.currentPage === fortuneState.pages.length - 1;
    nextBtn.style.opacity = fortuneState.currentPage === fortuneState.pages.length - 1 ? '0.5' : '1';
  }
}

function fortuneNextPage() {
  if (fortuneState.currentPage < fortuneState.pages.length - 1) {
    fortuneState.currentPage++;
    playSE('step');
    renderFortunePage();
  }
}

function fortunePrevPage() {
  if (fortuneState.currentPage > 0) {
    fortuneState.currentPage--;
    playSE('step');
    renderFortunePage();
  }
}

function closeFortunOverlay() {
  const overlay = document.getElementById('fortuneOverlay');
  if (overlay) overlay.style.display = 'none';
  if (audioContext && audioContext.state === 'running') playBGM();
}

// ============================================
// BGM & SOUND EFFECTS SYSTEM
// ============================================

let audioContext = null;
let audioNodes = { padGain: null, chimeGain: null, melodyGain: null, masterGain: null };

function initBGM() {
  if (audioContext) return;
  try {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    audioNodes.masterGain = audioContext.createGain();
    audioNodes.masterGain.gain.setValueAtTime(0.08, audioContext.currentTime);
    audioNodes.masterGain.connect(audioContext.destination);
    audioNodes.padGain = audioContext.createGain();
    audioNodes.padGain.gain.setValueAtTime(0.3, audioContext.currentTime);
    audioNodes.padGain.connect(audioNodes.masterGain);
    audioNodes.chimeGain = audioContext.createGain();
    audioNodes.chimeGain.gain.setValueAtTime(0.25, audioContext.currentTime);
    audioNodes.chimeGain.connect(audioNodes.masterGain);
    audioNodes.melodyGain = audioContext.createGain();
    audioNodes.melodyGain.gain.setValueAtTime(0.2, audioContext.currentTime);
    audioNodes.melodyGain.connect(audioNodes.masterGain);
  } catch (e) {
    console.log('AudioContext init failed', e);
  }
}

function playBGM() {
  if (!audioContext) initBGM();
  if (audioContext && audioContext.state === 'suspended') audioContext.resume();
  playPadLayer();
  playChimeLayer();
  playMelodyLayer();
}

function playPadLayer() {
  function schedulePad() {
    const now = audioContext.currentTime;
    const delay = 5 + Math.random() * 3;
    const osc = audioContext.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(220 + Math.random() * 20, now);
    const filter = audioContext.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(800, now);
    const gain = audioContext.createGain();
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + delay);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioNodes.padGain);
    osc.start(now);
    osc.stop(now + delay);
    setTimeout(schedulePad, delay * 1000);
  }
  schedulePad();
}

function playChimeLayer() {
  function scheduleChime() {
    const now = audioContext.currentTime;
    const delay = 3 + Math.random() * 2;
    const frequencies = [880, 987, 1175, 1320, 1567];
    const freq = frequencies[Math.floor(Math.random() * frequencies.length)];

/**
 * Calculate Zodiac Sign from Birthday
 */
function getZodiacFromBirthday(birthday) {
  const date = new Date(birthday);
  const month = date.getMonth() + 1;
  const day = date.getDate();

  for (let sign of ZODIAC_SIGNS) {
    const [startMonth, startDay] = sign.dateRange.split('日-')[0].split('月').map(Number);
    const [endMonth, endDay] = sign.dateRange.split('日-')[1].split('月').map(Number);

    if ((month === startMonth && day >= startDay) || (month === endMonth && day <= endDay)) {
      return sign;
    }
  }
}

/**
 * Calculate Life Path Number from Birthday
 */
function calculateLifePathNumber(birthday) {
  const date = new Date(birthday);
  const year = date.getFullYear();
  const month = date.getMonth() + 1;
  const day = date.getDate();

  let sum = String(year).split('').reduce((a, b) => a + parseInt(b), 0) +
            String(month).split('').reduce((a, b) => a + parseInt(b), 0) +
            String(day).split('').reduce((a, b) => a + parseInt(b), 0);

  while (sum > 9 && ![11, 22, 33].includes(sum)) {
    sum = String(sum).split('').reduce((a, b) => a + parseInt(b), 0);
  }

  return sum;
}

/**
 * Calculate Nine Star Ki from Birth Year
 */
function calculateNineStarKi(birthday) {
  const date = new Date(birthday);
  const year = date.getFullYear();
  const yearSum = String(year).split('').reduce((a, b) => a + parseInt(b), 0);
  const ki = (11 - yearSum) % 9 || 9;
  return ki;
}

/**
 * Get Animal Spirit based on Birthday
 */
function getAnimalSpirit(birthday) {
  const date = new Date(birthday);
  const day = date.getDate();
  const month = date.getMonth() + 1;
  const monthDay = month * 2 + (day % 12);
  const index = ((monthDay - 1) % 12) + 1;
  return ANIMAL_SPIRITS[index];
}

// Helper function for soft rounded rectangles
function drawRoundRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);

// ============================================
// AREA BACKGROUNDS & BUILDINGS
// Canvas 2D Drawing Functions
// ============================================

const AREA_THEMES = [
  {sky:['#FFF3E0','#FFE0B2','#FFCC80'], ground:['#A5D6A7','#81C784']},  // 0: 和の占い村
  {sky:['#F3E5F5','#E1BEE7','#CE93D8'], ground:['#D7CCC8','#BCAAA4']},  // 1: 西洋占い街
  {sky:['#E8F5E9','#C8E6C9','#A5D6A7'], ground:['#8BC34A','#689F38']},  // 2: ふしぎ占いの森
  {sky:['#1a1a40','#2d2260','#3d3080'], ground:['#37474F','#263238']},  // 3: 星空占いの丘
  {sky:['#FFF3E0','#FFB74D','#FF9800'], ground:['#A1887F','#795548']},  // 4: 龍神占いの山
  {sky:['#E1F5FE','#81D4FA','#4FC3F7'], ground:['#FFE0B2','#FFD54F']},  // 5: 人魚占いの海
  {sky:['#F3E5F5','#CE93D8','#E1BEE7'], ground:['#C8E6C9','#A5D6A7']},  // 6: 精霊占いの川
  {sky:['#FCE4EC','#F8BBD0','#F48FB1'], ground:['#E1BEE7','#CE93D8']}   // 7: 天空占いの城
];

// ============================================
// HELPER: Draw sky gradient
// ============================================
function drawSkyGradient(ctx, w, h, areaIdx) {
  const theme = AREA_THEMES[areaIdx];
  const skyColors = theme.sky;
  const gradient = ctx.createLinearGradient(0, 0, 0, h * 0.6);
  gradient.addColorStop(0, skyColors[0]);
  gradient.addColorStop(0.5, skyColors[1]);
  gradient.addColorStop(1, skyColors[2]);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, w, h * 0.6);
}

// ============================================
// HELPER: Draw ground with slight texture
// ============================================
function drawGround(ctx, w, h, areaIdx) {
  const theme = AREA_THEMES[areaIdx];
  const groundColors = theme.ground;
  const gradient = ctx.createLinearGradient(0, h * 0.55, 0, h);
  gradient.addColorStop(0, groundColors[0]);
  gradient.addColorStop(1, groundColors[1]);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, h * 0.55, w, h * 0.45);
}

// ============================================
// HELPER: Soft clouds (non-dark areas)
// ============================================
function drawSoftClouds(ctx, w, h, frame) {
  const cloudPositions = [
    {x: w * 0.15, y: h * 0.15},
    {x: w * 0.6, y: h * 0.1},
    {x: w * 0.85, y: h * 0.2}
  ];

  cloudPositions.forEach((pos, i) => {
    const offset = Math.sin((frame + i * 20) * 0.01) * 15;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.beginPath();
    ctx.ellipse(pos.x + offset, pos.y, 60, 30, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(pos.x + offset + 40, pos.y + 5, 50, 25, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ============================================
// HELPER: Curved path/road
// ============================================
function drawPath(ctx, w, h) {
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.bezierCurveTo(w * 0.1, h * 0.7, w * 0.5, h * 0.85, w * 0.9, h * 0.75);
  ctx.stroke();
}

// ============================================
// HELPER: Horizon line
// ============================================
function drawHorizonLine(ctx, w, h) {
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, h * 0.55);
  ctx.lineTo(w, h * 0.55);
  ctx.stroke();
}

// ============================================
// AREA 0: 和の占い村 (Japanese Shrine Village)
// ============================================
function drawAreaBackground0(ctx, w, h, frame) {
  drawSkyGradient(ctx, w, h, 0);
  drawGround(ctx, w, h, 0);
  drawSoftClouds(ctx, w, h, frame);

  // Soft torii gate silhouette in background
  ctx.fillStyle = 'rgba(139, 69, 19, 0.15)';
  ctx.beginPath();
  ctx.rect(w * 0.5 - 20, h * 0.35, 40, 80);
  ctx.fill();
  ctx.beginPath();
  ctx.rect(w * 0.5 - 35, h * 0.35, 70, 8);
  ctx.fill();

  // Cherry blossom petals falling
  for (let i = 0; i < 15; i++) {

function drawAreaBuilding0(ctx, x, y, bw, bh, buildingIdx) {
  const buildings = [
    // 0: Japanese shrine (torii)
    () => {
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x - bw * 0.15, y, bw * 0.3, bh * 0.8);

      ctx.fillRect(x - bw * 0.35, y + bh * 0.3, bw * 0.7, bh * 0.5);

      ctx.fillRect(x - bw * 0.08, y + bh * 0.6, bw * 0.16, bh * 0.2);
    },
    // 3: Garden tea house
    () => {
      ctx.fillStyle = '#DEB887';
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + bw * 0.3, y + bh * 0.25);
      ctx.lineTo(x + bw * 0.3, y + bh * 0.7);
      ctx.lineTo(x - bw * 0.3, y + bh * 0.7);
      ctx.lineTo(x - bw * 0.3, y + bh * 0.25);

      ctx.fillStyle = '#FFD700';
      ctx.fillRect(x - bw * 0.15, y + bh * 0.35, bw * 0.1, bh * 0.15);
      ctx.fillRect(x + bw * 0.05, y + bh * 0.35, bw * 0.1, bh * 0.15);
    },
    // 4: Paper lantern house
    () => {
      ctx.fillStyle = '#FFFACD';
      ctx.beginPath();
      ctx.arc(x, y + bh * 0.4, bw * 0.25, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x - bw * 0.2, y + bh * 0.5, bw * 0.4, bh * 0.3);

      ctx.fillRect(x + bw * 0.02, y + bh * 0.55, bw * 0.08, bh * 0.1);

    () => {
      ctx.fillStyle = '#CD5C5C';
      ctx.fillRect(x - bw * 0.3, y + bh * 0.2, bw * 0.6, bh * 0.6);
      ctx.fillStyle = '#8B3A3A';

      ctx.moveTo(x - bw * 0.35, y + bh * 0.2);

  ctx.fill();
  ctx.fillStyle = '#F5DEB3';
  ctx.fillRect(w * 0.75 - 4, h * 0.68, 8, 12);

  // Flowers
  for (let i = 0; i < 8; i++) {
    const fx = w * (0.1 + i * 0.1);
    ctx.fillStyle = ['#FFB6C1', '#FF69B4', '#FFD700'][i % 3];
    ctx.beginPath();
    ctx.arc(fx, h * 0.72, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Fireflies (glowing dots)
  for (let i = 0; i < 12; i++) {
    const fx = (frame * 0.3 + i * 40) % w;
    const fy = h * 0.4 + Math.sin((frame + i * 15) * 0.02) * 30;

    ctx.arc(fx, fy, 8, 0, Math.PI * 2);
    ctx.fill();
  }

  drawPath(ctx, w, h);
  drawHorizonLine(ctx, w, h);
}

      ctx.arc(x, y + bh * 0.55, bw * 0.1, 0, Math.PI * 2);

    },
    // 1: Giant tree hollow

      ctx.arc(x, y + bh * 0.2, bw * 0.2, 0, Math.PI * 2);

      ctx.fillStyle = '#696969';
      ctx.beginPath();
      ctx.arc(x, y + bh * 0.5, bw * 0.3, 0, Math.PI, false);
      ctx.fill();
      ctx.fillStyle = '#2F4F4F';
      ctx.fillRect(x - bw * 0.25, y + bh * 0.5, bw * 0.5, bh * 0.3);
      // Crystals
      ctx.fillStyle = '#9370DB';
      ctx.beginPath();
      ctx.moveTo(x - bw * 0.15, y + bh * 0.3);
      ctx.lineTo(x - bw * 0.1, y + bh * 0.5);
      ctx.lineTo(x - bw * 0.2, y + bh * 0.5);
      ctx.fill();
      ctx.fillStyle = '#DA70D6';
      ctx.beginPath();
      ctx.moveTo(x + bw * 0.15, y + bh * 0.25);
      ctx.lineTo(x + bw * 0.1, y + bh * 0.5);
      ctx.lineTo(x + bw * 0.2, y + bh * 0.5);
      ctx.fill();
    },
    // 4: Flower garden gazebo
    () => {
      ctx.fillStyle = '#DEB887';
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2;
        const px = x + Math.cos(angle) * bw * 0.2;
        const py = y + bh * 0.2 + Math.sin(angle) * bh * 0.2;
        ctx.fillRect(px - 4, py - 4, 8, 30);
      }
      // Roof
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.arc(x, y + bh * 0.15, bw * 0.22, 0, Math.PI * 2);
      ctx.fill();
      // Flowers inside
      const flowerColors = ['#FF1493', '#FFB6C1', '#FFD700', '#FF69B4'];
      for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2;
        const fx = x + Math.cos(angle) * bw * 0.1;
        const fy = y + bh * 0.35 + Math.sin(angle) * bh * 0.1;
        ctx.fillStyle = flowerColors[i];
        ctx.beginPath();
        ctx.arc(fx, fy, 8, 0, Math.PI * 2);
        ctx.fill();
      }

    () => {
      ctx.fillStyle = '#663399';
      ctx.fillRect(x - bw * 0.3, y + bh * 0.3, bw * 0.6, bh * 0.5);

}

// ============================================
// AREA 3: 星空占いの丘 (Starry Sky Hill)
// ============================================
function drawAreaBackground3(ctx, w, h, frame) {
  drawSkyGradient(ctx, w, h, 3);
  drawGround(ctx, w, h, 3);

  // Stars twinkling
  const stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: Math.random() * w,
      y: Math.random() * h * 0.5,
      size: Math.random() * 1.5,
      twinkle: Math.random()
    });
  }

  stars.forEach(star => {
    const twinkleAmount = Math.sin((frame + star.twinkle * 200) * 0.05) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(255, 255, 255, ${twinkleAmount})`;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // Moon
  ctx.fillStyle = 'rgba(255, 250, 205, 0.8)';
  ctx.beginPath();
  ctx.arc(w * 0.15, h * 0.15, 40, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a1a40';
  ctx.beginPath();
  ctx.arc(w * 0.17, h * 0.13, 38, 0, Math.PI * 2);
  ctx.fill();

  // Shooting stars occasionally
  if (Math.sin(frame * 0.01) > 0.97) {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(w * 0.6, h * 0.1);
    ctx.lineTo(w * 0.5, h * 0.25);
    ctx.stroke();
  }

  // Constellation lines
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(w * 0.3, h * 0.2);
  ctx.lineTo(w * 0.4, h * 0.35);
  ctx.lineTo(w * 0.35, h * 0.45);
  ctx.stroke();

  drawPath(ctx, w, h);
  drawHorizonLine(ctx, w, h);
}

function drawAreaBuilding3(ctx, x, y, bw, bh, buildingIdx) {
  const buildings = [
    // 0: Observatory dome

      ctx.fillStyle = '#505050';

      ctx.beginPath();
      ctx.moveTo(x - 8, y + bh * 0.25);
      ctx.lineTo(x + 8, y + bh * 0.25);
      ctx.stroke();
    },

      ctx.fillStyle = '#FFFACD';

      ctx.fill();

      ctx.arc(x + bw * 0.05, y + bh * 0.4, bw * 0.18, 0, Math.PI * 2);

    () => {
      ctx.fillStyle = '#696969';
      ctx.fillRect(x - bw * 0.15, y + bh * 0.2, bw * 0.3, bh * 0.6);
      // Star on top
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      const sx = x;
      const sy = y - bh * 0.05;
      for (let i = 0; i < 5; i++) {
        const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
        const px = sx + Math.cos(angle) * 15;
        const py = sy + Math.sin(angle) * 15;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      // Windows
      ctx.fillStyle = '#4169E1';

        const fy = y + bh * 0.35 + Math.sin(angle) * bh * 0.15;

        for (let j = 0; j < 5; j++) {
          const a = (j * 4 * Math.PI) / 5 - Math.PI / 2;

          const py = fy + Math.sin(a) * 8;
          if (j === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);

        ctx.closePath();
        ctx.fill();
      }
    },
    // 4: Clock tower with stars

      ctx.fillStyle = '#808080';

      // Clock

      ctx.beginPath();
      ctx.arc(x, y + bh * 0.12, bw * 0.12, 0, Math.PI * 2);

      ctx.beginPath();
      ctx.moveTo(x, y + bh * 0.12);
      ctx.lineTo(x, y + bh * 0.05);

      ctx.beginPath();
      ctx.moveTo(x, y + bh * 0.12);

        ctx.arc(sx, sy, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    },
    // 5: Grand palace
    () => {
      ctx.fillStyle = '#A9A9A9';
      ctx.fillRect(x - bw * 0.35, y + bh * 0.25, bw * 0.7, bh * 0.55);
      // Towers
      ctx.fillStyle = '#696969';
      ctx.fillRect(x - bw * 0.38, y + bh * 0.15, bw * 0.08, bh * 0.6);
      ctx.fillRect(x + bw * 0.3, y + bh * 0.15, bw * 0.08, bh * 0.6);
      // Roof
      ctx.fillStyle = '#8B008B';
      ctx.beginPath();
      ctx.moveTo(x - bw * 0.36, y + bh * 0.25);
      ctx.lineTo(x, y + bh * 0.05);
      ctx.lineTo(x + bw * 0.36, y + bh * 0.25);

  ctx.fillRect(x - bw * 0.8, y + bh * 0.4, bw * 1.6, bh * 0.8);

  ctx.ellipse(x, y + bh * 0.75, bw * 0.3, bh * 0.1, 0, 0, Math.PI * 2);

// ============================================
// AREA 4: 龍神占いの山 (Dragon God Mountain)
// ============================================
function drawAreaBackground4(ctx, w, h, frame) {
  drawSkyGradient(ctx, w, h, 4);
  drawGround(ctx, w, h, 4);

  // Mountain silhouettes in layers (parallax)
  const mountains = [
    {x: 0, w: w, y: h * 0.4, height: h * 0.3, color: 'rgba(160, 82, 45, 0.3)'},
    {x: 0, w: w, y: h * 0.35, height: h * 0.35, color: 'rgba(139, 69, 19, 0.4)'},
    {x: 0, w: w, y: h * 0.3, height: h * 0.4, color: 'rgba(101, 50, 15, 0.5)'}
  ];

  mountains.forEach(m => {
    ctx.fillStyle = m.color;
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    for (let i = 0; i <= 20; i++) {
      const px = m.x + (i / 20) * m.w;
      const py = m.y + Math.sin((i / 20 - 0.5) * Math.PI) * m.height;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.lineTo(m.x + m.w, h);
    ctx.lineTo(m.x, h);
    ctx.fill();
  });

  // Waterfall
  ctx.fillStyle = 'rgba(135, 206, 250, 0.6)';
  ctx.fillRect(w * 0.45, h * 0.25, 20, h * 0.4);
  // Water ripples
  ctx.strokeStyle = 'rgba(135, 206, 250, 0.3)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 3; i++) {
    const offset = (frame + i * 30) % 40;
    ctx.beginPath();
    ctx.arc(w * 0.5, h * 0.35 + offset, 15, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Mist
  ctx.fillStyle = 'rgba(200, 200, 200, 0.15)';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(w * (0.3 + i * 0.15), h * 0.45 + Math.sin(frame * 0.01 + i) * 10, 50, 0, Math.PI * 2);
    ctx.fill();
  }

  drawPath(ctx, w, h);
  drawHorizonLine(ctx, w, h);
}

// ============================================
// AREA 5: 人魚占いの海 (Mermaid Fortune Sea)
// ============================================
function drawAreaBackground5(ctx, w, h, frame) {
  drawSkyGradient(ctx, w, h, 5);
  // Beach instead of regular ground
  ctx.fillStyle = '#FFE0B2';
  ctx.fillRect(0, h * 0.55, w, h * 0.45);

  // Ocean waves
  ctx.fillStyle = '#4FC3F7';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    const waveY = h * 0.55 - i * 15;
    for (let x = 0; x <= w; x += 20) {
      const y = waveY + Math.sin((frame * 0.02 + x * 0.05 + i * Math.PI / 3)) * 8;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h * 0.55);
    ctx.lineTo(0, h * 0.55);
    ctx.closePath();
    ctx.fill();
  }

  // Seagulls
  for (let i = 0; i < 3; i++) {
    const gx = (frame * 0.2 + i * w / 3) % w;
    const gy = h * 0.3 + Math.sin((frame + i * 60) * 0.01) * 10;
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(gx - 8, gy);
    ctx.lineTo(gx - 5, gy - 5);
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx + 5, gy - 5);
    ctx.moveTo(gx + 8, gy);
    ctx.stroke();
  }

  // Shells on beach
  ctx.fillStyle = '#FFB6C1';
  for (let i = 0; i < 8; i++) {
    const sx = w * (0.1 + i * 0.1);
    ctx.beginPath();
    ctx.arc(sx, h * 0.7, 8, 0, Math.PI * 2);
    ctx.fill();
  }

  // Bubbles
  for (let i = 0; i < 10; i++) {
    const bx = (frame * 0.1 + i * 50) % w;
    const by = h * 0.6 - ((frame + i * 20) % 200) * 0.5;
    ctx.strokeStyle = 'rgba(173, 216, 230, 0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(bx, by, 5, 0, Math.PI * 2);
    ctx.stroke();
  }

  drawPath(ctx, w, h);
  drawHorizonLine(ctx, w, h);
}

// ============================================
// AREA 6: 精霊占いの川 (Spirit River)
// ============================================
function drawAreaBackground6(ctx, w, h, frame) {
  drawSkyGradient(ctx, w, h, 6);
  drawGround(ctx, w, h, 6);
  drawSoftClouds(ctx, w, h, frame);

  // River flowing through
  ctx.fillStyle = '#87CEEB';
  ctx.beginPath();
  ctx.bezierCurveTo(0, h * 0.35, w * 0.3, h * 0.5, w, h * 0.65);
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.fill();

  // River flow lines
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    const offset = (frame * 0.1) % 100;
    for (let x = -offset; x < w + offset; x += 20) {
      const baseY = h * 0.35 + (x / w) * h * 0.3;
      const y = baseY + Math.sin((x + frame) * 0.01) * 10;
      if (x === -offset) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Lily pads
  ctx.fillStyle = '#228B22';
  for (let i = 0; i < 6; i++) {
    const px = w * (0.1 + i * 0.15);
    const py = h * 0.45 + i * 8;
    ctx.beginPath();
    ctx.arc(px, py, 15, 0, Math.PI * 2);
    ctx.fill();
    // Flower on pad
    ctx.fillStyle = '#FF69B4';
    ctx.beginPath();
    ctx.arc(px, py, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#228B22';
  }

  // Fireflies
  for (let i = 0; i < 12; i++) {
    const fx = (frame * 0.3 + i * 40) % w;
    const fy = h * 0.35 + Math.sin((frame + i * 15) * 0.02) * 40;
    ctx.fillStyle = 'rgba(255, 255, 0, 0.7)';
    ctx.beginPath();
    ctx.arc(fx, fy, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
    ctx.beginPath();
    ctx.arc(fx, fy, 7, 0, Math.PI * 2);
    ctx.fill();
  }

  // Tall grass
  ctx.strokeStyle = 'rgba(34, 139, 34, 0.6)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 15; i++) {
    const gx = w * (0.05 + i * 0.06);
    ctx.beginPath();
    ctx.moveTo(gx, h * 0.6);
    ctx.quadraticCurveTo(gx + 5, h * 0.5, gx, h * 0.4);
    ctx.stroke();
  }

  drawPath(ctx, w, h);
  drawHorizonLine(ctx, w, h);
}

// ============================================
// AREA 7: 天空占いの城 (Sky Castle)
// ============================================
function drawAreaBackground7(ctx, w, h, frame) {
  drawSkyGradient(ctx, w, h, 7);
  drawGround(ctx, w, h, 7);

  // Clouds everywhere
  ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
  for (let i = 0; i < 12; i++) {
    const cx = w * (0.05 + i * 0.08);
    const cy = h * (0.15 + (i % 3) * 0.15);
    const offset = Math.sin((frame + i * 20) * 0.01) * 20;
    ctx.beginPath();
    ctx.arc(cx + offset, cy, 40, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + offset + 30, cy, 35, 0, Math.PI * 2);
    ctx.fill();
  }

  // Rainbow
  const rainbowColors = ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#9400D3'];
  for (let i = 0; i < rainbowColors.length; i++) {
    ctx.strokeStyle = rainbowColors[i];
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.arc(w * 0.75, h * 0.3, 100 - i * 12, 0, Math.PI, true);
    ctx.stroke();
  }

  // Floating islands
  ctx.fillStyle = '#C8E6C9';
  ctx.fillRect(w * 0.65, h * 0.25, 60, 20);
  ctx.fillStyle = '#7CB342';
  ctx.beginPath();
  ctx.moveTo(w * 0.6, h * 0.25);
  ctx.lineTo(w * 0.75, h * 0.05);
  ctx.lineTo(w * 0.9, h * 0.25);
  ctx.fill();

  ctx.fillStyle = '#C8E6C9';
  ctx.fillRect(w * 0.1, h * 0.45, 50, 18);
  ctx.fillStyle = '#7CB342';
  ctx.beginPath();
  ctx.moveTo(w * 0.08, h * 0.45);
  ctx.lineTo(w * 0.2, h * 0.3);
  ctx.lineTo(w * 0.32, h * 0.45);
  ctx.fill();

  // Sparkles
  for (let i = 0; i < 20; i++) {
    const sx = (frame * 0.3 + i * 50) % w;
    const sy = h * 0.3 + Math.sin((frame + i * 30) * 0.02) * 60;
    ctx.fillStyle = 'rgba(255, 255, 100, 0.7)';
    ctx.beginPath();
    ctx.arc(sx, sy, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 255, 100, 0.3)';
    ctx.beginPath();
    ctx.arc(sx, sy, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  drawPath(ctx, w, h);
  drawHorizonLine(ctx, w, h);
}

      ctx.fillRect(x - bw * 0.35, y + bh * 0.25, bw * 0.7, bh * 0.55);
      // Central tower
      ctx.fillStyle = '#A9A9A9';
      ctx.fillRect(x - bw * 0.08, y + bh * 0.05, bw * 0.16, bh * 0.25);
      // Roofs
      ctx.fillStyle = '#8B008B';
      ctx.beginPath();
      ctx.moveTo(x - bw * 0.36, y + bh * 0.25);
      ctx.lineTo(x, y + bh * 0.1);
      ctx.lineTo(x + bw * 0.36, y + bh * 0.25);
      ctx.fill();
      // Side towers
      ctx.beginPath();
      ctx.moveTo(x - bw * 0.35, y + bh * 0.3);
      ctx.lineTo(x - bw * 0.2, y + bh * 0.12);
      ctx.lineTo(x - bw * 0.05, y + bh * 0.3);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x + bw * 0.35, y + bh * 0.3);
      ctx.lineTo(x + bw * 0.2, y + bh * 0.12);
      ctx.lineTo(x + bw * 0.05, y + bh * 0.3);
      ctx.fill();
    },
    // 5: Castle turret
    () => {
      ctx.fillStyle = '#696969';
      ctx.fillRect(x - bw * 0.18, y + bh * 0.25, bw * 0.36, bh * 0.55);
      // Turret top
      ctx.fillStyle = '#2F4F4F';
      ctx.beginPath();
      ctx.moveTo(x - bw * 0.22, y + bh * 0.25);
      ctx.lineTo(x, y + bh * 0.05);
      ctx.lineTo(x + bw * 0.22, y + bh * 0.25);
      ctx.fill();
      // Crenellations
      for (let i = -1; i <= 1; i++) {
        ctx.fillRect(x + i * bw * 0.12 - 6, y + bh * 0.2, 12, 8);
      }
      // Windows
      ctx.fillStyle = '#4169E1';
      ctx.fillRect(x - bw * 0.08, y + bh * 0.4, 10, 10);
      ctx.fillRect(x + bw * 0.08 - 5, y + bh * 0.4, 10, 10);
    }
  ];

  const glowGradient = ctx.createRadialGradient(x, y + bh * 0.6, 0, x, y + bh * 0.6, bw * 0.8);
  glowGradient.addColorStop(0, 'rgba(255, 220, 150, 0.3)');
  glowGradient.addColorStop(1, 'rgba(255, 220, 150, 0)');
  ctx.fillStyle = glowGradient;
  ctx.fillRect(x - bw * 0.8, y + bh * 0.4, bw * 1.6, bh * 0.8);

  ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
  ctx.beginPath();
  ctx.ellipse(x, y + bh * 0.75, bw * 0.3, bh * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();

  buildings[buildingIdx]();

  ctx.fillStyle = '#333';
  ctx.font = 'bold 11px Arial';
  ctx.textAlign = 'center';
  const labels = ['星', '寺', '塔', '書', '宮', '砦'];
  ctx.fillText(labels[buildingIdx], x, y + bh + 15);
}


// ===================== GAME ENGINE =====================
// ===================== PART 2: FORTUNE-TELLING GAME ENGINE =====================
// Core game state, canvas system, game loop, and interaction handling
// Follows exact patterns from original shiba-walk-game.html

// ===================== GLOBAL STATE (G object) =====================
const G = {
  // Screen & navigation
  screen: 'title',                    // current screen: 'title', 'game', 'fortune', etc
  frame: 0,                           // frame counter for animations
  gtime: 0,                           // game time counter (increases every loop)
  lastTime: 0,                        // for deltaTime calculation
  
  // Game state
  areaIdx: 0,                         // current area (0-3)
  buildingId: null,                   // currently selected building (for fortune)
  fortuneInProgress: false,           // true while fortune is being told
  fortuneResult: null,                // stores current fortune data
  
  // Player (shiba)
  px: 0, py: 0,                       // player position
  dx: 0, dy: 0,                       // dog position
  tx: null, ty: null,                 // target position for movement
  
  // NPCs & interactions
  npcs: [],                           // array of NPC objects in current area
  bubbles: [],                        // speech bubbles
  particles: [],                      // particle effects
  selectedNpc: null,                  // currently interacting NPC
  
  // UI state
  coins: 100,                         // currency
  bgmOn: true,                        // BGM toggle
  loopRunning: false,                 // game loop active
  
  // Animation timers
  walkFrame: 0,                       // leg animation frame
  tailFrame: 0,                       // tail animation frame
};

// ===================== CONSTANTS =====================
function W() { return window.innerWidth; }
function H() { return window.innerHeight; }

let canvas, ctx, cW, cH;

// Canvas configuration
const DEVICE_PIXEL_RATIO = window.devicePixelRatio || 1;

// Ground line positioning
const GROUND_Y_RATIO = 0.62;           // ground at 62% of canvas height
const PLAYER_WALK_Y_RATIO = 0.72;      // player walks at 72% of canvas height
const SKY_END_RATIO = 0.45;            // sky ends at 45% of canvas height

// Building grid positions (2 rows x 3 columns)
const BUILDING_ROW1_Y_RATIO = 0.15;
const BUILDING_ROW2_Y_RATIO = 0.40;
const BUILDING_X_POSITIONS = [0.17, 0.50, 0.83];  // 17%, 50%, 83% of canvas width

// NPC positioning (near buildings)
const NPC_SPAWN_RADIUS = 60;
const NPC_SPAWN_Y_OFFSET = 80;

// ===================== CANVAS & RENDERING INITIALIZATION =====================
window.addEventListener('load', () => {
  canvas = document.getElementById('gcanvas');
  if (!canvas) return;
  
  ctx = canvas.getContext('2d');
  resizeCanvas();
  
  window.addEventListener('resize', resizeCanvas);
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    onTouch(e);
  }, { passive: false });
  canvas.addEventListener('touchmove', onTouch, { passive: false });
  canvas.addEventListener('click', onClick);
  
});

function resizeCanvas() {
  cW = W();
  const bottomEl = document.getElementById('bottom-ui');
  const bottomH = (bottomEl ? bottomEl.offsetHeight : 160) || 160;
  cH = H() - bottomH;
  
  canvas.width = cW * DEVICE_PIXEL_RATIO;
  canvas.height = Math.max(cH, 300) * DEVICE_PIXEL_RATIO;
  
  canvas.style.width = cW + 'px';
  canvas.style.height = canvas.height / DEVICE_PIXEL_RATIO + 'px';
  
  ctx.scale(DEVICE_PIXEL_RATIO, DEVICE_PIXEL_RATIO);
}

// ===================== SCREEN NAVIGATION (goScreen) =====================
function goScreen(screenName, fadeOutDuration = 350) {
  const current = document.querySelector('.screen.active');
  const next = document.getElementById(screenName + '-screen');
  
  if (!next) return;
  
  if (current && current !== next) {
    current.classList.add('fade-out');
    
    setTimeout(() => {
      document.querySelectorAll('.screen').forEach(s => {
        s.classList.remove('active', 'fade-out');
      });
      next.classList.add('active');
      G.screen = screenName;
      
      // Initialize screen-specific logic
      if (screenName === 'game') {
        resizeCanvas();
        spawnNPCs();
        startLoop();
        if (G.bgmOn) playBGM();
      } else {
        stopLoop();
        stopBGM();
      }
    }, fadeOutDuration);
  } else {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    next.classList.add('active');
    G.screen = screenName;
    
    if (screenName === 'game') {
      resizeCanvas();
      spawnNPCs();
      startLoop();
      if (G.bgmOn) playBGM();
    } else {
      stopLoop();
      stopBGM();
    }
  }
}

// ===================== GAME LOOP =====================
function startLoop() {
  if (G.loopRunning) return;
  G.loopRunning = true;
  G.lastTime = performance.now();
  requestAnimationFrame(gameFrame);
}

function stopLoop() {
  G.loopRunning = false;
}

function gameFrame(now) {
  if (!G.loopRunning) return;
  const dt = now - G.lastTime;
  
  if (dt >= 16) {
    G.lastTime = now;
    gameLoop();
  }
  
  requestAnimationFrame(gameFrame);
}

function gameLoop() {
  G.frame++;
  G.gtime++;
  
  // Player movement toward target
  if (G.tx !== null && G.ty !== null) {
    const dx = G.tx - G.px;
    const dy = G.ty - G.py;
    const d = Math.hypot(dx, dy);
    
    if (d > 3) {
      const ease = Math.min(0.12, 4.0 / d);
      G.px += dx * ease;
      G.py += dy * ease;
    } else {
      G.tx = null;
      G.ty = null;
    }
  }
  
  // Dog follows player with smooth easing
  followTarget(G, 'dx', 'dy', G.px - 20, G.py + 15, 2.2, 25);
  
  // NPC movement
  for (const n of G.npcs) {
    n.frame = (n.frame || 0) + 1;
    n.x += n.vx || 0;
    n.y += n.vy || 0;
    
    // Bounce at boundaries
    if (n.x < 30 || n.x > cW - 30) n.vx *= -1;
    if (n.y < cH * 0.25 || n.y > cH * 0.85) n.vy *= -1;
    
    // Random direction changes
    if (Math.random() > 0.98) {
      n.vx = (Math.random() - 0.5) * 1;
      n.vy = (Math.random() - 0.5) * 0.5;
    }
  }
  
  // Animation frames
  G.walkFrame = (G.walkFrame + 1) % 10;
  G.tailFrame = (G.tailFrame + 1) % 8;
  
  // Boundary clamping
  const m = 25;
  G.px = Math.max(m, Math.min(cW - m, G.px));
  G.py = Math.max(cH * 0.25, Math.min(cH * 0.85, G.py));
  
  // Update bubbles and particles
  G.bubbles = G.bubbles.filter(b => {
    b.life--;
    b.y -= 0.5;
    return b.life > 0;
  });
  
  updateParticles();
  drawAll();
}

function followTarget(obj, xKey, yKey, tx, ty, speed, minDist) {
  const dx = tx - obj[xKey];
  const dy = ty - obj[yKey];
  const d = Math.hypot(dx, dy);
  
  if (d > minDist) {
    const ease = Math.min(1, speed / d * 3);
    const lerp = 0.06 + ease * 0.08;
    obj[xKey] += dx * lerp;
    obj[yKey] += dy * lerp;
  } else if (d > 5) {
    obj[xKey] += dx * 0.03;
    obj[yKey] += dy * 0.03;
  }
}

// ===================== TOUCH & CLICK HANDLING =====================
function onTouch(e) {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const x = (t.clientX - r.left) * (cW / r.width);
  const y = (t.clientY - r.top) * (cH / r.height);
  handleTap(x, y);
}

function onClick(e) {
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) * (cW / r.width);
  const y = (e.clientY - r.top) * (cH / r.height);
  handleTap(x, y);
}

function handleTap(x, y) {
  // Check building hits (6 buildings per area)
  const area = AREAS[G.areaIdx];
  for (let i = 0; i < area.buildings.length; i++) {
    const building = area.buildings[i];
    const rowIdx = Math.floor(i / 3);
    const colIdx = i % 3;
    const bx = cW * BUILDING_X_POSITIONS[colIdx];
    const by = cH * (rowIdx === 0 ? BUILDING_ROW1_Y_RATIO : BUILDING_ROW2_Y_RATIO);
    
    if (Math.hypot(bx - x, by - y) < 50) {
      enterBuilding(building);
      return;
    }
  }
  
  // Check NPC hits
  for (const n of G.npcs) {
    if (Math.hypot(n.x - x, n.y - y) < 35) {
      talkToNPC(n);
      return;
    }
  }
  
  // Area navigation (left/right arrows)
  if (x < 50) {
    changeArea(-1);
    return;
  }
  if (x > cW - 50) {
    changeArea(1);
    return;
  }
  
  // Set movement target
  G.tx = x;
  G.ty = y;
  playSE('step');
}

function changeArea(direction) {
  G.areaIdx = (G.areaIdx + direction + AREAS.length) % AREAS.length;
  const area = AREAS[G.areaIdx];
  
  if (document.getElementById('h-area')) {
    document.getElementById('h-area').textContent = area.name;
  }
  
  addBubble(cW / 2, cH / 2, area.name + 'に到着！', 60);
  playSE('arrival');
  spawnNPCs();
}

// ===================== NPC SYSTEM =====================
function spawnNPCs() {
  G.npcs = [];
  const area = AREAS[G.areaIdx];
  
  // Spawn 4 NPCs (one per building group) in this area
  for (let i = 0; i < 4; i++) {
    const npcData = NPCS_DATA[G.areaIdx * 4 + i];
    if (!npcData) continue;
    
    const npc = {
      ...npcData,
      x: 60 + Math.random() * (cW - 120),
      y: cH * 0.35 + Math.random() * cH * 0.4,
      vx: (Math.random() - 0.5) * 0.8,
      vy: (Math.random() - 0.5) * 0.3,
      frame: Math.floor(Math.random() * 20)
    };
    
    G.npcs.push(npc);
  }
}

function talkToNPC(npc) {
  G.selectedNpc = npc;
  const lineTypes = ['intro', 'trivia', 'advice', 'goodbye'];
  const lineType = lineTypes[Math.floor(Math.random() * lineTypes.length)];
  const text = npc.lines[lineType] || '...';
  
  addBubble(npc.x, npc.y - 40, text, 50);
}

function enterBuilding(building) {
  G.buildingId = building.id;
  G.fortuneInProgress = true;
  addBubble(cW / 2, cH / 2, building.name + 'に入った！', 60);
  playSE('enter');
  
  // Trigger fortune UI (implementation in drawing/UI code)
}

// ===================== PARTICLE & BUBBLE EFFECTS =====================
function addBubble(x, y, text, duration = 40) {
  G.bubbles.push({
    x: x,
    y: y,
    text: text,
    life: duration
  });
}

function emitParticles(x, y, type, count = 8) {
  for (let i = 0; i < count; i++) {
    G.particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4 - 2,
      type: type,
      life: 30
    });
  }
}

function updateParticles() {
  G.particles = G.particles.filter(p => {
    p.life--;
    p.x += p.vx;
    p.y += p.vy;
    return p.life > 0;
  });
}

function drawAll() {
  if (!ctx) return;
  const w = cW;
  const h = cH;
  ctx.clearRect(0, 0, w, h);

let fortuneHistory = [];
let npcAlbum = {};

function goTo(screenName) { goScreen(screenName); }

function startGame() {

function toggleBGM() {

function spawnNPCs() {

    });

// Building layout: 3 cols x 2 rows
function getBuildingPos(bIdx, w, h) {
  const cols = [0.17, 0.50, 0.83];
  const rows = [0.12, 0.34];
  const col = bIdx % 3;
  const row = Math.floor(bIdx / 3);
  return {
    x: w * cols[col],
    y: h * rows[row],
    bw: w * 0.14,
    bh: h * 0.22
  };
}

function drawAll() {
  if (!ctx) return;
  const w = cW;
  const h = cH;
  ctx.clearRect(0, 0, w, h);

  const aIdx = G.areaIdx;

  // 1. Draw area background
  const bgFns = [drawAreaBackground0, drawAreaBackground1, drawAreaBackground2, drawAreaBackground3,
                 drawAreaBackground4, drawAreaBackground5, drawAreaBackground6, drawAreaBackground7];
  if (bgFns[aIdx]) bgFns[aIdx](ctx, w, h, G.frame);

  // 2. Draw buildings (6 per area, 3 cols x 2 rows)
  const bldFns = [drawAreaBuilding0, drawAreaBuilding1, drawAreaBuilding2, drawAreaBuilding3,
                  drawAreaBuilding4, drawAreaBuilding5, drawAreaBuilding6, drawAreaBuilding7];
  if (bldFns[aIdx]) {
    for (let i = 0; i < 6; i++) {
      const pos = getBuildingPos(i, w, h);
      try {
        bldFns[aIdx](ctx, pos.x, pos.y, pos.bw, pos.bh, i);
      } catch(e) {}
      // Building name label
      const bName = AREAS[aIdx].buildings[i] || '';
      ctx.save();
      ctx.fillStyle = 'rgba(80,40,10,0.8)';
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(bName, pos.x, pos.y + pos.bh + 14);
      ctx.restore();
    }
  }

  // 3. Area nav arrows
  ctx.save();
  ctx.fillStyle = 'rgba(180,90,20,0.6)';
  ctx.font = 'bold 32px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('◀', 22, h * 0.5);
  ctx.fillText('▶', w - 22, h * 0.5);
  ctx.restore();

  // 4. Draw NPCs
  const npcDrawFns = {
    'tall': drawCuteOta, 'short': drawCuteTanaka, 'cat': drawCuteCat,
    'rabbit': drawCuteRabbit, 'fox': drawCuteFox, 'owl': drawCuteOwl,
    'frog': drawCuteFrog, 'panda': drawCutePanda, 'hamster': drawCuteHamster,
    'penguin': drawCutePenguin, 'tanuki': drawCuteTanuki, 'sheep': drawCuteSheep,
    'squirrel': drawCuteSquirrel, 'bear': drawCuteBear, 'dragon': drawCuteDragon,
    'mermaid': drawCuteCat
  };
  for (const npc of G.npcs) {
    // Update NPC position (gentle wander)
    npc.x += npc.vx;
    if (npc.x < 40 || npc.x > w - 40) npc.vx *= -1;
    npc.frame = (npc.frame + 1) % 120;
    const bounce = Math.sin(npc.frame * 0.1) * 0.5;
    const fn = npcDrawFns[npc.type];
    if (fn) {
      ctx.save();
      try { fn(ctx, npc.x, npc.y, bounce, 0.9); } catch(e) {}
      ctx.restore();
    }
    // Name label
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    const tw = ctx.measureText(npc.name).width + 14;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(npc.x - tw/2, npc.y - 55, tw, 18, 9);
    else ctx.rect(npc.x - tw/2, npc.y - 55, tw, 18);
    ctx.fill();
    ctx.fillStyle = '#5D4037';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(npc.name, npc.x, npc.y - 43);
    ctx.restore();
  }

  // 5. Player shiba (signature: drawPlayerShiba(ctx, x, y, frame, scale))
  ctx.save();
  try { drawPlayerShiba(ctx, G.px, G.py, G.frame, 1.0); } catch(e) {}
  ctx.restore();

  // 6. Companion dog (smaller)
  ctx.save();
  try { drawPlayerShiba(ctx, G.dx, G.dy, G.frame + 8, 0.7); } catch(e) {}
  ctx.restore();

  // 7. Speech bubbles
  for (let i = G.bubbles.length - 1; i >= 0; i--) {
    const b = G.bubbles[i];
    b.life--;
    if (b.life <= 0) { G.bubbles.splice(i, 1); continue; }
    const alpha = Math.min(1, b.life / 15);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    const tw = ctx.measureText(b.text).width + 18;
    const bx = Math.max(2, Math.min(b.x - tw/2, w - tw - 2));
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(bx, b.y - 14, tw, 22, 11); ctx.fill(); }
    else { ctx.fillRect(bx, b.y - 14, tw, 22); }
    ctx.fillStyle = '#4A2E0A';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(b.text, bx + 9, b.y + 3);
    ctx.restore();
  }

  // 8. Particles
  for (let i = G.particles.length - 1; i >= 0; i--) {
    const p = G.particles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    if (p.life <= 0) { G.particles.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = '#FFB74D';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // 9. Move player toward target
  if (G.tx !== null) {
    const dx = G.tx - G.px;
    const dy = G.ty - G.py;
    const dist = Math.hypot(dx, dy);
    if (dist > 3) {
      G.px += dx * 0.06;
      G.py += dy * 0.06;
      G.dx = G.px - 40;
      G.dy = G.py + 10;
    } else {
      G.tx = null;
    }
  }
}

// Override handleTap
function handleTap(x, y) {
  // Building hit detection
  for (let i = 0; i < 6; i++) {
    const pos = getBuildingPos(i, cW, cH);
    if (Math.abs(pos.x - x) < pos.bw * 0.7 && Math.abs(pos.y + pos.bh * 0.5 - y) < pos.bh * 0.7) {
      enterBuilding(i);
      return;
    }
  }
  // NPC hit detection
  for (const n of G.npcs) {
    if (Math.hypot(n.x - x, n.y - y) < 38) {
      talkToNPC(n);
      return;
    }
  }
  // Area navigation
  if (x < 50) { changeArea(-1); return; }
  if (x > cW - 50) { changeArea(1); return; }
  // Move player
  G.tx = x;
  G.ty = Math.max(cH * 0.5, Math.min(cH * 0.85, y));
  if (typeof playSE === 'function') playSE('step');
}

// Override changeArea
function changeArea(dir) {
  G.areaIdx = (G.areaIdx + dir + 8) % 8;
  spawnNPCs();
  emitParticles(cW/2, cH/2, 12);
  if (typeof playSE === 'function') playSE('area');
}

// enterBuilding
function enterBuilding(bIdx) {
  const area = AREAS[G.areaIdx];
  const bName = area.buildings[bIdx] || '占いの建物';
  const fType = FORTUNE_TYPES ? FORTUNE_TYPES[G.areaIdx * 6 + bIdx] || 'omikuji' : 'omikuji';
  G.currentBuildingName = bName;
  G.currentBuildingIdx = bIdx;
  G.currentFortuneType = fType;

  const bt2 = document.getElementById('bt2');
  const bModal = document.getElementById('building-modal');
  if (bt2) bt2.textContent = bName;

  // Update fortune menu buttons
  const key = G.areaIdx + '_' + bIdx;
  const used = (G.usedCategories && G.usedCategories[key]) ? G.usedCategories[key] : [];
  const cats = [
    {id:'today', label:'🌟 今日の全体運'},
    {id:'love',  label:'💖 恋愛運'},
    {id:'work',  label:'💼 仕事・学業運'},
    {id:'health',label:'🌿 健康・体調運'},
    {id:'lucky', label:'✨ ラッキーアドバイス'}
  ];
  const menu = document.getElementById('fortune-menu');
  if (menu) {
    menu.innerHTML = '';
    cats.forEach(function(cat) {
      const isUsed = used.includes(cat.id);
      const btn = document.createElement('button');
      btn.className = 'fmenu-btn' + (isUsed ? ' used' : '');
      btn.textContent = cat.label + (isUsed ? ' ✓' : '');
      btn.setAttribute('data-cat', cat.id);
      btn.onclick = function() { startFortuneTelling(this.getAttribute('data-cat')); };
      menu.appendChild(btn);
    });
  }

  if (bModal) bModal.classList.add('show');
  if (typeof playSE === 'function') playSE('open');
}

function closeBuilding() {
  const bModal = document.getElementById('building-modal');
  if (bModal) bModal.classList.remove('show');
}

function startFortuneTelling(category) {
  category = category || 'today';
  closeBuilding();

  const fType = G.currentFortuneType || 'omikuji';
  let result;
  try { result = generateFortune(fType); } catch(e) {
    result = {type:fType, level:'吉', msg:'良い流れが来ています。', advice:'前向きに進みましょう。', items:['金色','白い花']};
  }
  result.type = fType;
  result.category = category;

  // Category-specific overrides
  const catData = getCategoryFortune(category, result, G.playerName || 'あなた');
  result.categoryTitle = catData.title;
  result.categoryMsg = catData.msg;
  result.categoryAdvice = catData.advice;
  result.categoryItems = catData.items;

  // Mark this category as used for current building
  if (!G.usedCategories) G.usedCategories = {};
  const key = G.areaIdx + '_' + G.currentBuildingIdx;
  if (!G.usedCategories[key]) G.usedCategories[key] = [];
  if (!G.usedCategories[key].includes(category)) G.usedCategories[key].push(category);

  // Store in history
  fortuneHistory.unshift({
    date: new Date().toLocaleDateString('ja-JP'),
    fortune: G.currentBuildingName + '（' + catData.title + '）',
    level: result.level,
    msg: catData.msg
  });
  if (fortuneHistory.length > 50) fortuneHistory.pop();

  showFortuneResult(result);
  if (typeof playSE === 'function') playSE('fortune');
}

// Generate category-specific fortune content
function getCategoryFortune(category, base, name) {
  const level = base.level || '吉';
  const isGood = ['大大吉','大吉','中吉','小吉','吉'].includes(level);
  const cats = {
    today: {
      title: '今日の全体運',
      msg: isGood
        ? name + 'さんの今日は全体的に運気が上昇中！積極的に動くと良い結果が生まれます。'
        : name + 'さん、今日は少しゆっくり過ごすのが吉。無理をせず、丁寧に行動しましょう。',
      advice: '朝のルーティンを大切に。小さな成功体験が一日の運気を底上げします。',
      items: ['黄色いもの', '丸いもの', '数字の' + (Math.floor(Math.random()*9)+1)]
    },
    love: {
      title: '恋愛運',
      msg: isGood
        ? '💖 恋愛運は絶好調！気になる相手への積極的なアプローチが実を結ぶ時期です。'
        : '💝 今は焦らず、自分磨きの時期。内面を豊かにすることで素敵な出会いが近づきます。',
      advice: '笑顔と挨拶を大切に。普段から明るく接することで運命の出会いが引き寄せられます。',
      items: ['ピンク色', 'バラ', 'ハート柄', 'バニラの香り']
    },
    work: {
      title: '仕事・学業運',
      msg: isGood
        ? '💼 仕事運が急上昇！新しいプロジェクトや挑戦に最適なタイミングです。チームワークも◎'
        : '📚 今は地道な努力が実を結ぶ準備期間。基礎をしっかり固めることが後の成功につながります。',
      advice: 'TO-DOリストを作って優先順位をつけること。集中力が高まる午前中に重要な作業を。',
      items: ['青いペン', '手帳', '緑茶', '観葉植物']
    },
    health: {
      title: '健康・体調運',
      msg: isGood
        ? '🌿 健康運は良好！体を動かすと運気がさらにアップ。新しい運動習慣を始めるのに最適です。'
        : '🍃 少し疲れが溜まっているかも。十分な睡眠と水分補給を心がけて、体を労ってあげましょう。',
      advice: '規則正しい生活リズムが運気の基盤。特に「睡眠の質」を大切にしてください。',
      items: ['水', '緑色の野菜', '深呼吸', 'ストレッチ']
    },
    lucky: {
      title: 'ラッキーアドバイス',
      msg: '✨ 今のあなたへの特別なメッセージです。' + (isGood
        ? 'チャンスの波が来ています！直感を信じて、やりたいことに素直に従いましょう。'
        : '今は準備の時期。焦らず、コツコツと積み上げることで大きな花が咲きます。'),
      advice: ['今日中に誰かに感謝を伝えてみて', '窓を開けて新鮮な空気を吸おう', '好きな音楽を聴いてリフレッシュ', '新しいルートで帰り道を歩いてみよう', '日記に今日の良かったことを3つ書こう'][Math.floor(Math.random()*5)],
      items: base.items || ['ラッキーカラー', '笑顔', '感謝の言葉']
    }
  };
  return cats[category] || cats.today;
}

function showFortuneResult(result) {
  const overlay = document.getElementById('fortune-result-overlay');
  if (!overlay) return;
  const frTitle = document.getElementById('fr-title');
  const frBody = document.getElementById('fr-body');

  // Title: building name + category
  const titleText = (result.categoryTitle || (typeof FORTUNE_NAMES !== 'undefined' ? FORTUNE_NAMES[result.type] : null) || '占い結果');
  if (frTitle) frTitle.textContent = G.currentBuildingName + ' — ' + titleText;

  const levelColors = {'大大吉':'#FF4500','大吉':'#FF8C00','中吉':'#DAA520','小吉':'#3CB371','吉':'#1E90FF','末吉':'#9370DB','凶':'#778899','大凶':'#708090'};
  const levelColor = levelColors[result.level] || '#DAA520';
  const isGood = ['大大吉','大吉','中吉','小吉','吉'].includes(result.level);

  let bodyHtml = '';
  // Level badge
  bodyHtml += '<div style="font-size:30px;font-weight:bold;color:' + levelColor + ';margin:8px 0;text-shadow:0 1px 4px rgba(0,0,0,0.15);">' + (result.level || '吉') + '</div>';

  // Category message (priority over base message)
  const mainMsg = result.categoryMsg || result.msg || '';
  bodyHtml += '<div style="font-size:14px;line-height:1.85;color:#333;margin:10px 0;">' + mainMsg + '</div>';

  // Category advice
  const adviceText = result.categoryAdvice || result.advice || '';
  if (adviceText) {
    bodyHtml += '<div style="font-size:13px;color:#555;line-height:1.65;margin:8px 0;padding:10px 14px;background:rgba(255,165,0,0.07);border-left:3px solid #FFA500;border-radius:6px;">' + adviceText + '</div>';
  }

  // Lucky items
  const items = result.categoryItems || result.items || [];
  if (items.length > 0) {
    bodyHtml += '<div style="margin:12px 0;"><div style="font-size:11px;color:#aaa;margin-bottom:6px;letter-spacing:1px;">LUCKY ITEMS</div>';
    items.forEach(item => {
      bodyHtml += '<span style="display:inline-block;background:linear-gradient(135deg,#FFA500,#FF8C00);color:white;padding:5px 14px;border-radius:16px;margin:3px;font-size:12px;font-weight:bold;">' + item + '</span>';
    });
    bodyHtml += '</div>';
  }

  // Show remaining categories hint
  const key = G.areaIdx + '_' + G.currentBuildingIdx;
  const usedCount = (G.usedCategories && G.usedCategories[key]) ? G.usedCategories[key].length : 1;
  const remaining = 5 - usedCount;
  if (remaining > 0) {
    bodyHtml += '<div style="margin-top:12px;font-size:11px;color:#FFA500;text-align:center;">あと' + remaining + '種類の占いが残っています ✨</div>';
  } else {
    bodyHtml += '<div style="margin-top:12px;font-size:11px;color:#4CAF50;text-align:center;font-weight:bold;">🎉 この建物の占いを全種類コンプリート！</div>';
  }

  if (frBody) frBody.innerHTML = bodyHtml;
  overlay.classList.add('show');
}

function closeFortune() {
  const overlay = document.getElementById('fortune-result-overlay');
  if (overlay) overlay.classList.remove('show');
}

function talkToNPC(npc) {
  const greetings = [
    npc.name + 'だよ！今日の運勢を占おうか？',
    'やあ！' + npc.name + 'です！どの建物でも占えますよ♪',
    npc.name + '参上！あなたの未来が見えるよ！',
    'こんにちは！' + npc.name + 'が今日の吉方位を教えてあげよう！'
  ];
  addBubble(npc.x, npc.y - 45, greetings[Math.floor(Math.random() * greetings.length)], 90);
  if (!npcAlbum[npc.name]) npcAlbum[npc.name] = {met:true, type:npc.type, count:0};
  npcAlbum[npc.name].count++;
  if (typeof playSE === 'function') playSE('talk');
}

function openAlbum() {
  const grid = document.getElementById('album-grid');
  if (!grid) return;
  grid.innerHTML = '';
  NPC_DATA.forEach(npc => {
    const met = npcAlbum[npc.name];
    const card = document.createElement('div');
    card.className = 'album-card' + (met ? '' : ' locked');
    card.innerHTML = '<div class="ac-name">' + npc.name + '</div><div class="ac-met">' + (met ? '会った: '+met.count+'回' : '未発見 🔒') + '</div>';
    grid.appendChild(card);
  });
  document.getElementById('album-overlay').classList.add('show');
}

function closeAlbum() {
  const el = document.getElementById('album-overlay');
  if (el) el.classList.remove('show');
}

function openHistory() {
  const list = document.getElementById('history-list');
  if (!list) return;
  if (fortuneHistory.length === 0) {
    list.innerHTML = '<div style="color:#999;text-align:center;padding:30px;font-size:14px;">まだ占いの履歴がありません<br>建物に入って占ってもらおう！</div>';
  } else {
    list.innerHTML = fortuneHistory.map(h =>
      '<div class="history-item"><div class="hi-date">'+h.date+'</div><div class="hi-fortune">'+h.fortune+' — <span style="color:#FFA500;font-weight:bold;">'+h.level+'</span></div><div class="hi-description">'+(h.msg||'').substring(0,60)+'...</div></div>'
    ).join('');
  }
  document.getElementById('history-overlay').classList.add('show');
}

function closeHistory() {
  const el = document.getElementById('history-overlay');
  if (el) el.classList.remove('show');
}

// Title stars
function createStars() {
  const ct = document.getElementById('stars-ct');
  if (!ct) return;
  for (let i = 0; i < 30; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.cssText = 'left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+(2+Math.random()*4)+'px;height:'+star.style.width+';animation-delay:'+(Math.random()*2)+'s;';
    ct.appendChild(star);
  }
}
createStars();

</script>
