<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>柴犬うらないハウス</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  overflow: hidden;
  background: #f5f5f5;
}

.screen {
  position: absolute;
  width: 100vw;
  height: 100vh;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease-in-out;
}

.screen.active {
  opacity: 1;
  pointer-events: auto;
  z-index: 10;
}

.screen.title {
  background: linear-gradient(135deg, #5a3a7a 0%, #8b4ba8 50%, #6b4f8a 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle 3s infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.title-content {
  position: relative;
  z-index: 5;
  text-align: center;
}

.title-content h1 {
  font-size: clamp(2rem, 8vw, 4rem);
  color: #FFB74D;
  text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
  margin-bottom: 1rem;
  font-weight: 700;
  letter-spacing: 2px;
}

.title-content p {
  font-size: clamp(1rem, 4vw, 1.5rem);
  color: #E8D5F5;
  margin-bottom: 2.5rem;
  font-weight: 300;
}

.btn-start {
  padding: 1rem 2.5rem;
  font-size: 1.1rem;
  background: #FFB74D;
  color: #5a3a7a;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(255, 183, 77, 0.4);
  min-height: 44px;
}

.btn-start:active {
  transform: scale(0.98);
  box-shadow: 0 2px 8px rgba(255, 183, 77, 0.3);
}

.screen.profile {
  background: linear-gradient(180deg, #FFF8E1 0%, #f5f0e0 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 1rem;
}

.profile-card {
  background: white;
  border-radius: 20px;
  padding: 2rem;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 10px 40px rgba(155, 127, 184, 0.15);
}

.profile-card h2 {
  color: #5a3a7a;
  font-size: 1.8rem;
  margin-bottom: 1.5rem;
  text-align: center;
}

.form-group {
  margin-bottom: 1.5rem;
}

.form-group label {
  display: block;
  color: #6b4f8a;
  font-size: 1rem;
  margin-bottom: 0.5rem;
  font-weight: 500;
}

.form-group input,
.form-group select {
  width: 100%;
  padding: 0.75rem;
  border: 2px solid #E8D5F5;
  border-radius: 10px;
  font-size: 1rem;
  transition: border-color 0.3s ease;
  min-height: 44px;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: #9B7FB8;
  background: #f9f7fc;
}

.profile-buttons {
  display: flex;
  gap: 1rem;
  margin-top: 2rem;
}

.btn-primary, .btn-secondary {
  flex: 1;
  padding: 0.875rem;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  min-height: 44px;
}

.btn-primary {
  background: #9B7FB8;
  color: white;
  box-shadow: 0 4px 12px rgba(155, 127, 184, 0.3);
}

.btn-primary:active {
  transform: scale(0.96);
}

.btn-secondary {
  background: #E8D5F5;
  color: #5a3a7a;
  border: 2px solid #9B7FB8;
}

.btn-secondary:active {
  background: #d5c0e0;
}

.screen.game {
  background: #FFF8E1;
  display: flex;
  flex-direction: column;
}

#gameCanvas {
  flex: 1;
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
  background: linear-gradient(180deg, #f0e8ff 0%, #fff8e1 100%);
}

.game-ui-bar {
  background: linear-gradient(180deg, rgba(155, 127, 184, 0.95) 0%, rgba(107, 79, 138, 0.95) 100%);
  padding: 0.875rem 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 2px solid #E8D5F5;
  color: white;
  font-size: 0.95rem;
  gap: 1rem;
  flex-wrap: wrap;
  backdrop-filter: blur(10px);
}

.area-name {
  font-weight: 600;
  flex: 1;
  min-width: 120px;
  color: #FFB74D;
}

.nav-controls {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}

.nav-arrow, .control-btn {
  background: rgba(255, 255, 255, 0.2);
  border: none;
  color: white;
  padding: 0.5rem 0.75rem;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.3s ease;
  min-height: 44px;
  min-width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
}

.nav-arrow:active, .control-btn:active {
  background: rgba(255, 255, 255, 0.4);
  transform: scale(0.95);
}

.control-btn {
  font-size: 0.85rem;
}

.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 100;
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.modal-content {
  background: white;
  border-radius: 20px;
  padding: 2rem;
  max-width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  color: #5a3a7a;
}

@keyframes modalPop {
  0% { transform: scale(0.85) translateY(20px); opacity: 0; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}

.modal-content h3 {
  font-size: 1.5rem;
  margin-bottom: 1rem;
  color: #8b4ba8;
}

.modal-content p {
  line-height: 1.6;
  margin-bottom: 1rem;
  font-size: 0.95rem;
}

.modal-buttons {
  display: flex;
  gap: 1rem;
  margin-top: 1.5rem;
}

.modal-buttons .btn-primary,
.modal-buttons .btn-secondary {
  flex: 1;
}

.fortune-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: linear-gradient(135deg, #E8D5F5 0%, #d5c0e0 50%, #c8b0d8 100%);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  z-index: 110;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 1rem;
  overflow: hidden;
}

.fortune-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.fortune-overlay::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="white" opacity="0.3"/><circle cx="80" cy="30" r="1.5" fill="white" opacity="0.2"/><circle cx="50" cy="60" r="1" fill="white" opacity="0.25"/><circle cx="90" cy="80" r="2.5" fill="white" opacity="0.15"/></svg>');
  pointer-events: none;
}

.page-dots {
  position: absolute;
  top: 2rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 0.5rem;
  z-index: 2;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.4);
  cursor: pointer;
  transition: all 0.3s ease;
}

.dot.active {
  background: white;
  transform: scale(1.2);
}

.fortune-card {
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 2rem;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.6);
  animation: fortunePageIn 0.6s ease-out;
  position: relative;
  z-index: 2;
}

@keyframes fortunePageIn {
  0% { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}

.fortune-btn {
  display: inline-block;
  background: linear-gradient(135deg, #9B7FB8, #7B5FA8);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 12px 32px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 4px 16px rgba(120,80,180,0.3);
  margin-top: 8px;
}

.fortune-card h2 {
  color: #8b4ba8;
  font-size: 1.8rem;
  margin-bottom: 1.5rem;
  text-align: center;
}

.fortune-text {
  color: #5a3a7a;
  font-size: 1.1rem;
  line-height: 1.8;
  margin-bottom: 1.5rem;
  text-align: center;
}

.fortune-meter {
  margin: 1.5rem 0;
}

.meter-label {
  color: #6b4f8a;
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  display: flex;
  justify-content: space-between;
}

.meter-bar {
  width: 100%;
  height: 8px;
  background: #E8D5F5;
  border-radius: 10px;
  overflow: hidden;
}

.meter-fill {
  height: 100%;
  background: linear-gradient(90deg, #9B7FB8 0%, #FFB74D 100%);
  border-radius: 10px;
  transition: width 0.6s ease-out;
}

.lucky-items {
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid #E8D5F5;
}

.lucky-items h4 {
  color: #8b4ba8;
  font-size: 1rem;
  margin-bottom: 1rem;
  text-align: center;
}

.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
  gap: 0.75rem;
}

.item-badge {
  background: linear-gradient(135deg, #FFB74D 0%, #ffb059 100%);
  color: white;
  padding: 0.75rem;
  border-radius: 12px;
  text-align: center;
  font-size: 0.85rem;
  font-weight: 600;
  box-shadow: 0 4px 12px rgba(255, 183, 77, 0.3);
}

.fortune-nav {
  position: absolute;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 1rem;
  z-index: 2;
  width: calc(100% - 2rem);
  max-width: 500px;
  justify-content: space-between;
}

.btn-fortune {
  background: #9B7FB8;
  color: white;
  border: none;
  padding: 0.75rem 1.5rem;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.95rem;
  transition: all 0.3s ease;
  min-height: 44px;
  flex: 1;
  max-width: 150px;
}

.btn-fortune:active {
  transform: scale(0.96);
  box-shadow: 0 4px 12px rgba(155, 127, 184, 0.4);
}

.btn-fortune:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

@keyframes sparkle {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1); }
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.sparkle {
  animation: sparkle 0.6s ease-out;
}

.bounce {
  animation: bounce 0.5s ease-in-out;
}

@media (max-width: 600px) {
  .modal-content,
  .fortune-card {
    padding: 1.5rem;
  }

  .game-ui-bar {
    flex-direction: column;
    gap: 0.75rem;
  }

  .nav-controls {
    width: 100%;
    justify-content: space-around;
  }

  .profile-card {
    padding: 1.5rem;
  }

  .items-grid {
    grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
  }
}

@media (max-width: 400px) {
  .title-content h1 {
    font-size: 1.8rem;
  }

  .modal-content,
  .fortune-card {
    padding: 1.25rem;
    border-radius: 16px;
  }

  .btn-fortune {
    font-size: 0.85rem;
    padding: 0.65rem 1.25rem;
  }
}
</style>
</head>
<body>
<div id="app">
  <div id="titleScreen" class="screen title active">
    <div class="stars" id="starsContainer"></div>
    <div class="title-content">
      <h1>柴犬うらないハウス</h1>

  </div>

  <div id="gameScreen" class="screen game">
    <canvas id="gameCanvas"></canvas>
    <div class="game-ui-bar">
      <div class="area-name" id="areaName">えりあ1</div>
      <div class="nav-controls">
        <button class="nav-arrow" id="prevBtn">◀</button>
        <button class="nav-arrow" id="nextBtn">▶</button>
        <button class="control-btn" id="menuBtn">メニュー</button>
      </div>
    </div>
  </div>
</div>

<div id="modal" class="modal-overlay">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <p id="modalText"></p>
    <div class="modal-buttons">
      <button class="btn-primary" id="modalOkBtn">OK</button>
    </div>
  </div>
</div>

<div id="fortuneResult" class="screen">
  <p id="fortuneResultText"></p>
</div>

<div id="fortuneOverlay" class="fortune-overlay">
  <div class="page-dots" id="pageDots"></div>
  <div id="pagesContainer" class="fortune-card">

  <div class="fortune-nav">
    <button class="btn-fortune" id="prevPageBtn">もどる</button>
    <button class="btn-fortune" id="nextPageBtn">つぎへ</button>
    <button class="btn-fortune" id="closeFortuneBtn">とじる</button>
  </div>
</div>

function showMultiStepFortune(result) {
  G.fortunePages = buildFortunePages(result);
  G.currentPage = 0;
  document.getElementById('fortuneOverlay').classList.add('active');
  renderFortunePage();
}

function buildFortunePages(result) {
  const pages = [];
  pages.push({
    title: FORTUNE_NAMES[result.type] || '占い結果',
    content: result.msg,
    type: 'message'
  });
  pages.push({
    title: 'アドバイス',
    content: result.advice,
    type: 'advice'
  });
  if (result.level) {
    pages.push({
      title: 'レベル',
      content: result.level,
      level: result.level,
      type: 'level'
    });
  }
  if (result.items && result.items.length) {
    pages.push({
      title: 'ラッキーアイテム',
      content: result.items,
      type: 'items'
    });
  }
  return pages;
}

function renderFortunePage() {
  const container = document.getElementById('pagesContainer');
  const page = G.fortunePages[G.currentPage];
  let html = `<h2>${page.title}</h2>`;
  
  if (page.type === 'items') {
    html += '<div class="lucky-items"><div class="items-grid">';
    page.content.forEach(item => {
      html += `<div class="item-badge">${item}</div>`;
    });
    html += '</div></div>';
  } else {
    html += `<div class="fortune-text">${page.content}</div>`;
  }
  
  container.innerHTML = html;
  
  const dots = document.querySelectorAll('.dot');
  dots.forEach((d, i) => d.classList.toggle('active', i === G.currentPage));
  
  document.getElementById('prevPageBtn').disabled = G.currentPage === 0;
  document.getElementById('nextPageBtn').disabled = G.currentPage === G.fortunePages.length - 1;
}

function fortuneNextPage() {
  if (G.currentPage < G.fortunePages.length - 1) {
    G.currentPage++;
    renderFortunePage();
  }
}

function fortunePrevPage() {
  if (G.currentPage > 0) {
    G.currentPage--;
    renderFortunePage();
  }
}

function closeFortunOverlay() {

function startCanvas() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let animationFrame = 0;
  let dpr = window.devicePixelRatio || 1;
  // Logical (CSS) dimensions
  let lw = 0, lh = 0;

  function resizeCanvas() {
    dpr = window.devicePixelRatio || 1;
    lw = canvas.offsetWidth;
    lh = canvas.offsetHeight;
    canvas.width = lw * dpr;
    canvas.height = lh * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Area sky/ground/accent colors (warm, kawaii palette)
  const AREA_COLORS = [
    {sky:['#FFF3E0','#FFE0B2','#FFCC80'], ground:'#A5D6A7', accent:'#FF8A65', groundEnd:'#81C784'}, // 和の占い村
    {sky:['#F3E5F5','#E1BEE7','#CE93D8'], ground:'#D7CCC8', accent:'#BA68C8', groundEnd:'#BCAAA4'}, // 西洋占い街
    {sky:['#E8F5E9','#C8E6C9','#A5D6A7'], ground:'#8BC34A', accent:'#66BB6A', groundEnd:'#689F38'}, // 森
    {sky:['#1a1a40','#2d2260','#3d3080'], ground:'#37474F', accent:'#FDD835', groundEnd:'#263238'}, // 星空の丘
    {sky:['#FFF3E0','#FFB74D','#FF9800'], ground:'#A1887F', accent:'#FF7043', groundEnd:'#795548'}, // 龍神の山
    {sky:['#E1F5FE','#81D4FA','#4FC3F7'], ground:'#FFE0B2', accent:'#29B6F6', groundEnd:'#FFD54F'}, // 海
    {sky:['#F3E5F5','#CE93D8','#E1BEE7'], ground:'#C8E6C9', accent:'#AB47BC', groundEnd:'#A5D6A7'}, // 精霊の川
    {sky:['#FCE4EC','#F8BBD0','#F48FB1'], ground:'#E1BEE7', accent:'#EC407A', groundEnd:'#CE93D8'}  // 天空の城
  ];

  // Building theme colors per area
  const BLDG_THEMES = [
    ['#D84315','#BF360C','#E65100','#F4511E','#FF5722','#E64A19'], // 和風赤茶
    ['#7B1FA2','#6A1B9A','#8E24AA','#9C27B0','#AB47BC','#7E57C2'], // 洋風紫
    ['#2E7D32','#388E3C','#43A047','#4CAF50','#66BB6A','#1B5E20'], // 森緑
    ['#1565C0','#0D47A1','#1976D2','#1E88E5','#2196F3','#283593'], // 夜空青
    ['#BF360C','#D84315','#E64A19','#F4511E','#FF5722','#FF6E40'], // 山赤
    ['#00838F','#00ACC1','#0097A7','#00BCD4','#26C6DA','#4DD0E1'], // 海青
    ['#6A1B9A','#8E24AA','#9C27B0','#AB47BC','#CE93D8','#7B1FA2'], // 川紫
    ['#C2185B','#D81B60','#E91E63','#F06292','#F48FB1','#EC407A']  // 城ピンク
  ];

  const DRAW_NPC = {
    'tall': (c,x,y,b) => drawCuteComedyDuo(c,x,y,b,'tall'),
    'short': (c,x,y,b) => drawCuteComedyDuo(c,x,y,b,'short'),
    'cat': drawCuteCat, 'rabbit': drawCuteRabbit, 'fox': drawCuteFox,
    'owl': drawCuteOwl, 'frog': drawCuteFrog, 'panda': drawCutePanda,
    'hamster': drawCuteHamster, 'penguin': drawCutePenguin, 'tanuki': drawCuteTanuki,
    'sheep': drawCuteSheep, 'squirrel': drawCuteSquirrel, 'bear': drawCuteBear,
    'dragon': drawCuteDragon, 'mermaid': drawCuteMermaid
  };

  // Building positions (2 rows x 3 cols) — logical coords
  const BX = [0.18, 0.50, 0.82];
  const BY = [0.15, 0.38];

  // Player position (logical)
  let px = 0, py = 0, tx = null, ty = null;
  let playerInited = false;

  // Canvas tap handler — use logical coords
  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left);
    const cy = (e.clientY - rect.top);
    const w = lw, h = lh;

    // Check building taps (bigger hit area)
    const area = AREAS[G.currentArea];
    for (let i = 0; i < 6; i++) {
      const bx = w * BX[i % 3];
      const by = h * BY[Math.floor(i / 3)];
      const hitW = w * 0.12, hitH = h * 0.12;
      if (Math.abs(cx - bx) < hitW && Math.abs(cy - by) < hitH) {
        const fType = FORTUNE_TYPES[G.currentArea * 6 + i];
        const bName = area.buildings[i];
        showBuildingModal(bName, fType);
        return;
      }
    }
    // Move player
    tx = cx; ty = cy;
  });

  function showBuildingModal(name, fType) {
    const m = document.getElementById('modal');
    document.getElementById('modalTitle').textContent = name;
    document.getElementById('modalText').innerHTML =
      '<p style="margin-bottom:12px">占ってもらいますか？</p>' +
      '<button class="modal-btn fortune-btn" onclick="startFortuneReading(\'' + fType + '\')">占ってもらう</button>';
    m.classList.add('active');
    playSE('fortune');
  }

  window.startFortuneReading = function(fType) {
    hideModal();
    const fortune = generateFortune(fType);
    fortune.type = fType;
    playSE('fortune');
    setTimeout(() => showMultiStepFortune(fortune), 200);
  };

  // Helper: draw a kawaii building
  function drawBuilding(bx, by, w, h, name, areaIdx, bIdx) {
    const sc = Math.min(w, h) / 400; // scale factor
    const bW = 56 * sc, bH = 48 * sc;
    const roofH = 24 * sc;
    const theme = BLDG_THEMES[areaIdx] || BLDG_THEMES[0];
    const bColor = theme[bIdx % theme.length];

    // Glow
    const glow = ctx.createRadialGradient(bx, by, 2, bx, by, bW * 1.8);
    glow.addColorStop(0, 'rgba(255,220,100,0.35)');
    glow.addColorStop(1, 'rgba(255,220,100,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(bx, by, bW * 1.8, 0, Math.PI * 2);
    ctx.fill();

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.ellipse(bx, by + bH * 0.6, bW * 0.9, bH * 0.15, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wall
    ctx.fillStyle = bColor;
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1.5 * sc;
    const wallTop = by - bH * 0.3;
    const wallBot = by + bH * 0.5;
    roundRect(ctx, bx - bW * 0.5, wallTop, bW, wallBot - wallTop, 4 * sc);

    // Window
    ctx.fillStyle = 'rgba(255,255,200,0.7)';
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = sc;
    ctx.fillRect(bx - bW * 0.3, wallTop + bH * 0.15, bW * 0.2, bH * 0.2);
    ctx.strokeRect(bx - bW * 0.3, wallTop + bH * 0.15, bW * 0.2, bH * 0.2);
    ctx.fillRect(bx + bW * 0.1, wallTop + bH * 0.15, bW * 0.2, bH * 0.2);
    ctx.strokeRect(bx + bW * 0.1, wallTop + bH * 0.15, bW * 0.2, bH * 0.2);

    // Door
    ctx.fillStyle = '#8D6E63';
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = sc;
    roundRect(ctx, bx - bW * 0.12, wallBot - bH * 0.35, bW * 0.24, bH * 0.35, 2 * sc);

    // Doorknob
    ctx.fillStyle = '#FFD54F';
    ctx.beginPath();
    ctx.arc(bx + bW * 0.08, wallBot - bH * 0.17, 1.5 * sc, 0, Math.PI * 2);
    ctx.fill();

    // Roof
    ctx.fillStyle = lighten(bColor, 20);
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 1.5 * sc;
    ctx.beginPath();
    ctx.moveTo(bx - bW * 0.65, wallTop);
    ctx.lineTo(bx, wallTop - roofH);
    ctx.lineTo(bx + bW * 0.65, wallTop);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Roof decoration (small circle)
    ctx.fillStyle = '#FFD54F';
    ctx.beginPath();
    ctx.arc(bx, wallTop - roofH + 4 * sc, 3 * sc, 0, Math.PI * 2);
    ctx.fill();

    // Name label
    ctx.fillStyle = areaIdx === 3 ? '#FFF' : '#4a3520';
    ctx.font = `bold ${Math.max(10, 12 * sc)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(name, bx, wallBot + 4 * sc);
    ctx.textBaseline = 'alphabetic';
  }

  // Rounded rect helper
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  // Lighten color helper
  function lighten(hex, pct) {
    let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    r = Math.min(255, r + pct); g = Math.min(255, g + pct); b = Math.min(255, b + pct);
    return `rgb(${r},${g},${b})`;
  }

  // Draw area-specific decorations (clouds, trees, stars, etc.)
  function drawAreaDecor(w, h, areaIdx, frame) {
    if (areaIdx === 0) {
      // 和の占い村 — Cherry blossom petals
      for (let i = 0; i < 12; i++) {
        const px2 = ((frame * 0.4 + i * 33) % (w + 40)) - 20;
        const py2 = ((frame * 0.2 + i * 50) % (h * 0.55));
        ctx.globalAlpha = 0.4 + Math.sin(frame * 0.03 + i) * 0.2;
        ctx.fillStyle = '#FFCDD2';
        ctx.beginPath();
        ctx.ellipse(px2, py2, 3, 5, frame * 0.02 + i, 0, Math.PI * 2);
        ctx.fill();
      }
      // Torii gate hint
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#D32F2F';
      ctx.fillRect(w * 0.08, h * 0.52, w * 0.04, h * 0.1);
      ctx.fillRect(w * 0.15, h * 0.52, w * 0.04, h * 0.1);
      ctx.fillRect(w * 0.06, h * 0.51, w * 0.15, h * 0.02);
      ctx.globalAlpha = 1;
    } else if (areaIdx === 3) {
      // 星空の丘 — Stars + shooting stars
      for (let i = 0; i < 30; i++) {
        const sx = (i * 37 + frame * 0.05) % w;
        const sy = (i * 23) % (h * 0.5);
        ctx.globalAlpha = 0.3 + Math.sin(frame * 0.05 + i * 2) * 0.3;
        ctx.fillStyle = '#FFF';
        ctx.beginPath();
        ctx.arc(sx, sy, 1 + Math.sin(frame * 0.08 + i) * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
      // Moon
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = '#FDD835';
      ctx.beginPath();
      ctx.arc(w * 0.85, h * 0.08, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (areaIdx === 5) {
      // 海 — Waves
      ctx.globalAlpha = 0.15;
      ctx.strokeStyle = '#4FC3F7';
      ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        for (let x = 0; x < w; x += 10) {
          const y = h * 0.56 + i * 8 + Math.sin(x * 0.02 + frame * 0.04 + i) * 4;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    } else {
      // Default: soft floating particles
      for (let i = 0; i < 8; i++) {
        const px2 = ((frame * 0.3 + i * 47) % w);
        const py2 = ((Math.sin(frame * 0.02 + i) * h * 0.15) + h * 0.25);
        ctx.globalAlpha = 0.25 + Math.sin(frame * 0.05 + i) * 0.15;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(px2, py2, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }

  // Draw soft clouds
  function drawClouds(w, h, frame) {
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 3; i++) {
      const cx = ((frame * 0.15 + i * w * 0.4) % (w + 100)) - 50;
      const cy = h * 0.06 + i * h * 0.06;
      ctx.beginPath();
      ctx.arc(cx, cy, 18, 0, Math.PI * 2);
      ctx.arc(cx + 15, cy - 5, 14, 0, Math.PI * 2);
      ctx.arc(cx + 30, cy, 16, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawGame() {
    const w = lw;
    const h = lh;
    if (w === 0 || h === 0) { requestAnimationFrame(drawGame); return; }
    const areaIdx = G.currentArea;
    const area = AREAS[areaIdx];
    const colors = AREA_COLORS[areaIdx];
    document.getElementById('areaName').textContent = area.name;

    // Clear
    ctx.clearRect(0, 0, w, h);

    // === SKY ===
    const skyGrad = ctx.createLinearGradient(0, 0, 0, h * 0.6);
    skyGrad.addColorStop(0, colors.sky[0]);
    skyGrad.addColorStop(0.5, colors.sky[1]);
    skyGrad.addColorStop(1, colors.sky[2]);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, w, h * 0.62);

    // === GROUND ===
    const gndGrad = ctx.createLinearGradient(0, h * 0.58, 0, h);
    gndGrad.addColorStop(0, colors.ground);
    gndGrad.addColorStop(1, colors.groundEnd);
    ctx.fillStyle = gndGrad;
    ctx.fillRect(0, h * 0.58, w, h * 0.42);

    // Soft horizon line
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(0, h * 0.57, w, h * 0.03);

    // Clouds (skip for starry sky)
    if (areaIdx !== 3) drawClouds(w, h, animationFrame);

    // Path/road
    ctx.fillStyle = 'rgba(210,190,160,0.35)';
    const roadY = h * 0.66;
    ctx.beginPath();
    ctx.moveTo(0, roadY);
    ctx.bezierCurveTo(w * 0.25, roadY - 5, w * 0.75, roadY + 5, w, roadY);
    ctx.lineTo(w, roadY + h * 0.06);
    ctx.bezierCurveTo(w * 0.75, roadY + h * 0.06 + 5, w * 0.25, roadY + h * 0.06 - 5, 0, roadY + h * 0.06);
    ctx.closePath();
    ctx.fill();

    // Area-specific decorations
    drawAreaDecor(w, h, areaIdx, animationFrame);

    // === BUILDINGS ===
    for (let i = 0; i < 6; i++) {
      const bx = w * BX[i % 3];
      const by = h * BY[Math.floor(i / 3)];
      drawBuilding(bx, by, w, h, area.buildings[i], areaIdx, i);
    }

    // === Player init ===
    if (!playerInited) { px = w * 0.5; py = h * 0.72; playerInited = true; }

    // Move player toward tap target
    if (tx !== null && ty !== null) {
      const dx = tx - px, dy = ty - py;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 3) {
        const speed = Math.min(3.5, dist * 0.06);
        px += (dx / dist) * speed;
        py += (dy / dist) * speed;
      } else { tx = null; ty = null; }
    }

    // === NPCs ===
    const sc = Math.min(w, h) / 400;
    const npcList = NPC_DATA.filter(n => n.area === areaIdx);
    npcList.forEach((npc, i) => {
      const xPos = w * (0.15 + i * 0.22);
      const yPos = h * 0.72;
      const bounce = Math.sin(animationFrame * 0.04 + i) * 2;
      ctx.save();
      ctx.translate(xPos, yPos);
      const npcSc = sc * 1.1;
      ctx.scale(npcSc, npcSc);
      const drawFn = DRAW_NPC[npc.type];
      if (drawFn) drawFn(ctx, 0, 0, bounce);
      ctx.restore();
      // NPC name
      ctx.fillStyle = areaIdx === 3 ? '#FFF' : '#5a4030';
      ctx.font = `bold ${Math.max(9, 10 * sc)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(npc.name, xPos, yPos + 28 * sc);
    });

    // === PLAYER ===
    ctx.save();
    ctx.translate(px, py);
    const plSc = sc * 1.3;
    ctx.scale(plSc, plSc);
    drawPlayerShiba(ctx, 0, 0, animationFrame);
    ctx.restore();
    // Player name
    ctx.fillStyle = '#E65100';
    ctx.font = `bold ${Math.max(10, 11 * sc)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(G.playerName, px, py + 32 * sc);

    // === Nav arrow hints ===
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = `bold ${Math.max(18, 22 * sc)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('◀', 22, h * 0.5);
    ctx.fillText('▶', w - 22, h * 0.5);

    animationFrame++;
    requestAnimationFrame(drawGame);
  }

  drawGame();
}

function createStars() {
  const container = document.getElementById('starsContainer');
  for (let i = 0; i < 50; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    container.appendChild(star);
  }
}

function initBGM() {
  if (!G.audioContext) {
    G.audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playBGM() {
  if (!G.audioContext || G.bgmPlaying) return;
  G.bgmPlaying = true;
  const ac = G.audioContext;
  if (ac.state === 'suspended') ac.resume();
  const master = ac.createGain();
  master.gain.value = 0.1;
  master.connect(ac.destination);

  function playPad() {
    if (!G.bgmPlaying) return;
    const notes = [220, 277.18, 329.63, 440];
    const n = notes[Math.floor(Math.random() * notes.length)];
    const o = ac.createOscillator(), g = ac.createGain(), f = ac.createBiquadFilter();
    o.type = 'sine'; o.frequency.value = n;
    f.type = 'lowpass'; f.frequency.value = 600;
    o.connect(f); f.connect(g); g.connect(master);
    const t = ac.currentTime;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.05, t + 2);
    g.gain.linearRampToValueAtTime(0, t + 7);
    o.start(t); o.stop(t + 7);
  }
  function playChime() {
    if (!G.bgmPlaying) return;
    const notes = [880, 1108, 1318, 1567];
    const n = notes[Math.floor(Math.random() * notes.length)];
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine'; o.frequency.value = n;
    o.connect(g); g.connect(master);
    const t = ac.currentTime;
    g.gain.setValueAtTime(0.03, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
    o.start(t); o.stop(t + 2.5);
  }
  function playMelody() {
    if (!G.bgmPlaying) return;
    const notes = [440, 523, 587, 659, 784, 880];
    const n = notes[Math.floor(Math.random() * notes.length)];
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine'; o.frequency.value = n;
    o.connect(g); g.connect(master);
    const t = ac.currentTime;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.02, t + 0.3);
    g.gain.exponentialRampToValueAtTime(0.001, t + 3);
    o.start(t); o.stop(t + 3);
  }
  playPad();
  G.bgmTimers = [];
  G.bgmTimers.push(setInterval(playPad, 5000 + Math.random() * 3000));
  G.bgmTimers.push(setInterval(playChime, 3000 + Math.random() * 4000));
  G.bgmTimers.push(setInterval(playMelody, 4000 + Math.random() * 3000));
  setTimeout(playChime, 1500);
  setTimeout(playMelody, 2500);
}

function playSE(type) {
  if (!G.audioContext) return;
  const ctx = G.audioContext;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  
  if (type === 'step') {
    osc.frequency.value = 300;
    gain.gain.setValueAtTime(0.05, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
    osc.start();
    osc.stop(ctx.currentTime + 0.1);
  } else if (type === 'fortune') {
    osc.frequency.value = 800;
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start();
    osc.stop(ctx.currentTime + 0.5);
  }
}

document.getElementById('startBtn').addEventListener('click', () => {
  switchScreen('profileScreen');
});

document.getElementById('playBtn').addEventListener('click', () => {
  if (document.getElementById('playerName').value.trim()) {
    initGame();
    startCanvas();
  } else {
    showModal('ちょっと待て', 'なまえを いれてください');
  }
});

document.getElementById('backBtn').addEventListener('click', () => {
  switchScreen('titleScreen');
});

document.getElementById('prevBtn').addEventListener('click', () => {
  G.currentArea = (G.currentArea - 1 + AREAS.length) % AREAS.length;
  playSE('step');
});

document.getElementById('nextBtn').addEventListener('click', () => {
  G.currentArea = (G.currentArea + 1) % AREAS.length;
  playSE('step');
});

document.getElementById('menuBtn').addEventListener('click', () => {
  const fortuneType = FORTUNE_TYPES[Math.floor(Math.random() * FORTUNE_TYPES.length)];
  const fortune = generateFortune(fortuneType);
  fortune.type = fortuneType;
  playSE('fortune');
  setTimeout(() => showMultiStepFortune(fortune), 200);
});

document.getElementById('modalOkBtn').addEventListener('click', hideModal);

document.getElementById('prevPageBtn').addEventListener('click', fortunePrevPage);
document.getElementById('nextPageBtn').addEventListener('click', fortuneNextPage);
document.getElementById('closeFortuneBtn').addEventListener('click', closeFortunOverlay);

const pageDots = document.getElementById('pageDots');
document.getElementById('fortuneOverlay').addEventListener('transitionend', () => {
  const numPages = G.fortunePages.length;
  pageDots.innerHTML = '';
  for (let i = 0; i < numPages; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => {
      G.currentPage = i;
      renderFortunePage();
    });
    pageDots.appendChild(dot);
  }
});

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) hideModal();
});

document.getElementById('fortuneOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('fortuneOverlay')) closeFortunOverlay();
});

createStars();
initBGM();
</script>
