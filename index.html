<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>柴犬うらないハウス</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #fffef0; font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif; touch-action: none; }
        
        #app { width: 100%; height: 100%; position: relative; overflow: hidden; }
        
        /* Screen System */
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; opacity: 0; transition: opacity 0.35s ease-in-out; }
        .screen.active { display: flex; opacity: 1; pointer-events: auto; }
        .screen.fade-out { opacity: 0; }
        
        /* Title Screen */
        #title-screen {
            background: linear-gradient(180deg, #1a1230 0%, #2d2255 35%, #3d2a6a 65%, #1a1230 100%);
            justify-content: center;
            align-items: center;
            gap: 32px;
            overflow: hidden;
        }
        
        .title-stars { position: absolute; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle 2s infinite alternate; }
        @keyframes twinkle { from { opacity: 0.2; transform: scale(1); } to { opacity: 1; transform: scale(1.3); } }
        
        .title-logo { text-align: center; z-index: 1; }
        .title-dog-emoji { font-size: 90px; display: block; animation: bounce 1.5s ease-in-out infinite; filter: drop-shadow(0 0 24px rgba(255,183,77,.6)); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
        .title-text { color: #FFB74D; font-size: 28px; font-weight: bold; margin-top: 10px; text-shadow: 0 0 20px rgba(255,183,77,.5); letter-spacing: 3px; }
        .title-sub { color: #FFCC80; font-size: 14px; margin-top: 6px; }
        
        .title-desc {
            background: rgba(0,0,0,.45);
            border: 1px solid rgba(255,183,77,.3);
            border-radius: 14px;
            padding: 14px 20px;
            max-width: 320px;
            text-align: center;
            z-index: 1;
        }
        .title-desc p { color: #fff; font-size: 13px; line-height: 1.7; }
        
        .btn-p {
            background: linear-gradient(135deg, #FFB74D, #FF8F00);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 16px 52px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1;
            box-shadow: 0 4px 24px rgba(255,143,0,.5);
            transition: transform .1s;
            font-family: inherit;
        }
        .btn-p:active { transform: scale(.95); }
        
        /* Profile Screen */
        #profile-screen {
            background: linear-gradient(180deg, #FEFBF3 0%, #FFF8E8 40%, #F5EFE0 100%);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .profile-card {
            background: #fff;
            border-radius: 24px;
            padding: 28px 22px;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,.1);
        }
        
        .profile-card h2 {
            color: #d4791f;
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .input-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .input-group label {
            color: #333;
            font-size: 13px;
            font-weight: bold;
        }
        
        .input-group input {
            padding: 12px;
            border: 2px solid #FFB74D;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .btn-wide {
            background: #FFB74D;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            margin-top: 10px;
        }
        .btn-wide:active { transform: scale(.98); }
        
        /* Game Screen */
        #game-screen {
            background: #111;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        
        #gcanvas {
            display: block;
            width: 100%;
            flex: 1;
            touch-action: none;
            cursor: pointer;
        }
        
        #bottom-ui {
            background: linear-gradient(180deg, rgba(26,26,48,.95), rgba(18,18,42,.98));
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 7px;
            border-top: 1px solid rgba(255,183,77,.2);
            flex-shrink: 0;
            backdrop-filter: blur(12px);
        }
        
        .area-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .area-nm {
            color: #FFB74D;
            font-size: 12px;
            font-weight: bold;
        }
        
        .area-nav {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }
        
        .nav-btn {
            background: rgba(255,255,255,.1);
            color: #FFB74D;
            border: none;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        .nav-btn:active { background: rgba(255,183,77,.3); }
        
        #ctrl {
            display: flex;
            gap: 6px;
            padding: 4px 0 2px;
        }
        
        .cb {
            flex: 1;
            background: rgba(255,255,255,.1);
            color: #e0e0e0;
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 12px;
            padding: 10px 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            text-align: center;
            transition: all .15s ease;
            backdrop-filter: blur(4px);
        }
        .cb:active { background: rgba(255,183,77,.3); transform: scale(.96); }
        
        /* Modal */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,.85);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        
        #modal.show { display: flex; }
        
        #mbox {
            background: #fff;
            border-radius: 24px;
            padding: 28px 22px;
            max-width: 340px;
            width: 92%;
            text-align: center;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            animation: modalPop .3s ease-out;
        }
        
        @keyframes modalPop { 0% { transform: scale(.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        #mbox .me { font-size: 50px; margin-bottom: 8px; }
        #mbox h3 { font-size: 18px; color: #333; margin-bottom: 6px; }
        #mbox p { font-size: 12px; color: #666; line-height: 1.6; margin-bottom: 14px; }
        
        .mbtn {
            background: #FFB74D;
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            margin: 4px;
        }
        
        .mbtn.gr { background: #4CAF50; }
        .mbtn.bl { background: #2196F3; }
        .mbtn.rd { background: #e53935; }
        
        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #FFF8E1;
            border: 2px solid #FFB74D;
            border-radius: 8px;
            color: #d4791f;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        .option-btn:active { transform: scale(.98); }
        
        #fortune-result {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,.85);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        #fortune-result.show { display: flex; }
        .fortune-result-content {
            background: #fff;
            border-radius: 24px;
            padding: 28px 22px;
            max-width: 340px;
            width: 92%;
            text-align: center;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            animation: modalPop .3s ease-out;
        }
        .fortune-result-content h2 { color: #d4791f; font-size: 22px; margin-bottom: 12px; }
        .fortune-level { font-size: 48px; font-weight: bold; color: #FF6D00; margin: 12px 0; }
        .fortune-message { font-size: 14px; color: #333; line-height: 1.8; margin: 12px 0; }
        .fortune-advice { font-size: 12px; color: #888; line-height: 1.6; margin: 12px 0; padding: 10px; background: #FFF8E1; border-radius: 8px; }
        .lucky-items, .ratings { background: #FFF8E1; border-radius: 12px; padding: 14px; margin: 12px 0; text-align: left; }
        .lucky-items h4, .ratings h4 { color: #d4791f; font-size: 14px; margin-bottom: 8px; }
        .lucky-items p, .ratings p { font-size: 13px; color: #555; line-height: 1.7; }
        .result-buttons { margin-top: 16px; }

        .fortune-result-inline {
            background: #FFF8E1;
            border: 2px solid #FFB74D;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            text-align: left;
            color: #333;
            line-height: 1.7;
            font-size: 13px;
        }

        .fortune-result-inline strong {
            color: #d4791f;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div id="app">

<!-- Title Screen -->
<div id="title-screen" class="screen active">
    <div class="title-stars" id="stars-ct"></div>
    <div class="title-logo">
        <span class="title-dog-emoji">🐕</span>
        <div class="title-text">柴犬うらないハウス</div>
        <div class="title-sub">占いの不思議な世界へ</div>
    </div>
    <button class="btn-p" onclick="goScreen('profile')">ゲーム開始</button>
    <div class="title-desc">
        <p>占い館を訪ねて、<br>12の動物たちに占ってもらおう！<br>4つのエリアを探索し、<br>運命の出会いを待っている...</p>
    </div>
</div>

<!-- Profile Setup Screen -->
<div id="profile-screen" class="screen">
    <div class="profile-card">
        <h2>🌟 プロフィール設定</h2>
        <form id="profile-form">
        <div class="input-group">
            <label>あなたのお名前</label>
            <input type="text" id="playerNameInput" placeholder="例：太郎" maxlength="10">
        </div>
        <div class="input-group">
            <label>生年月日（より正確な占いに）</label>
            <input type="date" id="playerBirthdayInput" style="padding: 12px; border: 2px solid #FFB74D; border-radius: 8px; font-family: inherit; font-size: 14px;">
        </div>
        <div class="input-group">
            <label>血液型</label>
            <select id="playerBloodTypeInput" style="padding: 12px; border: 2px solid #FFB74D; border-radius: 8px; font-family: inherit; font-size: 14px;">
                <option value="">選択しない</option>
                <option value="A">A型</option>
                <option value="B">B型</option>
                <option value="O">O型</option>
                <option value="AB">AB型</option>
            </select>
        </div>
        <div class="input-group">
            <label>星座</label>
            <select id="playerZodiacInput" style="padding: 12px; border: 2px solid #FFB74D; border-radius: 8px; font-family: inherit; font-size: 14px;">
                <option value="">選択しない</option>
                <option value="牡羊座">牡羊座</option><option value="牡牛座">牡牛座</option>
                <option value="双子座">双子座</option><option value="蟹座">蟹座</option>
                <option value="獅子座">獅子座</option><option value="乙女座">乙女座</option>
                <option value="天秤座">天秤座</option><option value="蠍座">蠍座</option>
                <option value="射手座">射手座</option><option value="山羊座">山羊座</option>
                <option value="水瓶座">水瓶座</option><option value="魚座">魚座</option>
            </select>
        </div>
        <button type="submit" class="btn-wide">占いの世界へ出発！</button>
        <button type="button" class="btn-wide" style="background: #999; margin-top: 6px;" onclick="goScreen('title')">戻る</button>
        </form>
    </div>
</div>

<!-- Game Screen -->
<div id="game-screen" class="screen">
    <canvas id="gcanvas"></canvas>
    <div id="bottom-ui">
        <div class="area-row">
            <div class="area-nm" id="area-name">エリア 1: 和の占い通り</div>
            <div class="area-nav">
                <button class="nav-btn" onclick="changeArea(-1)">◀</button>
                <button class="nav-btn" onclick="changeArea(1)">▶</button>
            </div>
        </div>
        <div id="ctrl">
            <button class="cb" onclick="showHistory()">履歴</button>
            <button class="cb" onclick="showAlbum()">図鑑</button>
            <button class="cb" onclick="goScreen('title')">終了</button>
        </div>
    </div>
</div>

</div>

<!-- Modal -->
<div id="modal">
    <div id="mbox"></div>
</div>

<!-- Fortune Result Modal -->
<div id="fortune-result"></div>

<script>
// ============================================================
// PART 3: Canvas2D Drawing Functions
// ============================================================

function drawShiba(ctx, x, y, oY, color) {
  const BG = color || '#D4905A';
  const WH = '#FFF8E1';
  const OL = '#222';
  const LW = 3;
  
  ctx.fillStyle = 'rgba(0,0,0,.08)';
  ctx.beginPath();
  ctx.ellipse(x, y + 16, 14, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = BG;
  ctx.strokeStyle = OL;
  ctx.lineWidth = LW;
  ctx.beginPath();
  ctx.ellipse(x - 12, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 12, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x, y + 2 + oY, 16, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, y + 4 + oY, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = BG;
  ctx.beginPath();
  ctx.ellipse(x - 9, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 9, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(x + 16, y - 2 + oY, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(x, y - 10 + oY, 11, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x - 8, y - 18 + oY, 4, 6, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 8, y - 18 + oY, 4, 6, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, y - 8 + oY, 7, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(x - 4, y - 12 + oY, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 4, y - 12 + oY, 1.5, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.beginPath();
  ctx.arc(x, y - 7 + oY, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawCat(ctx, x, y, oY, color) {
  const BG = color || '#F4A460';
  const WH = '#FFE4C4';
  const OL = '#222';
  const LW = 3;
  
  ctx.fillStyle = 'rgba(0,0,0,.08)';
  ctx.beginPath();
  ctx.ellipse(x, y + 16, 13, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = BG;
  ctx.strokeStyle = OL;
  ctx.lineWidth = LW;
  ctx.beginPath();
  ctx.ellipse(x - 11, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 11, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x, y + 2 + oY, 15, 11, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, y + 4 + oY, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = BG;
  ctx.beginPath();
  ctx.ellipse(x - 8, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 8, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.strokeStyle = OL;
  ctx.lineWidth = LW;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.quadraticCurveTo(x + 18, y + oY, x + 20, y - 8 + oY);
  ctx.stroke();
  
  ctx.fillStyle = BG;
  ctx.beginPath();
  ctx.arc(x, y - 10 + oY, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(x - 7, y - 18 + oY);
  ctx.lineTo(x - 9, y - 24 + oY);
  ctx.lineTo(x - 4, y - 16 + oY);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 7, y - 18 + oY);
  ctx.lineTo(x + 9, y - 24 + oY);
  ctx.lineTo(x + 4, y - 16 + oY);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath();
  ctx.moveTo(x - 6.5, y - 19 + oY);
  ctx.lineTo(x - 8, y - 23 + oY);
  ctx.lineTo(x - 5, y - 17 + oY);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 6.5, y - 19 + oY);
  ctx.lineTo(x + 8, y - 23 + oY);
  ctx.lineTo(x + 5, y - 17 + oY);
  ctx.closePath();
  ctx.fill();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, y - 8 + oY, 6, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(x - 4, y - 11 + oY, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 4, y - 11 + oY, 1.2, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.strokeStyle = OL;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - 6, y - 7 + oY);
  ctx.lineTo(x - 12, y - 8 + oY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 6, y - 7 + oY);
  ctx.lineTo(x + 12, y - 8 + oY);
  ctx.stroke();
  
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath();
  ctx.arc(x, y - 6 + oY, 1.2, 0, Math.PI * 2);
  ctx.fill();
}

function drawRabbit(ctx, x, y, oY, color) {
  const BG = color || '#C5A572';
  const WH = '#FFF';
  const OL = '#222';
  const LW = 3;
  
  ctx.fillStyle = 'rgba(0,0,0,.08)';
  ctx.beginPath();
  ctx.ellipse(x, y + 16, 12, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = BG;
  ctx.strokeStyle = OL;
  ctx.lineWidth = LW;
  ctx.beginPath();
  ctx.ellipse(x - 10, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 10, y + 14 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x, y + 2 + oY, 14, 11, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = WH;
  ctx.beginPath();
  ctx.ellipse(x, y + 4 + oY, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = BG;
  ctx.beginPath();
  ctx.ellipse(x - 7, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 7, y + 12 + oY, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(x + 14, y + 2 + oY, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(x, y - 10 + oY, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x - 5, y - 22 + oY, 3, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 5, y - 22 + oY, 3, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath();
  ctx.ellipse(x - 5, y - 20 + oY, 1.5, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();

function drawPlayerShiba(ctx, x, y, frame) {

  ctx.stroke();

  ctx.ellipse(x, oY + 4, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(x - 9, oY + 12 - legSwing * 0.3, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 9, oY + 12 + legSwing * 0.3, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(x + 16 + tailWag, oY - 2, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(x, oY - 10, 11, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  
  ctx.beginPath();
  ctx.ellipse(x - 8, oY - 18 + earBounce, 4, 6, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + 8, oY - 18 + earBounce, 4, 6, 0.3, 0, Math.PI * 2);

function drawBuilding(ctx, x, y, type, areaId) {
  const OL = '#1a1a2e';
  const LW = 2;
  const GOLD = '#C8A960';
  const DGOLD = '#FFD700';
  const DARK = '#1a1a2e';
  const BODY = '#2d1b4e';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,.25)';
  ctx.beginPath();
  ctx.ellipse(x, y + 30, 24, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mystical glow halo behind building
  const glowColor = areaId===1?'rgba(255,183,77,.12)':areaId===2?'rgba(147,100,255,.15)':areaId===3?'rgba(0,255,180,.1)':'rgba(100,150,255,.12)';
  ctx.fillStyle = glowColor;
  ctx.beginPath(); ctx.arc(x, y, 38, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = glowColor;
  ctx.beginPath(); ctx.arc(x, y, 28, 0, Math.PI*2); ctx.fill();

  ctx.strokeStyle = OL;
  ctx.lineWidth = LW;

  switch(type) {
    // ===== Area 1: Japanese =====
    case 'omikuji': // Red torii gate shrine with paper fortune strips
      ctx.fillStyle = '#DC143C';
      ctx.fillRect(x - 18, y - 2, 36, 6);
      ctx.strokeRect(x - 18, y - 2, 36, 6);
      ctx.fillRect(x - 15, y + 4, 8, 20);
      ctx.strokeRect(x - 15, y + 4, 8, 20);
      ctx.fillRect(x + 7, y + 4, 8, 20);
      ctx.strokeRect(x + 7, y + 4, 8, 20);
      ctx.fillStyle = '#FFF8DC';
      for (let i = 0; i < 3; i++) {
        ctx.fillRect(x - 8 + i * 8, y + 10, 5, 8);
        ctx.strokeRect(x - 8 + i * 8, y + 10, 5, 8);
      }
      break;

    case 'shichusuimei': // Traditional Chinese-style pagoda
      ctx.fillStyle = '#D4705D';
      ctx.fillRect(x - 12, y + 2, 24, 20);
      ctx.strokeRect(x - 12, y + 2, 24, 20);
      ctx.fillStyle = '#8B4513';
      for (let tier = 0; tier < 3; tier++) {
        ctx.fillRect(x - 14, y + 2 + tier * 7, 28, 2);
        ctx.strokeRect(x - 14, y + 2 + tier * 7, 28, 2);
      }
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.moveTo(x - 14, y - 2);
      ctx.lineTo(x, y - 12);
      ctx.lineTo(x + 14, y - 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      break;

    case 'kyusei': // Octagonal compass building
      ctx.fillStyle = '#CD853F';
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const px = x + Math.cos(angle) * 14;
        const py = y + Math.sin(angle) * 14;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'hanauranai': // Flower shop with blooming flowers
      ctx.fillStyle = '#8B7355';
      ctx.fillRect(x - 12, y + 2, 24, 16);
      ctx.strokeRect(x - 12, y + 2, 24, 16);
      ctx.fillStyle = '#E91E63';
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(x - 8 + i * 6, y - 3, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#FFD700';
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(x - 8 + i * 6, y - 3, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      break;

    case 'yumeuranai': // Dreamy cloud-shaped cottage with crescent moon
      ctx.fillStyle = '#B0C4DE';
      ctx.beginPath();
      ctx.ellipse(x, y + 6, 16, 12, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(x + 12, y - 8, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#87CEEB';
      ctx.beginPath();
      ctx.arc(x + 12, y - 8, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      break;

    case 'rokusei': // 六星占術の殿堂 - 6 stars around dark pagoda
      ctx.fillStyle = BODY;
      ctx.fillRect(x - 14, y + 2, 28, 20);
      ctx.strokeRect(x - 14, y + 2, 28, 20);
      ctx.fillStyle = GOLD;
      ctx.beginPath();
      ctx.moveTo(x - 16, y + 2);ctx.lineTo(x, y - 10);ctx.lineTo(x + 16, y + 2);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // 6 stars around
      for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2 - Math.PI/2;
        ctx.fillStyle = ['#FFD700','#C0C0C0','#FF6347','#00BFFF','#32CD32','#9370DB'][i];
        ctx.beginPath();
        ctx.arc(x + Math.cos(a)*16, y + 4 + Math.sin(a)*12, 2.5, 0, Math.PI*2);
        ctx.fill();
      }
      // Glowing windows
      ctx.fillStyle = 'rgba(255,180,0,.5)';
      ctx.fillRect(x - 4, y + 8, 8, 8);
      break;

    // ===== Area 2: Western =====
    case 'tarot': // Gothic card-shaped building with eye
      ctx.fillStyle = '#5C3D3D';
      ctx.fillRect(x - 10, y - 6, 20, 28);
      ctx.strokeRect(x - 10, y - 6, 20, 28);
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(x, y + 5, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(x, y + 5, 2, 0, Math.PI * 2);
      ctx.fill();

    case 'numerology': // Tower with numbers
      ctx.fillStyle = '#A9A9A9';
      ctx.fillRect(x - 10, y, 20, 22);
      ctx.strokeRect(x - 10, y, 20, 22);

      ctx.font = 'bold 10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('1', x - 6, y + 7);

      ctx.fillText('2', x - 6, y + 16);

      ctx.fillText('4', x + 6, y + 16);

    case 'rune': // Viking-style stone hut with rune symbol
      ctx.fillStyle = '#696969';

    case 'oracle': // Chapel with angel wing decorations
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x - 10, y + 2, 20, 18);
      ctx.strokeRect(x - 10, y + 2, 20, 18);

      ctx.beginPath();

      ctx.fill();

      ctx.arc(x + 12, y, 4, 0, Math.PI * 2);

    case 'pendulum': // Clock tower with pendulum
      ctx.fillStyle = '#8B7355';
      ctx.fillRect(x - 8, y + 2, 16, 18);
      ctx.strokeRect(x - 8, y + 2, 16, 18);
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(x, y - 4, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

    // ===== Area 3: Mysterious =====

      ctx.fillStyle = '#FF0000';
      ctx.beginPath();
      ctx.arc(x, y - 10, 2, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'dayofweek': // Clock tower with 7 marks
      ctx.fillStyle = '#8B7355';
      ctx.fillRect(x - 8, y + 2, 16, 18);
      ctx.strokeRect(x - 8, y + 2, 16, 18);
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(x, y - 4, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = OL;
      ctx.lineWidth = 1;
      ctx.stroke();
      for (let i = 0; i < 7; i++) {
        const angle = (i / 7) * Math.PI * 2 - Math.PI / 2;
        const bx = x + Math.cos(angle) * 5;
        const by = y - 4 + Math.sin(angle) * 5;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(bx, by, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.lineWidth = LW;
      break;

    case 'guardian': // Angel wing cathedral
      ctx.fillStyle = '#FFF';
      ctx.fillRect(x - 10, y + 2, 20, 18);
      ctx.strokeRect(x - 10, y + 2, 20, 18);
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.moveTo(x - 10, y - 2);
      ctx.lineTo(x, y - 12);
      ctx.lineTo(x + 10, y - 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#DDA0DD';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(x - 12, y + 4 + i * 6, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 12, y + 4 + i * 6, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
      break;

    default:
      ctx.fillStyle = BODY;
      ctx.fillRect(x - 10, y, 20, 20);
      ctx.strokeRect(x - 10, y, 20, 20);
      ctx.fillStyle = 'rgba(255,180,0,.4)';
      ctx.fillRect(x - 4, y + 4, 8, 6);
  }
}

function drawBackground(ctx, w, h, areaId, frame) {
  
  // === AREA 1: 和の占い通り (Japanese Fortune Street) ===
  if (areaId === 1) {
    // Deep indigo-to-purple gradient sky
    const skyGradient = ctx.createLinearGradient(0, 0, 0, h);
    skyGradient.addColorStop(0, '#0a0e27');
    skyGradient.addColorStop(0.4, '#1a1a4e');
    skyGradient.addColorStop(1, '#2d1b69');
    ctx.fillStyle = skyGradient;
    ctx.fillRect(0, 0, w, h);
    
    // Scattered golden stars
    ctx.fillStyle = '#FFD700';
    for (let i = 0; i < 20; i++) {
      const sx = (i * 73) % w;
      const sy = (i * 61) % (h * 0.7);
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.05 + i) * 0.5;
      ctx.beginPath();
      ctx.arc(sx, sy, 1 + (i % 2) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    // Floating golden torii gate silhouettes
    for (let i = 0; i < 3; i++) {
      const tx = (frame * 0.2 + i * w / 3) % (w + 40) - 20;
      const ty = 80 + i * 60 + Math.sin(frame * 0.04 + i) * 20;
      ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(tx - 15, ty);
      ctx.lineTo(tx + 15, ty);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(tx - 12, ty);
      ctx.lineTo(tx - 12, ty + 20);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(tx + 12, ty);
      ctx.lineTo(tx + 12, ty + 20);
      ctx.stroke();
    }
    
    // Cherry blossom petals with golden glow
    ctx.fillStyle = 'rgba(255, 192, 203, 0.4)';
    for (let i = 0; i < 12; i++) {
      const px = (frame * 0.5 + i * 60) % w;
      const py = (frame * 0.3 + i * 30 + Math.sin(frame * 0.06 + i) * 25) % h;
      ctx.beginPath();
      ctx.ellipse(px, py, 4, 6, Math.sin(frame * 0.03 + i), 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
      ctx.beginPath();
      ctx.arc(px, py, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255, 192, 203, 0.4)';
    }
    ctx.globalAlpha = 1;
    
    // Paper lanterns with warm amber light
    for (let i = 0; i < 4; i++) {
      const lx = 50 + i * (w - 100) / 3;
      const ly = h - 120 + Math.sin(frame * 0.05 + i) * 8;
      ctx.fillStyle = 'rgba(255, 215, 0, 0.2)';
      ctx.beginPath();
      ctx.arc(lx, ly, 25, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FF8C00';
      ctx.beginPath();
      ctx.arc(lx, ly, 12, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Mystical ground fog
    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.ellipse(w * (0.1 + i * 0.2), h - 40 + Math.sin(frame * 0.03 + i) * 10, 70, 25, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Dark purple-brown earth ground
    ctx.fillStyle = '#2d1b1a';
    ctx.fillRect(0, h - 60, w, 60);
    
    // Golden pathway
    ctx.strokeStyle = 'rgba(255, 215, 0, 0.25)';
    ctx.lineWidth = 3;
    ctx.setLineDash([10, 10]);
    ctx.beginPath();
    ctx.moveTo(0, h - 40);
    ctx.lineTo(w, h - 40);
    ctx.stroke();
    ctx.setLineDash([]);
    
  // === AREA 2: 西洋占い広場 (Western Fortune Square) ===
  } else if (areaId === 2) {
    // Deep purple-to-magenta gradient
    const skyGradient = ctx.createLinearGradient(0, 0, 0, h);
    skyGradient.addColorStop(0, '#1a0a2e');
    skyGradient.addColorStop(0.4, '#3d1b69');
    skyGradient.addColorStop(1, '#4a1a8a');
    ctx.fillStyle = skyGradient;
    ctx.fillRect(0, 0, w, h);
    
    // Floating tarot card silhouettes with golden borders
    for (let i = 0; i < 5; i++) {
      const tx = (frame * 0.25 + i * 100) % (w + 60) - 30;
      const ty = 60 + i * 40 + Math.sin(frame * 0.05 + i) * 15;
      const rotation = Math.sin(frame * 0.02 + i) * 0.15;
      ctx.save();
      ctx.translate(tx, ty);
      ctx.rotate(rotation);
      ctx.fillStyle = 'rgba(30, 20, 50, 0.6)';
      ctx.fillRect(-8, 0, 16, 28);
      ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(-8, 0, 16, 28);
      ctx.restore();
    }
    
    // Crystal ball glow effect
    ctx.fillStyle = 'rgba(255, 215, 0, 0.08)';
    for (let r = 70; r > 5; r -= 12) {
      ctx.beginPath();
      ctx.arc(w - 90, h - 110, r, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Large glowing crystal ball center
    ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
    ctx.beginPath();
    ctx.arc(w - 90, h - 110, 35, 0, Math.PI * 2);
    ctx.fill();
    
    // Candle flame particles (orange-gold floating upward)
    for (let i = 0; i < 8; i++) {
      const cx = 60 + i * 60;
      const cy = h - 80 - (frame * 0.8 + i * 10) % (h * 0.5);
      ctx.fillStyle = 'rgba(255, 140, 0, 0.3 - (i * 0.03))';
      ctx.beginPath();
      ctx.arc(cx + Math.sin(frame * 0.05 + i) * 5, cy, 4 - i * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Constellation dot patterns with golden lines
    ctx.strokeStyle = 'rgba(255, 215, 0, 0.25)';
    ctx.lineWidth = 1;
    const constellations = [
      [[150, 150], [220, 180], [180, 240]],
      [[w - 180, 160], [w - 120, 140], [w - 150, 220]]
    ];
    for (let c of constellations) {
      for (let j = 0; j < c.length; j++) {
        ctx.beginPath();
        ctx.moveTo(c[j][0], c[j][1]);
        ctx.lineTo(c[(j + 1) % c.length][0], c[(j + 1) % c.length][1]);
        ctx.stroke();
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(c[j][0], c[j][1], 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    // Dark stone texture ground
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, h - 60, w, 60);
    
    // Stone texture pattern
    ctx.strokeStyle = 'rgba(100, 0, 100, 0.15)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < w; i += 15) {
      for (let j = h - 60; j < h; j += 15) {
        ctx.strokeRect(i, j, 15, 15);
      }
    }
    
  // === AREA 3: ふしぎ占い森 (Mysterious Fortune Forest) ===
  } else if (areaId === 3) {
    // Deep teal-to-dark green gradient
    const skyGradient = ctx.createLinearGradient(0, 0, 0, h);
    skyGradient.addColorStop(0, '#0a1a0e');
    skyGradient.addColorStop(0.5, '#0d2618');
    skyGradient.addColorStop(1, '#1a3d2e');
    ctx.fillStyle = skyGradient;
    ctx.fillRect(0, 0, w, h);
    
    // Bioluminescent mushroom glow (cyan/green spots)
    for (let i = 0; i < 6; i++) {
      const mx = 50 + i * (w - 100) / 5;
      const my = h - 80 + Math.sin(frame * 0.04 + i) * 5;
      ctx.fillStyle = 'rgba(0, 255, 150, 0.15)';
      ctx.beginPath();
      ctx.arc(mx, my, 30, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(0, 200, 130, 0.4)';
      ctx.beginPath();
      ctx.arc(mx, my, 8, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Floating fairy lights (multi-colored tiny orbs)
    const fairyColors = ['#FF69B4', '#00FF88', '#87CEEB', '#FFD700'];
    for (let i = 0; i < 10; i++) {
      const fx = (frame * 0.4 + i * 60) % w;
      const fy = 100 + i * 30 + Math.sin(frame * 0.08 + i) * 30;
      const brightness = 0.4 + Math.cos(frame * 0.06 + i) * 0.6;
      ctx.globalAlpha = brightness;
      ctx.fillStyle = fairyColors[i % 4];
      ctx.beginPath();
      ctx.arc(fx, fy, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = brightness * 0.5;
      ctx.beginPath();
      ctx.arc(fx, fy, 6, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    
    // Magical sparkle particles rising upward
    ctx.fillStyle = 'rgba(255, 215, 0, 0.5)';
    for (let i = 0; i < 10; i++) {
      const sx = Math.sin(frame * 0.05 + i) * 40 + w * 0.5;
      const sy = h - (frame * 0.5 + i * 20) % h;
      ctx.globalAlpha = 0.6 - (sy / h) * 0.5;
      ctx.beginPath();
      ctx.arc(sx, sy, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    // Mystical fog between trees
    ctx.fillStyle = 'rgba(0, 255, 150, 0.08)';
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.ellipse(w * (0.2 + i * 0.2), h - 100 + Math.sin(frame * 0.02 + i) * 15, 90, 30, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Dark mossy earth with glowing patches
    ctx.fillStyle = '#0d1e15';
    ctx.fillRect(0, h - 60, w, 60);
    ctx.fillStyle = 'rgba(0, 255, 150, 0.1)';
    for (let i = 0; i < 8; i++) {
      ctx.beginPath();
      ctx.arc(30 + i * (w - 60) / 7, h - 30, 15, 0, Math.PI * 2);
      ctx.fill();
    }
    
  // === AREA 4: 星空占いの丘 (Starry Fortune Hill) ===
  } else if (areaId === 4) {
    // Ultra deep space gradient
    const skyGradient = ctx.createLinearGradient(0, 0, 0, h);
    skyGradient.addColorStop(0, '#050510');
    skyGradient.addColorStop(0.5, '#0a0a2e');
    skyGradient.addColorStop(1, '#15103d');
    ctx.fillStyle = skyGradient;
    ctx.fillRect(0, 0, w, h);
    
    // Multi-layered star field
    ctx.fillStyle = '#FFF';
    for (let i = 0; i < 80; i++) {
      const sx = (i * 73) % w;
      const sy = (i * 61) % (h * 0.65);
      const size = 0.5 + (i % 4) * 0.4;
      const brightness = 0.3 + Math.sin(frame * 0.01 + i * 0.3) * 0.7;
      ctx.globalAlpha = brightness;
      ctx.beginPath();
      ctx.arc(sx, sy, size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    // Aurora borealis effect
    const auroraGradient = ctx.createLinearGradient(0, h * 0.3, 0, h * 0.55);
    auroraGradient.addColorStop(0, 'rgba(100, 200, 100, 0)');
    auroraGradient.addColorStop(0.25, 'rgba(100, 200, 100, 0.12)');
    auroraGradient.addColorStop(0.5, 'rgba(150, 100, 200, 0.18)');
    auroraGradient.addColorStop(0.75, 'rgba(200, 100, 200, 0.12)');
    auroraGradient.addColorStop(1, 'rgba(100, 100, 200, 0)');
    ctx.fillStyle = auroraGradient;
    ctx.fillRect(0, h * 0.3, w, h * 0.25);
    
    // Large moon with craters
    ctx.fillStyle = '#E8E8D0';
    ctx.beginPath();
    ctx.arc(w - 110, 100, 50, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#050510';
    ctx.beginPath();
    ctx.arc(w - 100, 90, 50, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#C0C0B0';
    for (let i = 0; i < 10; i++) {
      const angle = (i / 10) * Math.PI * 2;
      const cx = w - 110 + Math.cos(angle) * 28;
      const cy = 100 + Math.sin(angle) * 28;
      ctx.beginPath();
      ctx.arc(cx, cy, 2 + (i % 3) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Nebula clouds
    ctx.fillStyle = 'rgba(150, 100, 200, 0.1)';
    ctx.beginPath();
    ctx.ellipse(w * 0.25, h * 0.35, 110, 85, 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(100, 100, 200, 0.08)';
    ctx.beginPath();
    ctx.ellipse(w * 0.7, h * 0.4, 130, 95, -0.3, 0, Math.PI * 2);
    ctx.fill();
    
    // Constellation patterns with golden lines
    ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
    ctx.lineWidth = 1;
    const constellations = [
      [[100, 200], [180, 180], [160, 280], [100, 200]],
      [[w - 200, 150], [w - 120, 180], [w - 140, 280], [w - 200, 150]],
      [[w * 0.3, 320], [w * 0.45, 300], [w * 0.5, 380], [w * 0.3, 320]]
    ];
    for (let c of constellations) {
      for (let j = 0; j < c.length - 1; j++) {
        ctx.beginPath();
        ctx.moveTo(c[j][0], c[j][1]);
        ctx.lineTo(c[j + 1][0], c[j + 1][1]);
        ctx.stroke();
      }
      for (let pt of c) {
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(pt[0], pt[1], 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    // Occasional shooting star
    const shootFrame = frame % 300;
    if (shootFrame < 80) {
      const shootX = w * 0.5 + shootFrame * 2;
      const shootY = 150 - shootFrame * 0.5;
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(shootX, shootY);
      ctx.lineTo(shootX - 40, shootY + 20);
      ctx.stroke();
    }
    
    // Dark silhouette hill
    ctx.fillStyle = '#0a0a0e';
    ctx.beginPath();
    ctx.moveTo(0, h * 0.65);
    for (let i = 0; i <= w; i += 25) {
      const hillY = h * 0.65 - Math.sin(i * 0.008) * 30 - Math.cos(frame * 0.0005 + i * 0.001) * 3;
      ctx.lineTo(i, hillY);
    }
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.fill();
  }
  
  // === SHARED: Floating golden sparkles (all areas) ===
  ctx.fillStyle = '#FFD700';
  for (let i = 0; i < 20; i++) {
    const sx = (frame * 0.8 + i * 83) % (w + 40) - 20;
    const sy = (frame * 0.5 + i * 59) % (h + 40) - 20;
    const sparkleSize = 0.4 + Math.sin(frame * 0.12 + i) * 0.5;
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1 + i * 0.7) * 0.5;
    ctx.beginPath();
    ctx.arc(sx, sy, sparkleSize, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // === SHARED: Subtle vignette effect ===
  const vignette = ctx.createRadialGradient(w * 0.5, h * 0.5, 0, w * 0.5, h * 0.5, Math.max(w, h) * 0.7);
  vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
  vignette.addColorStop(1, 'rgba(0, 0, 0, 0.35)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, w, h);
}

// ===================== CANVAS & RENDERING INITIALIZATION =====================
window.addEventListener('load', () => {
  canvas = document.getElementById('gcanvas');
  if (!canvas) return;

  ctx = canvas.getContext('2d');
  resizeCanvas();

  window.addEventListener('resize', resizeCanvas);
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const r = canvas.getBoundingClientRect(); handleTap(e.touches[0], r); }, { passive: false });
  canvas.addEventListener('click', (e) => { const r = canvas.getBoundingClientRect(); handleTap(e, r); });

  initBGM();
});

function resizeCanvas() {
  cW = W();
  const bottomEl = document.getElementById('bottom-ui');
  const bottomH = (bottomEl ? bottomEl.offsetHeight : 160) || 160;
  cH = H() - bottomH;

  canvas.width = cW * DEVICE_PIXEL_RATIO;
  canvas.height = Math.max(cH, 300) * DEVICE_PIXEL_RATIO;

  canvas.style.width = cW + 'px';
  canvas.style.height = canvas.height / DEVICE_PIXEL_RATIO + 'px';

  ctx.scale(DEVICE_PIXEL_RATIO, DEVICE_PIXEL_RATIO);
}

// ===================== SCREEN NAVIGATION =====================
function goScreen(screenName, fadeOutDuration = 350) {
  const current = document.querySelector('.screen.active');
  const next = document.getElementById(screenName + '-screen');

  if (!next) return;

  if (current && current !== next) {
    current.classList.add('fade-out');
    setTimeout(() => {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active', 'fade-out'));
      next.classList.add('active');
      G.screen = screenName;

      if (screenName === 'game') {
        resizeCanvas();
        G.px = cW / 2;
        G.py = cH * PLAYER_WALK_Y_RATIO;
        G.dx = G.px - 20;
        G.dy = G.py + 15;
        spawnNPCs();
        startLoop();
        if (G.bgmOn) playBGM();
      } else {
        stopLoop();
        stopBGM();
      }
    }, fadeOutDuration);
  } else {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    next.classList.add('active');
    G.screen = screenName;

    if (screenName === 'game') {
      resizeCanvas();
      G.px = cW / 2;
      G.py = cH * PLAYER_WALK_Y_RATIO;
      G.dx = G.px - 20;
      G.dy = G.py + 15;
      spawnNPCs();
      startLoop();
      if (G.bgmOn) playBGM();
    } else {
      stopLoop();
      stopBGM();
    }
  }
}

// ===================== GAME LOOP =====================
function startLoop() {
  if (G.loopRunning) return;
  G.loopRunning = true;
  G.lastTime = performance.now();
  requestAnimationFrame(gameFrame);
}

function stopLoop() {
  G.loopRunning = false;
}

function gameFrame(now) {
  if (!G.loopRunning) return;
  const dt = now - G.lastTime;

  if (dt >= 16) {
    G.lastTime = now;
    gameLoop();
  }

  requestAnimationFrame(gameFrame);
}

function gameLoop() {
  G.frame++;
  G.gtime++;

  // Player movement
  if (G.tx !== null && G.ty !== null) {
    const dx = G.tx - G.px;
    const dy = G.ty - G.py;
    const d = Math.hypot(dx, dy);

    if (d > 3) {
      const ease = Math.min(0.12, 4.0 / d);
      G.px += dx * ease;
      G.py += dy * ease;
    } else {
      G.tx = null;
      G.ty = null;
    }
  }

  // Dog follows
  const tdx = G.px - 20 - G.dx;
  const tdy = G.py + 15 - G.dy;
  const td = Math.hypot(tdx, tdy);
  if (td > 25) {
    const ease = Math.min(1, 2.2 / td * 3);
    const lerp = 0.06 + ease * 0.08;
    G.dx += tdx * lerp;
    G.dy += tdy * lerp;
  }

  // NPC movement
  for (const n of G.npcs) {
    n.frame = (n.frame || 0) + 1;
    n.x += n.vx || 0;
    n.y += n.vy || 0;

    if (n.x < 30 || n.x > cW - 30) n.vx *= -1;
    if (n.y < cH * 0.25 || n.y > cH * 0.85) n.vy *= -1;

    if (Math.random() > 0.98) {
      n.vx = (Math.random() - 0.5) * 1;
      n.vy = (Math.random() - 0.5) * 0.5;
    }
  }

  G.walkFrame = (G.walkFrame + 1) % 10;
  G.tailFrame = (G.tailFrame + 1) % 8;

  const m = 25;
  G.px = Math.max(m, Math.min(cW - m, G.px));
  G.py = Math.max(cH * 0.25, Math.min(cH * 0.85, G.py));

  G.bubbles = G.bubbles.filter(b => {
    b.life--;
    b.y -= 0.5;
    return b.life > 0;
  });

  updateParticles();
  drawAll();
}

// ===================== TOUCH & CLICK HANDLING =====================
function handleTap(touch, rect) {
  if (!rect) {
    const r = canvas.getBoundingClientRect();
    rect = r;
  }

  const x = ((touch.clientX || touch.x || 0) - rect.left) * (cW / rect.width);
  const y = ((touch.clientY || touch.y || 0) - rect.top) * (cH / rect.height);

  const area = AREAS[G.areaIdx];

  // Check building hits
  for (let i = 0; i < area.buildings.length; i++) {
    const building = area.buildings[i];
    const rowIdx = Math.floor(i / 3);
    const colIdx = i % 3;
    const bx = cW * BUILDING_X_POSITIONS[colIdx];
    const by = cH * (rowIdx === 0 ? BUILDING_ROW1_Y_RATIO : BUILDING_ROW2_Y_RATIO);

    if (Math.hypot(bx - x, by - y) < 50) {
      enterBuilding(building);
      return;
    }
  }

  // Check NPC hits
  for (const n of G.npcs) {
    if (Math.hypot(n.x - x, n.y - y) < 35) {
      talkToNPC(n);
      return;
    }
  }

  // Area navigation
  if (x < 50) { changeArea(-1); return; }
  if (x > cW - 50) { changeArea(1); return; }

  // Set movement target
  G.tx = x;
  G.ty = y;
  playSE('step');
}

function changeArea(direction) {
  G.areaIdx = (G.areaIdx + direction + AREAS.length) % AREAS.length;
  const area = AREAS[G.areaIdx];

  const areaNameEl = document.getElementById('area-name');
  if (areaNameEl) {
    areaNameEl.textContent = 'エリア ' + area.id + ': ' + area.name;
  }

  addBubble(cW / 2, cH / 2, area.name + 'に到着！', 60);
  playSE('arrival');
  spawnNPCs();
}

// ===================== NPC SYSTEM =====================
function spawnNPCs() {
  G.npcs = [];
  const area = AREAS[G.areaIdx];

  for (let i = 0; i < 4; i++) {
    const npcData = NPCS_DATA[G.areaIdx * 4 + i];
    if (!npcData) continue;

    const npc = {
      ...npcData,
      x: 60 + Math.random() * (cW - 120),
      y: cH * 0.35 + Math.random() * cH * 0.4,
      vx: (Math.random() - 0.5) * 0.8,
      vy: (Math.random() - 0.5) * 0.3,
      frame: Math.floor(Math.random() * 20)
    };

    G.npcs.push(npc);
  }
}

function talkToNPC(npc) {
  G.selectedNpc = npc;
  const text = npc.lines[Math.floor(Math.random() * npc.lines.length)];
  addBubble(npc.x, npc.y - 40, text, 50);

function calculateLifePath(birthday) {
  const date = new Date(birthday);
  const year = date.getFullYear();
  const month = date.getMonth() + 1;
  const day = date.getDate();

  let sum = String(year).split('').reduce((a, b) => a + parseInt(b), 0) +
            String(month).split('').reduce((a, b) => a + parseInt(b), 0) +
            String(day).split('').reduce((a, b) => a + parseInt(b), 0);

  while (sum > 9 && ![11, 22, 33].includes(sum)) {
    sum = String(sum).split('').reduce((a, b) => a + parseInt(b), 0);
  }

  return sum;
}

// ===================== PARTICLE & BUBBLE EFFECTS =====================
function addBubble(x, y, text, duration = 40) {
  G.bubbles.push({ x: x, y: y, text: text, life: duration });
}

function emitParticles(x, y, count = 8) {
  for (let i = 0; i < count; i++) {
    G.particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4 - 2,
      life: 30
    });
  }
}

function updateParticles() {
  G.particles = G.particles.filter(p => {
    p.life--;
    p.x += p.vx;
    p.y += p.vy;
    return p.life > 0;
  });
}

// ===================== AUDIO - Mystical Ambient BGM =====================
function initBGM() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.12;
    masterGain.connect(audioCtx.destination);
  } catch(e) {}
}

function playBGM() {
  if (bgmPlaying || !audioCtx) return;
  bgmPlaying = true;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  // Ambient pad layer - warm evolving drone
  function playPad() {
    if (!bgmPlaying) return;
    const now = audioCtx.currentTime;
    const padNotes = [220, 277.18, 329.63, 440, 554.37]; // A3, C#4, E4, A4, C#5
    const note = padNotes[Math.floor(Math.random() * padNotes.length)];
    
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    
    osc.type = 'sine';
    osc.frequency.value = note;
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    filter.Q.value = 1;
    
    osc.connect(filter);
    filter.connect(g);
    g.connect(masterGain);
    
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.06, now + 2);
    g.gain.linearRampToValueAtTime(0.04, now + 5);
    g.gain.linearRampToValueAtTime(0, now + 8);
    
    osc.start(now);
    osc.stop(now + 8);
  }
  
  // Crystal chime layer - gentle high notes
  function playChime() {
    if (!bgmPlaying) return;
    const now = audioCtx.currentTime;
    const chimeNotes = [880, 1108.73, 1318.51, 1567.98, 1760]; // A5, C#6, E6, G6, A6
    const note = chimeNotes[Math.floor(Math.random() * chimeNotes.length)];
    
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.value = note;
    osc.connect(g);
    g.connect(masterGain);
    
    g.gain.setValueAtTime(0.03, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 3);
    
    osc.start(now);
    osc.stop(now + 3);
  }
  
  // Deep bass hum - grounding tone
  function playBass() {
    if (!bgmPlaying) return;
    const now = audioCtx.currentTime;
    const bassNotes = [110, 82.41, 55]; // A2, E2, A1
    const note = bassNotes[Math.floor(Math.random() * bassNotes.length)];
    
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    
    osc.type = 'triangle';
    osc.frequency.value = note;
    filter.type = 'lowpass';
    filter.frequency.value = 200;
    
    osc.connect(filter);
    filter.connect(g);
    g.connect(masterGain);
    
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.04, now + 3);
    g.gain.linearRampToValueAtTime(0, now + 10);
    
    osc.start(now);
    osc.stop(now + 10);
  }
  
  // Mystical melody - pentatonic scale gentle notes
  function playMelody() {
    if (!bgmPlaying) return;
    const now = audioCtx.currentTime;
    // A minor pentatonic: A C D E G
    const melodyNotes = [440, 523.25, 587.33, 659.25, 783.99, 880, 1046.5];
    const note = melodyNotes[Math.floor(Math.random() * melodyNotes.length)];
    
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(note, now);
    osc.frequency.linearRampToValueAtTime(note * 1.002, now + 2); // subtle vibrato
    
    osc.connect(g);
    g.connect(masterGain);
    
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.025, now + 0.3);
    g.gain.exponentialRampToValueAtTime(0.001, now + 4);
    
    osc.start(now);
    osc.stop(now + 4);
  }
  
  // Schedule layers with different intervals for organic feel
  playPad();
  playBass();
  
  bgmTimers.push(setInterval(() => { playPad(); }, 6000 + Math.random() * 3000));
  bgmTimers.push(setInterval(() => { playChime(); }, 3000 + Math.random() * 4000));
  bgmTimers.push(setInterval(() => { playBass(); }, 8000 + Math.random() * 4000));
  bgmTimers.push(setInterval(() => { playMelody(); }, 4000 + Math.random() * 3000));
  
  // Initial chime after short delay
  setTimeout(() => { if (bgmPlaying) playChime(); }, 1500);
  setTimeout(() => { if (bgmPlaying) playMelody(); }, 2500);
}

function stopBGM() {
  bgmPlaying = false;
  bgmTimers.forEach(t => clearInterval(t));
  bgmTimers = [];
}

function playSE(type) {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  try {
    const now = audioCtx.currentTime;
    
    if (type === 'step') {
      // Soft crystal step sound
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(1800, now);
      o.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
      o.connect(g);
      g.connect(masterGain);
      g.gain.setValueAtTime(0.02, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      o.start(now);
      o.stop(now + 0.08);
    } else if (type === 'enter') {
      // Mystical door chime - ascending arpeggio
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.value = freq;
        o.connect(g);
        g.connect(masterGain);
        g.gain.setValueAtTime(0.04, now + i * 0.12);
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.5);
        o.start(now + i * 0.12);
        o.stop(now + i * 0.12 + 0.5);
      });
    } else if (type === 'arrival') {
      // Magical arrival - sparkle cascade
      for (let i = 0; i < 5; i++) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.value = 800 + i * 200 + Math.random() * 100;
        o.connect(g);
        g.connect(masterGain);
        g.gain.setValueAtTime(0.03, now + i * 0.08);
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.6);
        o.start(now + i * 0.08);
        o.stop(now + i * 0.08 + 0.6);
      }
    }
  } catch(e) {}
}

// ===================== DRAWING FUNCTIONS =====================
// Map NPC animal emoji to drawing functions
const ANIMAL_DRAW_MAP = {
  '🐕': drawShiba, '🐕‍🦺': drawShiba, '🐱': drawCat, '🐰': drawRabbit,
  '🦊': drawFox, '🦉': drawOwl, '🐸': drawFrog, '🐼': drawPanda,
  '🐹': drawHamster, '🐧': drawPenguin, '🦝': drawTanuki, '🐿️': drawSquirrel,
  '🐑': drawSheep, '⭐': drawFox, '🌙': drawCat, '🦅': drawOwl, '✨': drawRabbit
};

function drawAll() {
  if (!ctx) return;
  const w = cW;
  const h = cH;
  ctx.clearRect(0, 0, w, h);

  const area = AREAS[G.areaIdx];

  // Use detailed background drawing
  drawBackground(ctx, w, h, area.id, G.frame);

  // Draw buildings using detailed function
  for (let i = 0; i < area.buildings.length; i++) {
    const rowIdx = Math.floor(i / 3);
    const colIdx = i % 3;
    const bx = w * BUILDING_X_POSITIONS[colIdx];
    const by = h * (rowIdx === 0 ? BUILDING_ROW1_Y_RATIO : BUILDING_ROW2_Y_RATIO);

    drawBuilding(ctx, bx, by, area.buildings[i].fortuneType, area.id);

    // Building name label
    ctx.fillStyle = area.id === 4 ? '#FFF' : '#333';
    ctx.font = 'bold 11px "Hiragino Maru Gothic ProN", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(area.buildings[i].name, bx, by + 42);
  }

  // Draw NPCs using detailed animal drawing functions
  for (const npc of G.npcs) {
    const drawFn = ANIMAL_DRAW_MAP[npc.animal];
    const bounce = Math.sin((npc.frame || 0) * 0.1) * 2;
    if (drawFn) {
      drawFn(ctx, npc.x, npc.y, bounce, npc.color || '#D4A060');
    } else {
      // Fallback to emoji for unknown animals
      ctx.font = '24px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(npc.animal, npc.x, npc.y);
    }
    // Draw NPC name
    ctx.fillStyle = area.id === 4 ? '#FFF' : '#555';
    ctx.font = '10px "Hiragino Maru Gothic ProN", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(npc.name, npc.x, npc.y + 28);
  }

  // Draw player shiba using detailed drawing
  drawPlayerShiba(ctx, G.px, G.py, G.frame);

  // Draw bubbles
  for (const b of G.bubbles) {
    const alpha = b.life / 40;
    ctx.globalAlpha = Math.max(0, alpha);

    ctx.fillStyle = '#FFF';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;

    const textWidth = ctx.measureText(b.text).width;
    const bubbleWidth = textWidth + 20;
    const bubbleHeight = 30;
    const bubbleX = b.x - bubbleWidth / 2;
    const bubbleY = b.y - bubbleHeight;

    ctx.beginPath();
    ctx.roundRect(bubbleX, bubbleY, bubbleWidth, bubbleHeight, 8);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = '#333';
    ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(b.text, b.x, b.y - 8);

    ctx.globalAlpha = 1;
  }

  // Draw area navigation hints
  ctx.fillStyle = 'rgba(200, 200, 200, 0.5)';
  ctx.font = '14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('◀', 25, h / 2);
  ctx.fillText('▶', w - 25, h / 2);
}

      G.playerName = nameInput ? nameInput.value || 'さん' : 'さん';
      goScreen('game');
    });
  }
});
