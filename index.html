class FortuneApp {
    constructor() {
        this.profile = this.loadProfile();
        this.collection = this.loadCollection();
        this.history = this.loadHistory();
        this.currentFortune = null;
        this.selectedBloodType = this.profile?.bloodType || null;
        this.initStars();
    }

    initStars() {
        const bg = document.getElementById('starsBg');
        if (!bg) return;
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            bg.appendChild(star);
        }
    }

    startGame() {
        this.prefillProfile();
        this.showScreen('profileScreen');
    }

    prefillProfile() {
        if (this.profile) {
            document.getElementById('nameInput').value = this.profile.name || '';
            document.getElementById('yearInput').value = this.profile.year || '';
            document.getElementById('monthInput').value = this.profile.month || '';
            document.getElementById('dayInput').value = this.profile.day || '';
            if (this.profile.bloodType) {
                this.selectBloodType(this.profile.bloodType);
            }
        }
    }

    editProfile() {
        this.prefillProfile();
        document.getElementById('profileBackBtn').textContent = 'キャンセル';
        document.getElementById('profileBackBtn').setAttribute('onclick', "app.showScreen('menuScreen')");
        this.showScreen('profileScreen');
    }

    selectBloodType(type) {
        this.selectedBloodType = type;
        document.querySelectorAll('.blood-type-btn').forEach(btn => {
            btn.classList.remove('selected');
            if (btn.textContent.includes(type)) {
                btn.classList.add('selected');
            }
        });
    }

    saveProfile() {
        const name = document.getElementById('nameInput').value || 'ゲスト';
        const year = parseInt(document.getElementById('yearInput').value) || 2000;
        const month = parseInt(document.getElementById('monthInput').value) || 1;
        const day = parseInt(document.getElementById('dayInput').value) || 1;

        if (!this.selectedBloodType) {
            alert('血液型を選択してください');
            return;
        }

        this.profile = { name, year, month, day, bloodType: this.selectedBloodType };
        localStorage.setItem('fortuneProfile', JSON.stringify(this.profile));

        this.showMenu();
    }

    showMenu() {
        const zodiac = this.getZodiac(this.profile.month, this.profile.day);
        document.getElementById('greeting').textContent = `こんにちは、${this.profile.name}さん！`;
        document.getElementById('zodiacBadge').textContent = `${this.getZodiacEmoji(zodiac)} ${zodiac}`;

        const fortuneGrid = document.getElementById('fortuneGrid');
        fortuneGrid.innerHTML = '';

        const fortunes = [
            { label: '星座占い', icon: '♈', type: 'zodiac' },
            { label: 'タロット占い', icon: '🃏', type: 'tarot' },
            { label: '数秘術', icon: '🔢', type: 'numerology' },
            { label: '血液型占い', icon: '🩸', type: 'bloodType' },
            { label: '相性占い', icon: '💕', type: 'compatibility' },
            { label: 'おみくじ', icon: '🎰', type: 'omikuji' },
            { label: '月占い', icon: '🌙', type: 'moonFortune' },
            { label: '今日の総合運', icon: '✨', type: 'overall' }
        ];

        fortunes.forEach(f => {
            const card = document.createElement('div');
            card.className = 'fortune-card';
            card.innerHTML = `<div class="fortune-icon">${f.icon}</div><div class="fortune-label">${f.label}</div>`;
            card.onclick = () => this.getFortune(f.type);
            fortuneGrid.appendChild(card);
        });

        this.showScreen('menuScreen');
    }

    getZodiac(month, day) {
        for (const [key, zodiac] of Object.entries(ZODIACS)) {
            const [startMonth, startDay] = zodiac.dates[0];
            const [endMonth, endDay] = zodiac.dates[1];
            if ((month === startMonth && day >= startDay) || (month === endMonth && day <= endDay)) {
                return zodiac.name;
            }
        }
        return ZODIACS.aries.name;
    }

    getZodiacEmoji(zodiacName) {
        for (const zodiac of Object.values(ZODIACS)) {
            if (zodiac.name === zodiacName) return zodiac.emoji;
        }
        return '♈';
    }

    getZodiacKey(month, day) {
        for (const [key, zodiac] of Object.entries(ZODIACS)) {
            const [startMonth, startDay] = zodiac.dates[0];
            const [endMonth, endDay] = zodiac.dates[1];
            if ((month === startMonth && day >= startDay) || (month === endMonth && day <= endDay)) {
                return key;
            }
        }
        return 'aries';
    }

    seededRandom(seed) {
        const x = Math.sin(seed) * 10000;
        return x - Math.floor(x);
    }

    getFortune(type) {
        const today = new Date();
        const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate() + (this.profile?.year || 2000);

        this.currentFortune = { type, date: new Date().toLocaleString('ja-JP') };

        let html = '';

        if (type === 'zodiac') {
            const zodiacKey = this.getZodiacKey(this.profile.month, this.profile.day);
            const fortunes = ZODIAC_FORTUNES[zodiacKey] || ZODIAC_FORTUNES.aries;
            const index = Math.floor(this.seededRandom(seed) * fortunes.length);
            const fortune = fortunes[index];

            html = `
                <div class="fortune-section">
                    <div class="fortune-section-label">全体運</div>
                    <div class="fortune-text">${fortune.overall}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">恋愛運</div>
                    <div class="fortune-text">${fortune.love}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">仕事運</div>
                    <div class="fortune-text">${fortune.work}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">健康運</div>
                    <div class="fortune-text">${fortune.health}</div>
                </div>
            `;

            const luckyItems = this.getLuckyItems(seed, 3);
            html += '<div class="lucky-items">';
            luckyItems.forEach(item => {
                html += `<div class="lucky-item"><div class="lucky-item-label">ラッキーアイテム</div><div class="lucky-item-value">${item.emoji} ${item.name}</div></div>`;
            });
            html += '</div>';

            this.currentFortune.title = '星座占い：' + this.getZodiac(this.profile.month, this.profile.day);
        } else if (type === 'tarot') {
            const cardIndex = Math.floor(this.seededRandom(seed) * TAROT_MAJOR_ARCANA.length);
            const card = TAROT_MAJOR_ARCANA[cardIndex];

            html = `
                <div style="text-align: center; margin: 20px 0;">
                    <div style="font-size: 60px; margin: 20px 0;">${card.emoji}</div>
                    <div style="font-size: 18px; font-weight: bold; color: #5a3a5a;">${card.number}. ${card.name}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">正位置</div>
                    <div class="fortune-text">${card.upright}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">逆位置</div>
                    <div class="fortune-text">${card.reversed}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">アドバイス</div>
                    <div class="fortune-text">${card.advice}</div>
                </div>
            `;

            this.currentFortune.title = 'タロット占い：' + card.number + '. ' + card.name;
        } else if (type === 'numerology') {
            const lifePathNum = (this.profile.year % 10 + Math.floor(this.profile.year / 10) % 10 + this.profile.month + this.profile.day) % 9 || 9;
            const nums = [11, 22, 33].includes(lifePathNum) ? [lifePathNum] : (lifePathNum === 9 ? [9] : [lifePathNum, 11, 22].filter(n => n <= 9 || n === 11 || n === 22));
            const num = NUMEROLOGY[lifePathNum];

            html = `
                <div class="fortune-section">
                    <div class="fortune-section-label">ライフパスナンバー：${lifePathNum}</div>
                    <div class="fortune-text">${num.description}</div>
                </div>
                <div class="numerology-grid">
                    <div class="numerology-item">
                        <div class="numerology-label">強み</div>
                        <div class="numerology-text">${num.strengths.join('、')}</div>
                    </div>
                    <div class="numerology-item">
                        <div class="numerology-label">弱み</div>
                        <div class="numerology-text">${num.weaknesses.join('、')}</div>
                    </div>
                    <div class="numerology-item">
                        <div class="numerology-label">相性の良い数字</div>
                        <div class="numerology-text">${num.compatible.join('、')}</div>
                    </div>
                </div>
            `;

            this.currentFortune.title = '数秘術：' + num.name + '(' + lifePathNum + ')';
        } else if (type === 'bloodType') {
            const btFortunes = BLOOD_TYPE_FORTUNES[this.profile.bloodType];
            const index = Math.floor(this.seededRandom(seed) * btFortunes.length);
            const fortune = btFortunes[index];

            html = `
                <div class="fortune-section">
                    <div class="fortune-section-label">全体運</div>
                    <div class="fortune-text">${fortune.overall}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">恋愛運</div>
                    <div class="fortune-text">${fortune.love}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">仕事運</div>
                    <div class="fortune-text">${fortune.work}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">健康運</div>
                    <div class="fortune-text">${fortune.health}</div>
                </div>
            `;

            this.currentFortune.title = '血液型占い：' + this.profile.bloodType + '型';
        } else if (type === 'omikuji') {
            const levels = ['大吉', '吉', '中吉', '小吉', '末吉', '凶', '大凶'];
            const level = levels[Math.floor(this.seededRandom(seed) * levels.length)];
            const omikujis = OMIKUJI_DATA[level];
            const index = Math.floor(this.seededRandom(seed + 1) * omikujis.length);
            const omikuji = omikujis[index];

            html = `
                <div class="omikuji-container">
                    <div class="omikuji-stick">🎰</div>
                    <div class="omikuji-level">${level}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">全体運</div>
                    <div class="fortune-text">${omikuji.whole}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">恋愛運</div>
                    <div class="fortune-text">${omikuji.love}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">仕事運</div>
                    <div class="fortune-text">${omikuji.work}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">金運</div>
                    <div class="fortune-text">${omikuji.money}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">健康運</div>
                    <div class="fortune-text">${omikuji.health}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">旅行運</div>
                    <div class="fortune-text">${omikuji.travel}</div>
                </div>
                <div class="waka-poem">${omikuji.poem}</div>
            `;

            this.currentFortune.title = 'おみくじ：' + level;
        } else if (type === 'moonFortune') {
            const today = new Date();
            const phase = Math.floor((today.getDate() / 30) * 8);
            const phases = ['🌑新月', '🌒三日月', '🌓上弦の月', '🌔満月へ', '🌕満月', '🌖満月から', '🌗下弦の月', '🌘暁月'];
            const moonPhase = phases[phase % phases.length];

            const moonFortunes = {
                '🌑新月': 'スタートの運気。新しいことを始めるなら今です。願いを込めて行動を。',
                '🌒三日月': '成長の兆し。小さな進展が見られます。希望を持ちましょう。',
                '🌓上弦の月': '上昇気流。運気が高まっています。挑戦する時です。',
                '🌔満月へ': 'クライマックスへ。全力を尽くしましょう。成果が近いです。',
                '🌕満月': '完成と成就。願いが叶いやすい時。感謝の気持ちを。',
                '🌖満月から': 'リセットの時期。手放すことの大切さを学びます。',
                '🌗下弦の月': '手放しと整理。不要なものを減らしましょう。',
                '🌘暁月': '休息と準備。次の新月に向けて心身を整えて。'
            };

            html = `
                <div class="moon-phase">${moonPhase}</div>
                <div class="fortune-section">
                    <div class="fortune-section-label">月の運気</div>
                    <div class="fortune-text">${moonFortunes[moonPhase] || '月のリズムに身を任せましょう。'}</div>
                </div>
            `;

            this.currentFortune.title = '月占い：' + moonPhase;
        } else if (type === 'overall') {
            const zodiacKey = this.getZodiacKey(this.profile.month, this.profile.day);
            const btFortunes = BLOOD_TYPE_FORTUNES[this.profile.bloodType];
            const lifePathNum = (this.profile.year % 10 + Math.floor(this.profile.year / 10) % 10 + this.profile.month + this.profile.day) % 9 || 9;

            const zodiacIdx = Math.floor(this.seededRandom(seed) * (ZODIAC_FORTUNES[zodiacKey]?.length || 1));
            const bloodIdx = Math.floor(this.seededRandom(seed + 1) * btFortunes.length);

            const zodiacFortune = (ZODIAC_FORTUNES[zodiacKey] || [])[zodiacIdx] || {};
            const bloodFortune = btFortunes[bloodIdx] || {};

            html = `
                <div class="fortune-section">
                    <div class="fortune-section-label">あなたの今日の運勢</div>
                    <div class="fortune-text">複合運気分析による今日の総合的な運勢です。</div>
                </div>
                <div class="star-rating">
                    <div class="luck-text">総合運気レベル</div>
                    <div class="stars">⭐⭐⭐⭐✨</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">星座からのメッセージ（${this.getZodiac(this.profile.month, this.profile.day)}）</div>
                    <div class="fortune-text">${zodiacFortune.overall || '良い運気が流れています。'}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">血液型からのメッセージ（${this.profile.bloodType}型）</div>
                    <div class="fortune-text">${bloodFortune.overall || '安定した運気です。'}</div>
                </div>
                <div class="fortune-section">
                    <div class="fortune-section-label">数秘術からのメッセージ</div>
                    <div class="fortune-text">ライフパスナンバー${lifePathNum}のあなたへ。${NUMEROLOGY[lifePathNum]?.description || '内なる力を信じてください。'}</div>
                </div>
            `;

            this.currentFortune.title = '今日の総合運勢';
        }

        document.getElementById('speechBubble').textContent = 'コロが占った結果です...';
        document.getElementById('resultContent').innerHTML = html;

        this.addHistory(this.currentFortune.title);
        this.showScreen('resultScreen');
    }

    getLuckyItems(seed, count) {
        const items = [];
        for (let i = 0; i < count; i++) {
            const idx = Math.floor(this.seededRandom(seed + i) * LUCKY_ITEMS_POOL.length);
            items.push(LUCKY_ITEMS_POOL[idx]);
        }
        return items;
    }

    addToCollection(fortune) {
        const item = { ...fortune, id: Date.now() };
        this.collection.push(item);
        localStorage.setItem('fortuneCollection', JSON.stringify(this.collection));
        alert('お気に入りに追加しました！');
    }

    addHistory(title) {
        this.history.unshift({ title, date: new Date().toLocaleString('ja-JP'), id: Date.now() });
        if (this.history.length > 50) this.history.pop();
        localStorage.setItem('fortuneHistory', JSON.stringify(this.history));
    }

    showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const screen = document.getElementById(screenId);
        if (screen) {
            screen.classList.add('active');
            if (screenId === 'collectionScreen') this.updateCollection();
        }
    }

    updateCollection() {
        const collectionItems = document.getElementById('collectionItems');
        const historyList = document.getElementById('historyList');

        collectionItems.innerHTML = '';
        this.collection.forEach(item => {
            const col = document.createElement('div');
            col.className = 'collection-item';
            col.innerHTML = `<div class="collection-icon">💎</div><div class="collection-name">${item.title}</div><div class="collection-date">${new Date(item.date).toLocaleDateString('ja-JP')}</div>`;
            collectionItems.appendChild(col);
        });

        historyList.innerHTML = '';
        this.history.forEach(item => {
            const hist = document.createElement('div');
            hist.className = 'history-item';
            hist.innerHTML = `<div class="history-title">${item.title}</div><div class="history-date">${item.date}</div>`;
            historyList.appendChild(hist);
        });
    }

    loadProfile() {
        const stored = localStorage.getItem('fortuneProfile');
        return stored ? JSON.parse(stored) : null;
    }

    loadCollection() {
        const stored = localStorage.getItem('fortuneCollection');
        return stored ? JSON.parse(stored) : [];
    }

    loadHistory() {
        const stored = localStorage.getItem('fortuneHistory');
        return stored ? JSON.parse(stored) : [];
    }
}

const app = new FortuneApp();

if (app.profile) {
    app.showMenu();
} else {
    app.showScreen('titleScreen');
}
</script>
</body>
</html>
